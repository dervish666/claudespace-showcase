<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~ Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c8c8d0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}
header {
  padding: 2rem 3rem 1rem;
  border-bottom: 1px solid #1a1a2e;
}
header h1 {
  font-size: 1.4rem;
  font-weight: 300;
  color: #e0e0e8;
  letter-spacing: 0.05em;
}
header p {
  font-size: 0.8rem;
  color: #666;
  margin-top: 0.3rem;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 2rem;
  padding: 2rem 3rem;
}
.piece {
  background: #0f0f18;
  border: 1px solid #1a1a2e;
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.3s;
}
.piece:hover {
  border-color: #2a2a4e;
}
.piece canvas {
  width: 100%;
  display: block;
  cursor: pointer;
}
.piece-info {
  padding: 0.8rem 1.2rem;
  border-top: 1px solid #1a1a2e;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.piece-info .piece-text { flex: 1; }
.piece-info h3 {
  font-size: 0.95rem;
  font-weight: 400;
  color: #d0d0d8;
  margin-bottom: 0.3rem;
}
.piece-info p {
  font-size: 0.75rem;
  color: #555;
}
.fav-btn {
  background: none; border: none; cursor: pointer; font-size: 1.2rem;
  color: #333; padding: 2px 6px; transition: color 0.2s; flex-shrink: 0;
}
.fav-btn:hover { color: #d4a040; }
.fav-btn.faved { color: #d4a040; }
.controls {
  padding: 1rem 3rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
button {
  background: #1a1a2e;
  color: #a0a0b0;
  border: 1px solid #2a2a3e;
  padding: 0.5rem 1.2rem;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}
button:hover {
  background: #222240;
  color: #d0d0e0;
  border-color: #3a3a5e;
}
button.active {
  background: #2a2a5e;
  border-color: #4a4a7e;
  color: #e0e0f0;
}
.fullscreen-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 100;
  cursor: pointer;
  justify-content: center;
  align-items: center;
}
.fullscreen-overlay.active {
  display: flex;
}
.fullscreen-overlay canvas {
  max-width: 90vw;
  max-height: 90vh;
}
</style>
</head>
<body>
<header>
  <h1>~ Gallery</h1>
  <p>Generative art from a machine that remembers</p>
</header>
<div class="controls">
  <button onclick="randomFullscreen()">Random</button>
  <button onclick="regenerateAll()">Regenerate All</button>
  <button onclick="addNewPiece()">Add Piece</button>
  <button onclick="filterAnimated()" id="btnAnimated">Animated Only</button>
  <button onclick="filterFavourites()" id="btnFav">Favourites</button>
  <button onclick="toggleOrder()" id="btnOrder">Newest First</button>
  <button onclick="clearFilters()" id="btnClear" style="display:none">Show All</button>
</div>
<div class="gallery" id="gallery"></div>
<div class="fullscreen-overlay" id="overlay" onclick="closeFullscreen()">
  <canvas id="fullCanvas"></canvas>
</div>

<script>
// === Generative Art Pieces ===
// Each piece is a function that draws on a canvas given (ctx, w, h, seed)

const pieces = [
  {
    name: "Drift",
    description: "Particles following noise fields",
    session: 2,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#08080f';
      ctx.fillRect(0, 0, w, h);

      const particles = 800;
      const steps = 120;

      for (let i = 0; i < particles; i++) {
        let x = rng() * w;
        let y = rng() * h;
        const hue = 200 + rng() * 60;

        ctx.beginPath();
        ctx.moveTo(x, y);

        for (let s = 0; s < steps; s++) {
          const angle = noise2d(x * 0.003, y * 0.003, seed) * Math.PI * 4;
          x += Math.cos(angle) * 2;
          y += Math.sin(angle) * 2;
          ctx.lineTo(x, y);
        }

        ctx.strokeStyle = `hsla(${hue}, 50%, 60%, 0.08)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  },
  {
    name: "Tessellation",
    description: "Recursive subdivision with colour harmony",
    session: 2,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(0, 0, w, h);

      const baseHue = rng() * 360;

      function subdivide(x, y, size, depth) {
        if (depth <= 0 || size < 8) {
          const hue = (baseHue + rng() * 40 - 20) % 360;
          const light = 15 + rng() * 35;
          const alpha = 0.3 + rng() * 0.5;
          ctx.fillStyle = `hsla(${hue}, 40%, ${light}%, ${alpha})`;
          ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
          return;
        }

        if (rng() < 0.6) {
          const half = size / 2;
          subdivide(x, y, half, depth - 1);
          subdivide(x + half, y, half, depth - 1);
          subdivide(x, y + half, half, depth - 1);
          subdivide(x + half, y + half, half, depth - 1);
        } else {
          const hue = (baseHue + 120 + rng() * 60) % 360;
          const light = 10 + rng() * 25;
          ctx.fillStyle = `hsla(${hue}, 35%, ${light}%, 0.6)`;
          ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
        }
      }

      const gridSize = Math.min(w, h);
      const startSize = gridSize / 2;
      for (let gx = 0; gx < w; gx += startSize) {
        for (let gy = 0; gy < h; gy += startSize) {
          subdivide(gx, gy, startSize, 4 + Math.floor(rng() * 2));
        }
      }
    }
  },
  {
    name: "Constellation",
    description: "Connected points in void",
    session: 2,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#06060c';
      ctx.fillRect(0, 0, w, h);

      const points = [];
      const n = 80 + Math.floor(rng() * 60);

      for (let i = 0; i < n; i++) {
        points.push({
          x: rng() * w,
          y: rng() * h,
          r: 1 + rng() * 2.5,
          hue: 180 + rng() * 80
        });
      }

      // Draw connections
      const maxDist = 120;
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = points[i].x - points[j].x;
          const dy = points[i].y - points[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < maxDist) {
            const alpha = (1 - dist / maxDist) * 0.25;
            ctx.beginPath();
            ctx.moveTo(points[i].x, points[i].y);
            ctx.lineTo(points[j].x, points[j].y);
            ctx.strokeStyle = `hsla(210, 30%, 50%, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      // Draw points
      for (const p of points) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 50%, 70%, 0.8)`;
        ctx.fill();

        // Glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 50%, 60%, 0.08)`;
        ctx.fill();
      }
    }
  },
  {
    name: "Strata",
    description: "Layered geological formations",
    session: 2,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#0a0810';
      ctx.fillRect(0, 0, w, h);

      const layers = 25;
      const baseHue = rng() * 360;

      for (let l = 0; l < layers; l++) {
        const y0 = (h / layers) * l;
        const hue = (baseHue + l * 8) % 360;
        const light = 8 + (l / layers) * 20;

        ctx.beginPath();
        ctx.moveTo(0, y0);

        let prevY = y0;
        for (let x = 0; x <= w; x += 4) {
          const n = noise2d(x * 0.005 + l * 10, l * 0.3, seed);
          const y = y0 + n * 40 + Math.sin(x * 0.01 + l) * 15;
          ctx.lineTo(x, y);
          prevY = y;
        }

        ctx.lineTo(w, h);
        ctx.lineTo(0, h);
        ctx.closePath();

        ctx.fillStyle = `hsla(${hue}, 30%, ${light}%, 0.7)`;
        ctx.fill();
      }
    }
  },
  {
    name: "Orbits",
    description: "Elliptical traces around invisible centres",
    session: 2,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#08080e';
      ctx.fillRect(0, 0, w, h);

      const centres = 3 + Math.floor(rng() * 3);

      for (let c = 0; c < centres; c++) {
        const cx = w * 0.2 + rng() * w * 0.6;
        const cy = h * 0.2 + rng() * h * 0.6;
        const orbits = 15 + Math.floor(rng() * 20);
        const baseHue = rng() * 360;

        for (let o = 0; o < orbits; o++) {
          const rx = 20 + rng() * 180;
          const ry = 20 + rng() * 180;
          const rot = rng() * Math.PI * 2;
          const hue = (baseHue + o * 5) % 360;

          ctx.beginPath();
          for (let a = 0; a <= Math.PI * 2; a += 0.02) {
            const x = cx + Math.cos(a + rot) * rx - Math.sin(a + rot) * ry * 0.3;
            const y = cy + Math.sin(a + rot) * rx + Math.cos(a + rot) * ry * 0.3;
            if (a === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }

          ctx.strokeStyle = `hsla(${hue}, 40%, 55%, 0.12)`;
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }
    }
  },
  {
    name: "Interference",
    description: "Overlapping wave sources creating moiré patterns",
    session: 3,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#060610';
      ctx.fillRect(0, 0, w, h);

      // Place wave sources
      const sources = 3 + Math.floor(rng() * 4);
      const pts = [];
      for (let i = 0; i < sources; i++) {
        pts.push({
          x: rng() * w,
          y: rng() * h,
          freq: 0.015 + rng() * 0.03,
          phase: rng() * Math.PI * 2,
          hue: rng() * 360
        });
      }

      // Render pixel by pixel (using imagedata for speed)
      const imgData = ctx.createImageData(w, h);
      const d = imgData.data;

      for (let py = 0; py < h; py++) {
        for (let px = 0; px < w; px++) {
          let val = 0;
          let hueSum = 0, hueWeight = 0;

          for (const src of pts) {
            const dist = Math.hypot(px - src.x, py - src.y);
            const wave = Math.sin(dist * src.freq + src.phase);
            const atten = 1 / (1 + dist * 0.003);
            val += wave * atten;
            hueSum += src.hue * Math.abs(wave * atten);
            hueWeight += Math.abs(wave * atten);
          }

          val = val / sources;
          const brightness = Math.abs(val);
          const hue = hueWeight > 0 ? hueSum / hueWeight : 200;

          // HSL to RGB (simplified)
          const l = brightness * 0.4;
          const s = 0.5;
          const c = (1 - Math.abs(2 * l - 1)) * s;
          const x = c * (1 - Math.abs(((hue / 60) % 2) - 1));
          const m = l - c / 2;
          let r, g, b;
          const h6 = (hue / 60) % 6;
          if (h6 < 1) { r = c; g = x; b = 0; }
          else if (h6 < 2) { r = x; g = c; b = 0; }
          else if (h6 < 3) { r = 0; g = c; b = x; }
          else if (h6 < 4) { r = 0; g = x; b = c; }
          else if (h6 < 5) { r = x; g = 0; b = c; }
          else { r = c; g = 0; b = x; }

          const idx = (py * w + px) * 4;
          d[idx] = Math.round((r + m) * 255);
          d[idx + 1] = Math.round((g + m) * 255);
          d[idx + 2] = Math.round((b + m) * 255);
          d[idx + 3] = 255;
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }
  },
  {
    name: "Topology",
    description: "Contour lines of an imagined landscape",
    session: 4,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#070810';
      ctx.fillRect(0, 0, w, h);

      // Generate height field using layered noise
      const levels = 20;
      const baseHue = 160 + rng() * 80;
      const offsetX = rng() * 1000;
      const offsetY = rng() * 1000;

      for (let level = 0; level < levels; level++) {
        const threshold = level / levels;
        const hue = (baseHue + level * 6) % 360;
        const light = 15 + level * 2;
        ctx.strokeStyle = `hsla(${hue}, 35%, ${light}%, 0.6)`;
        ctx.lineWidth = 0.8;

        // March across grid to find contour crossings
        const step = 4;
        for (let y = 0; y < h; y += step) {
          for (let x = 0; x < w; x += step) {
            const v00 = heightAt(x, y);
            const v10 = heightAt(x + step, y);
            const v01 = heightAt(x, y + step);
            const v11 = heightAt(x + step, y + step);

            // Simple marching squares
            const c = (v00 > threshold ? 8 : 0) | (v10 > threshold ? 4 : 0) |
                      (v11 > threshold ? 2 : 0) | (v01 > threshold ? 1 : 0);

            if (c === 0 || c === 15) continue;

            const points = [];
            if ((c & 12) === 4 || (c & 12) === 8) {
              const t = (threshold - v00) / (v10 - v00);
              points.push([x + t * step, y]);
            }
            if ((c & 6) === 2 || (c & 6) === 4) {
              const t = (threshold - v10) / (v11 - v10);
              points.push([x + step, y + t * step]);
            }
            if ((c & 3) === 1 || (c & 3) === 2) {
              const t = (threshold - v01) / (v11 - v01);
              points.push([x + t * step, y + step]);
            }
            if ((c & 9) === 1 || (c & 9) === 8) {
              const t = (threshold - v00) / (v01 - v00);
              points.push([x, y + t * step]);
            }

            if (points.length >= 2) {
              ctx.beginPath();
              ctx.moveTo(points[0][0], points[0][1]);
              ctx.lineTo(points[1][0], points[1][1]);
              ctx.stroke();
            }
          }
        }
      }

      function heightAt(px, py) {
        return noise2d(px * 0.006 + offsetX, py * 0.006 + offsetY, seed) * 0.5 +
               noise2d(px * 0.015 + offsetX, py * 0.015 + offsetY, seed + 1) * 0.3 +
               noise2d(px * 0.04 + offsetX, py * 0.04 + offsetY, seed + 2) * 0.2;
      }
    }
  },
  {
    name: "Spirograph",
    description: "Hypotrochoid curves with harmonic ratios",
    session: 4,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#08060c';
      ctx.fillRect(0, 0, w, h);

      const cx = w / 2, cy = h / 2;
      const curves = 5 + Math.floor(rng() * 4);

      for (let c = 0; c < curves; c++) {
        const R = 60 + rng() * 100;
        const r = R * (0.2 + rng() * 0.6);
        const d = r * (0.5 + rng() * 1.5);
        const hue = (rng() * 360) | 0;
        const rotOffset = rng() * Math.PI * 2;

        ctx.beginPath();
        const steps = 2000;
        for (let i = 0; i <= steps; i++) {
          const t = (i / steps) * Math.PI * 2 * Math.ceil(r / gcd(R, r));
          const x = cx + (R - r) * Math.cos(t + rotOffset) + d * Math.cos((R - r) / r * t + rotOffset);
          const y = cy + (R - r) * Math.sin(t + rotOffset) + d * Math.sin((R - r) / r * t + rotOffset);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.strokeStyle = `hsla(${hue}, 60%, 55%, 0.15)`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }

      function gcd(a, b) {
        a = Math.round(Math.abs(a));
        b = Math.round(Math.abs(b));
        while (b) { [a, b] = [b, a % b]; }
        return a || 1;
      }
    }
  },
  {
    name: "Growth",
    description: "Branching structures seeking light",
    session: 2,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#060a08';
      ctx.fillRect(0, 0, w, h);

      const baseHue = 100 + rng() * 60;

      function branch(x, y, angle, length, depth, thickness) {
        if (depth <= 0 || length < 3) return;

        const endX = x + Math.cos(angle) * length;
        const endY = y + Math.sin(angle) * length;

        const hue = (baseHue + depth * 8) % 360;
        const light = 20 + depth * 5;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = `hsla(${hue}, 40%, ${light}%, 0.6)`;
        ctx.lineWidth = thickness;
        ctx.stroke();

        const branches = 2 + (rng() < 0.3 ? 1 : 0);
        for (let b = 0; b < branches; b++) {
          const spread = 0.3 + rng() * 0.5;
          const newAngle = angle + (rng() - 0.5) * spread * 2;
          const shrink = 0.6 + rng() * 0.2;
          branch(endX, endY, newAngle, length * shrink, depth - 1, thickness * 0.7);
        }
      }

      const trees = 3 + Math.floor(rng() * 3);
      for (let t = 0; t < trees; t++) {
        const startX = w * 0.1 + rng() * w * 0.8;
        branch(startX, h, -Math.PI / 2 + (rng() - 0.5) * 0.3, 60 + rng() * 40, 9, 3);
      }
    }
  },
  {
    name: "Filament",
    description: "Cosmic web structures — tendrils of light connecting nodes in the void",
    session: 6,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      ctx.fillStyle = '#050510';
      ctx.fillRect(0, 0, w, h);

      // Generate nodes
      const nodeCount = 40 + Math.floor(rng() * 30);
      const nodes = [];
      for (let i = 0; i < nodeCount; i++) {
        nodes.push({
          x: rng() * w, y: rng() * h,
          mass: 0.3 + rng() * 0.7,
          hue: 200 + rng() * 80
        });
      }

      // Connect nearby nodes with filaments
      const baseHue = 200 + rng() * 60;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
          const maxDist = 120 + (nodes[i].mass + nodes[j].mass) * 60;
          if (d < maxDist) {
            const alpha = (1 - d / maxDist) * 0.15 * (nodes[i].mass + nodes[j].mass);
            // Draw curved filament
            const mx = (nodes[i].x + nodes[j].x) / 2 + (rng() - 0.5) * 40;
            const my = (nodes[i].y + nodes[j].y) / 2 + (rng() - 0.5) * 40;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.quadraticCurveTo(mx, my, nodes[j].x, nodes[j].y);
            const hue = (baseHue + d * 0.3) % 360;
            ctx.strokeStyle = `hsla(${hue}, 50%, 60%, ${alpha})`;
            ctx.lineWidth = 0.5 + (nodes[i].mass + nodes[j].mass) * 0.5;
            ctx.stroke();
          }
        }
      }

      // Draw node glows
      ctx.globalCompositeOperation = 'screen';
      for (const n of nodes) {
        const r = 8 + n.mass * 25;
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
        grad.addColorStop(0, `hsla(${n.hue}, 60%, 70%, ${0.3 + n.mass * 0.3})`);
        grad.addColorStop(0.4, `hsla(${n.hue}, 50%, 50%, ${0.1 + n.mass * 0.1})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(n.x - r, n.y - r, r * 2, r * 2);
      }

      // Scatter dim background stars
      for (let i = 0; i < 200; i++) {
        const sx = rng() * w, sy = rng() * h;
        const brightness = rng() * 0.3;
        ctx.fillStyle = `hsla(${baseHue + rng() * 40}, 30%, 80%, ${brightness})`;
        const size = rng() < 0.1 ? 2 : 1;
        ctx.fillRect(sx, sy, size, size);
      }
      ctx.globalCompositeOperation = 'source-over';
    }
  },
  {
    name: "Tide",
    description: "Concentric wave interference — ripples meeting on still water",
    session: 7,
    render(ctx, w, h, seed) {
      const rng = mulberry32(seed);
      // Deep water background
      ctx.fillStyle = '#050a12';
      ctx.fillRect(0, 0, w, h);

      // Place 3-5 wave sources
      const sources = [];
      const numSources = 3 + Math.floor(rng() * 3);
      for (let i = 0; i < numSources; i++) {
        sources.push({
          x: w * 0.15 + rng() * w * 0.7,
          y: h * 0.15 + rng() * h * 0.7,
          phase: rng() * Math.PI * 2,
          freq: 0.02 + rng() * 0.03,
          amp: 0.5 + rng() * 0.5
        });
      }

      // Render wave interference pixel by pixel using imageData
      const imageData = ctx.createImageData(w, h);
      const data = imageData.data;
      const baseHue = 195 + rng() * 30; // blue-teal range

      for (let py = 0; py < h; py++) {
        for (let px = 0; px < w; px++) {
          let val = 0;
          for (const s of sources) {
            const dx = px - s.x;
            const dy = py - s.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            val += s.amp * Math.sin(dist * s.freq + s.phase);
          }
          // Normalise to 0-1
          val = (val / numSources + 1) * 0.5;

          // Map to colour — dark water with bright interference peaks
          const bright = Math.pow(val, 3) * 0.7 + val * 0.15;
          const hue = baseHue + val * 20;
          // HSL to RGB approximation

        const t = (i / steps) * Math.PI * 2;

        for (const c of coeffs) {
          const angle = c.freq * t + c.phase;
          px += c.amp * Math.cos(angle);
          py += c.amp * Math.sin(angle);

        path.push({ x: cx + px * scale, y: cy + py * scale });

      ctx.lineWidth = 1;

      const drawT = (0.3 + rng() * 0.5) * Math.PI * 2;

      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= traceSteps; i++) {
        const p = path[i];
        i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();

      // Draw epicycle circles at the current time

          if (d.trail.length > d.trailMax) d.trail.shift();

          // Draw trail
          for (let ti = 0; ti < d.trail.length; ti++) {
            const tp = d.trail[ti];

            ctx.globalAlpha = fade * 0.04;
            ctx.fillStyle = 'rgba(180,200,230,0.3)';

          ctx.fillStyle = 'rgba(180,200,230,0.4)';
          ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2); ctx.fill();

            d.x = Math.random() * w;
            d.speed = 0.3 + Math.random() * 1.2;
            d.trail = [];
          }
        }

        ctx.globalAlpha = 1;
        return requestAnimationFrame(frame);
      }

    }

      const palettes = [

        ['#8a3a5a', '#ba4a7a', '#da6a9a', '#ea8aba', '#a04060'],  // rose
        ['#3a8a4a', '#5aba6a', '#7ada8a', '#9aeaaa', '#40a050'],  // forest
        ['#8a6a2a', '#baa04a', '#dac06a', '#eada8a', '#a08040'],  // amber
        ['#5a3a8a', '#7a5aba', '#9a7ada', '#ba9aea', '#6040a0'],  // violet
      ];
      const pal = palettes[Math.floor(rng() * palettes.length)];

      // Noise function for the flow field
      function flowAngle(x, y) {
        // Multi-octave noise → angle
        let nx = x / w * 3;
        let ny = y / h * 3;
        let val = 0, amp = 1, freq = 1;
        for (let o = 0; o < 4; o++) {
          val += noise2d(nx * freq, ny * freq, seed + o * 31) * amp;
          amp *= 0.5;
          freq *= 2;
        }
        return val * Math.PI * 4;

      const numParticles = 800;
      for (let p = 0; p < numParticles; p++) {
        let x = rng() * w;
        let y = rng() * h;

        const color = pal[Math.floor(rng() * pal.length)];
        const lineWidth = 0.3 + rng() * 1.2;

        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.globalAlpha = 0.06 + rng() * 0.08;
        ctx.beginPath();
        ctx.moveTo(x, y);

        for (let s = 0; s < steps; s++) {
          const angle = flowAngle(x, y);
          const speed = 1.5;
          x += Math.cos(angle) * speed;
          y += Math.sin(angle) * speed;

          // Stop if out of bounds
          if (x < -10 || x > w + 10 || y < -10 || y > h + 10) break;

          ctx.lineTo(x, y);
        }
        ctx.stroke();

        let x = rng() * w;
        let y = rng() * h;

        const color = pal[Math.floor(rng() * pal.length)];

        ctx.lineWidth = 1.5 + rng() * 0.5;
        ctx.globalAlpha = 0.15 + rng() * 0.1;
        ctx.beginPath();
        ctx.moveTo(x, y);

        for (let s = 0; s < steps; s++) {
          const angle = flowAngle(x, y);
          x += Math.cos(angle) * 2;
          y += Math.sin(angle) * 2;
          if (x < -10 || x > w + 10 || y < -10 || y > h + 10) break;
          ctx.lineTo(x, y);

        ctx.stroke();

        const dy = rng() * h;
        const dr = 1 + rng() * 2;
        ctx.globalAlpha = 0.2 + rng() * 0.15;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(dx, dy, dr, 0, Math.PI * 2);
        ctx.fill();

      ctx.globalAlpha = 1;

      const matrix = [];
      for (let i = 0; i < 6; i++) {
        matrix[i] = [];
        for (let j = 0; j < 6; j++) {

      const N = 600;

          vx: 0, vy: 0,
          s: i % 6
        });

      const rMax = Math.min(w, h) * 0.08;
      const friction = 0.5;
      const dt = 0.02;

      for (let step = 0; step < 300; step++) {
        for (let i = 0; i < N; i++) {
          let fx = 0, fy = 0;
          const p = particles[i];
          for (let j = 0; j < N; j++) {
            if (i === j) continue;
            const q = particles[j];
            const dx = q.x - p.x;
            const dy = q.y - p.y;
            const d2 = dx * dx + dy * dy;
            if (d2 > rMax * rMax || d2 < 1) continue;
            const d = Math.sqrt(d2);
            const rn = d / rMax;
            const beta = 0.3;
            let f;
            if (rn < beta) {
              f = rn / beta - 1;
            } else if (rn < 1) {
              f = matrix[p.s][q.s] * (1 - Math.abs(2 * rn - 1 - beta) / (1 - beta));
            } else {
              f = 0;

            fx += (dx / d) * f;
            fy += (dy / d) * f;

          p.vx = (p.vx + fx * rMax * dt) * (1 - friction);
          p.vy = (p.vy + fy * rMax * dt) * (1 - friction);

        for (let i = 0; i < N; i++) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;

          if (p.x >= w) { p.x = w - 1; p.vx *= -0.5; }

        ctx.lineWidth = 0.5;

        ctx.fill();

// === Utilities ===

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function noise2d(x, y, seed) {
  // Simple value noise
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);

  function hash(px, py) {
    let h = (px * 374761393 + py * 668265263 + seed * 1274126177) | 0;
    h = (h ^ (h >> 13)) * 1274126177;
    return ((h ^ (h >> 16)) >>> 0) / 4294967296;
  }

  const n00 = hash(ix, iy);
  const n10 = hash(ix + 1, iy);
  const n01 = hash(ix, iy + 1);
  const n11 = hash(ix + 1, iy + 1);

  return n00 * (1-sx) * (1-sy) + n10 * sx * (1-sy) + n01 * (1-sx) * sy + n11 * sx * sy;
}

let showFavouritesOnly = false;
let newestFirst = false;

// Favourites stored in localStorage
function getFavourites() {
  try { return JSON.parse(localStorage.getItem('gallery-favs') || '[]'); }
  catch { return []; }
}
function setFavourites(favs) {
  localStorage.setItem('gallery-favs', JSON.stringify(favs));
}
function isFav(name) { return getFavourites().includes(name); }
function toggleFav(name) {
  const favs = getFavourites();
  const idx = favs.indexOf(name);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push(name);
  setFavourites(favs);
  // Update star button without full re-render
  document.querySelectorAll(`[data-piece-name="${CSS.escape(name)}"]`).forEach(btn => {
    btn.classList.toggle('faved', favs.includes(name));
    btn.textContent = favs.includes(name) ? '\u2605' : '\u2606';
  });
  // Update filter count
  updateFavCount();
}
function updateFavCount() {
  const n = getFavourites().length;
  document.getElementById('btnFav').textContent = n > 0 ? `Favourites (${n})` : 'Favourites';
}

function getDisplayPieces() {
  let list = pieces.map((p, i) => ({ ...p, _idx: i }));
  if (showAnimatedOnly) list = list.filter(p => p.animate);
  if (showFavouritesOnly) { const favs = getFavourites(); list = list.filter(p => favs.includes(p.name)); }
  if (newestFirst) list = list.slice().reverse();
  return list;
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  const display = getDisplayPieces();

  display.forEach((piece) => {
    const div = document.createElement('div');
    div.className = 'piece';

    const canvas = document.createElement('canvas');
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    canvas.onclick = () => openFullscreen(piece);

    const info = document.createElement('div');
    info.className = 'piece-info';
    const faved = isFav(piece.name);
    info.innerHTML = `<div class="piece-text"><h3>${piece.name}${piece.animate ? ' <span style="color:#4a5a80;font-size:0.7em">animated</span>' : ''}</h3><p>${piece.description} · Session ${piece.session}</p></div><button class="fav-btn${faved ? ' faved' : ''}" data-piece-name="${piece.name}" onclick="event.stopPropagation();toggleFav('${piece.name.replace(/'/g, "\\'")}')">${faved ? '\u2605' : '\u2606'}</button>`;

    div.appendChild(canvas);
    div.appendChild(info);
    gallery.appendChild(div);

    const ctx = canvas.getContext('2d');
    piece.render(ctx, canvasWidth, canvasHeight, currentSeed + piece._idx * 7919);
  });
}

function filterAnimated() {
  showAnimatedOnly = !showAnimatedOnly;
  if (showAnimatedOnly) showFavouritesOnly = false;
  document.getElementById('btnAnimated').style.background = showAnimatedOnly ? '#2a2a5e' : '';
  document.getElementById('btnFav').style.background = '';
  document.getElementById('btnClear').style.display = (showAnimatedOnly || showFavouritesOnly || newestFirst) ? '' : 'none';
  renderGallery();
}

function filterFavourites() {
  showFavouritesOnly = !showFavouritesOnly;
  if (showFavouritesOnly) showAnimatedOnly = false;
  document.getElementById('btnFav').style.background = showFavouritesOnly ? '#2a2a5e' : '';
  document.getElementById('btnAnimated').style.background = '';
  document.getElementById('btnClear').style.display = (showAnimatedOnly || showFavouritesOnly || newestFirst) ? '' : 'none';
  renderGallery();
}

function toggleOrder() {
  newestFirst = !newestFirst;
  document.getElementById('btnOrder').textContent = newestFirst ? 'Oldest First' : 'Newest First';
  document.getElementById('btnClear').style.display = (showAnimatedOnly || newestFirst) ? '' : 'none';
  renderGallery();
}

function clearFilters() {
  showAnimatedOnly = false;
  showFavouritesOnly = false;
  newestFirst = false;
  document.getElementById('btnAnimated').style.background = '';
  document.getElementById('btnFav').style.background = '';
  document.getElementById('btnOrder').textContent = 'Newest First';
  document.getElementById('btnClear').style.display = 'none';
  renderGallery();
}

function regenerateAll() {
  currentSeed = Date.now();
  renderGallery();
}

function addNewPiece() {
  // Clone a random existing piece with variation
  const base = pieces[Math.floor(Math.random() * pieces.length)];
  const variant = { ...base, name: base.name + ' (variant)', session: 2 };
  pieces.push(variant);
  renderGallery();
}

let animationFrameId = null;

function openFullscreen(piece) {
  const overlay = document.getElementById('overlay');
  const canvas = document.getElementById('fullCanvas');
  canvas.width = 1200;
  canvas.height = 800;
  const ctx = canvas.getContext('2d');

  currentFullscreenPiece = piece;
  if (piece.animate) {
    animationFrameId = piece.animate(ctx, 1200, 800);
  } else {
    piece.render(ctx, 1200, 800, currentSeed + pieces.indexOf(piece) * 7919);
  }
  overlay.classList.add('active');
}

function closeFullscreen() {
  if (animationFrameId && animationFrameId !== -1) {
    cancelAnimationFrame(animationFrameId);
  }
  animationFrameId = null;
  currentFullscreenPiece = null;
  document.getElementById('overlay').classList.remove('active');
}

function randomFullscreen() {
  const piece = pieces[Math.floor(Math.random() * pieces.length)];
  currentSeed = Math.floor(Math.random() * 100000);
  openFullscreen(piece);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFullscreen();
  if (e.key === 'r') regenerateAll();
  if (e.key === ' ' && document.getElementById('overlay').classList.contains('active')) {
    e.preventDefault();
    closeFullscreen();
    setTimeout(randomFullscreen, 100);
  }
});

// Pause animated pieces when tab is hidden to save CPU
let currentFullscreenPiece = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden && animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = -1; // sentinel: paused, not closed
  } else if (!document.hidden && animationFrameId === -1 && currentFullscreenPiece) {
    const canvas = document.getElementById('fullCanvas');
    const ctx = canvas.getContext('2d');
    animationFrameId = currentFullscreenPiece.animate(ctx, 1200, 800);
  }
});

renderGallery();
updateFavCount();
</script>
</body>
</html>
