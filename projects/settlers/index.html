    case 'toolmaker': {
      V(0, 0, 2, 1.2, { wh: 12, rh: 10, roofType: 'gable', door: 0.3, winsL: [{ u: 0.7, h: 5 }], winsR: [{ u: 0.5, h: 5 }] });
      // open smithy lean-to with anvil + quench barrel
      V(0.25, 1.3, 1.5, 2, { wh: 7, rh: 6, roofType: 'shed', openL: true });
      var av = fp(0.8, 1.65, n);
      g.fillStyle = '#4e5258';
      g.fillRect(av.x - 1.4, av.y - 4.4, 2.8, 2.2);
      g.fillStyle = '#62666c';
      g.beginPath();
      g.moveTo(av.x - 3.4, av.y - 4.4); g.lineTo(av.x + 3.4, av.y - 4.4);
      g.lineTo(av.x + 2.2, av.y - 6); g.lineTo(av.x - 1.6, av.y - 6);
      g.closePath(); g.fill();
      g.fillStyle = '#5a4632';
      g.fillRect(av.x - 2, av.y - 2.2, 4, 2.2);
      g.fillStyle = '#7a5c38';
      g.beginPath(); g.ellipse(av.x + 7, av.y - 2, 2.6, 3.2, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#2c3e50';
      g.beginPath(); g.ellipse(av.x + 7, av.y - 5, 2.2, 0.9, 0, 0, Math.PI * 2); g.fill();
      break;
    }

    case 'mint': {
      V(0, 0, 2, 1.35, { wh: 16, rh: 11, roofType: 'hip', door: 0.55, tallWin: true,
        winsL: [{ u: 0.25, h: 7 }], winsR: [{ u: 0.3, h: 7 }, { u: 0.65, h: 7 }] });
      // gold-roofed cupola
      var cu = fp(0.95, 0.65, n);
      paintTowerRound(g, cu.x, cu.y - 16 - 11 + 4, 5, 7, { wall: '#cebe98', roof: '#d8ae34', cone: true, rh: 7, wint: wint });
      // coin sign
      var cs = fp(1.55, 1.4, n);
      g.fillStyle = '#eccb4e';
      g.beginPath(); g.arc(cs.x, cs.y - 18, 3.2, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#a8851e';
      g.beginPath(); g.arc(cs.x, cs.y - 18, 2, 0, Math.PI * 2); g.fill();
      g.fillStyle = 'rgba(255,255,240,0.7)';
      g.beginPath(); g.arc(cs.x - 1, cs.y - 19, 0.7, 0, Math.PI * 2); g.fill();
      break;
    }

    case 'guard': {
      paintTowerRound(g, 0, 2, 13, 27, { wall: st.wall, crenel: true, slits: true, wint: wint });
      paintDoorOn(g, { x: -13, y: 2 }, { x: 2, y: 8.5 }, 0.45, 8);
      _anchReg.guard.banner = { x: 0, y: 2 - 27 - 2 };
      _anchReg.guard.door = { x: -6, y: 5 };
      break;
    }

    case 'cottage': {
      V(0, 0, 1, 0.8, { wh: 10, rh: 9, roofType: 'gable', thatch: true, timber: true, door: 0.45, winsR: [{ u: 0.45, h: 4 }] });
      // garden: fence + veg rows
      paintFencePosts(g, [fp(0.02, 0.88, n), fp(0.4, 0.92, n), fp(0.8, 0.95, n), fp(1, 1, n)]);
      for (var vg = 0; vg < 2; vg++) {
        for (var vc = 0; vc < 4; vc++) {
          var vps = fp(0.14 + vc * 0.24, 0.94 + vg * 0.05, n);
          g.fillStyle = wint ? '#aab8c2' : ['#4d9440', '#73a02c'][vg];
          g.beginPath(); g.arc(vps.x, vps.y - 1, 1.1, 0, Math.PI * 2); g.fill();
        }
      }
      break;
    }

    case 'house': {
      V(0, 0, 1.55, 1.25, { wh: 19, rh: 11, roofType: 'gable', timber: true, door: 0.6, tallWin: false,
        winsL: [{ u: 0.25, h: 7.4 }, { u: 0.25, h: 14 }, { u: 0.7, h: 14 }],
        winsR: [{ u: 0.35, h: 7.4 }, { u: 0.35, h: 14 }, { u: 0.72, h: 14 }] });
      // attached low annex
      V(1.6, 0.25, 2, 1.05, { wh: 9, rh: 7, roofType: 'shed', mat: 'plank', wall: '#a08a64', roof: '#74583a' });
      break;
    }

    case 'tavern': {
      V(0, 0, 2, 1.15, { wh: 15, rh: 11, roofType: 'gable', timber: true, door: 0.55,
        winsL: [{ u: 0.22, h: 5.5 }, { u: 0.8, h: 5.5 }], winsR: [{ u: 0.3, h: 5.5 }, { u: 0.65, h: 5.5 }] });
      V(1.25, 1.25, 2, 2, { wh: 9, rh: 8, roofType: 'hip' });
      // striped awning over door
      var aw = fp(0.45, 1.18, n);
      for (var as2 = 0; as2 < 5; as2++) {
        g.fillStyle = as2 % 2 ? '#b8453c' : '#e8e0cc';
        polyFill(g, [
          { x: aw.x - 7 + as2 * 2.8, y: aw.y - 9 },
          { x: aw.x - 4.2 + as2 * 2.8, y: aw.y - 9 + 1.4 },
          { x: aw.x - 2.8 + as2 * 2.8, y: aw.y - 5 + 1.4 },
          { x: aw.x - 5.6 + as2 * 2.8, y: aw.y - 5 }
        ], as2 % 2 ? '#b8453c' : '#e8e0cc');
      }
      // hanging sign + barrels
      var sB = fp(1.7, 1.2, n);
      g.strokeStyle = '#54402c'; g.lineWidth = 1;
      g.beginPath(); g.moveTo(sB.x, sB.y - 14); g.lineTo(sB.x, sB.y - 9); g.stroke();
      g.fillStyle = '#d2b268';
      g.fillRect(sB.x - 3, sB.y - 9, 6, 5);
      g.strokeStyle = 'rgba(60,40,18,0.7)'; g.lineWidth = 0.5;
      g.strokeRect(sB.x - 3, sB.y - 9, 6, 5);
      g.fillStyle = '#7a5220';
      g.fillRect(sB.x - 1.4, sB.y - 7.8, 2.8, 2.6);
      for (var brl = 0; brl < 2; brl++) {
        var bp = fp(0.12 + brl * 0.16, 1.3, n);
        g.fillStyle = '#7a5c38';
        g.beginPath(); g.ellipse(bp.x, bp.y - 3, 2.8, 3.5, 0, 0, Math.PI * 2); g.fill();
        g.strokeStyle = 'rgba(180,180,190,0.5)'; g.lineWidth = 0.5;
        g.beginPath(); g.ellipse(bp.x, bp.y - 3.8, 2.7, 1.2, 0, 0, Math.PI * 2); g.stroke();
      }
      break;
    }

    default: {
      V(0, 0, n, n, { wh: st.wh || 12, rh: st.rh || (8 + n * 3), roofType: 'hip', door: 0.58,
        winsL: [{ u: 0.28, h: (st.wh || 12) * 0.42 }], winsR: [{ u: 0.5, h: (st.wh || 12) * 0.42 }] });
    }
  }

  // generic chimney for types that kept it (bakery/smelter draw their own)
  if (st.chimney && type !== 'bakery' && type !== 'smelter') {
    var Lg2 = localGeom(n);
    var chB = { x: (Lg2.N.x + Lg2.E.x) * 0.5 * 0.55, y: (Lg2.N.y + Lg2.E.y) * 0.5 * 0.55 - (st.wh || 12) };
    var chH = (st.rh || 10) + 8;
    g.fillStyle = '#605a52';
    g.fillRect(chB.x - 2.2, chB.y - chH, 4.4, chH);
    g.fillStyle = '#79726a';
    g.fillRect(chB.x - 2.2, chB.y - chH, 1.7, chH);
    g.fillStyle = '#3c3833';
    g.fillRect(chB.x - 3, chB.y - chH - 1.6, 6, 2);
  }

  // base contact outline
  var Lg3 = localGeom(n);
  g.strokeStyle = 'rgba(18,14,8,0.30)';
  g.lineWidth = 0.7;
  g.beginPath();
  g.moveTo(Lg3.W.x, Lg3.W.y + 4); g.lineTo(Lg3.S.x, Lg3.S.y + 4); g.lineTo(Lg3.E.x, Lg3.E.y + 4);
  g.stroke();
}

function getBuildingSprite(type, wint) {
  var def = BLDG[type];
  var st = BLDG_STYLE[type] || {};
  var n = def.size;
  var wh = st.wh || 12, rh = st.rh || (8 + n * 3);
  if (st.custom === 'well') { wh = 10; rh = 16; }
  var topM = st.topM || 0;
  var w = 64 * n + 88;
  var h = 32 * n + wh + rh + topM + 64;
  return getSprite('b:' + type + ':' + (wint ? 'w' : 's'), w, h, w / 2, 16 * n + wh + rh + topM + 30, function (g) {
    paintBuildingSprite(g, type, wint);
  });
}

function drawBuilding(b) {
  var def = BLDG[b.type];
  var st = BLDG_STYLE[b.type] || { wall: def.color, roof: '#7a4020', wh: 12, mat: 'plank' };
  var gm = buildingGeom(b);
  var sc = worldToScreen(gm.c.x, gm.c.y);
  var pad = 180 * cam.zoom;
  if (sc.x < -pad || sc.x > canvas.width + pad || sc.y < -pad || sc.y > canvas.height + pad) return;

  var n = gm.n;
  var wh = st.custom === 'well' ? 10 : (st.wh || 12);
  var rh = st.custom === 'well' ? 14 : (st.rh || (8 + n * 3));
  var daylight = getDaylight();

  if (!b.built) {
    ctx.save();
    ctx.translate(cam.x, cam.y);
    ctx.scale(cam.zoom, cam.zoom);
    drawConstruction(b, gm, wh);
    ctx.restore();
    drawBuildingOverlays(b, gm, wh + rh);
    return;
  }

  if (st.fields) {
    var fSeason = getSeason();
    if (fSeason !== 3) {
      ctx.save();
      ctx.translate(cam.x, cam.y);
      ctx.scale(cam.zoom, cam.zoom);
      ctx.translate(gm.c.x, gm.c.y);
      var cropA = fSeason === 0 ? 'rgba(120,170,80,0.55)' : 'rgba(208,178,72,0.6)';
      var cropB = fSeason === 0 ? 'rgba(96,140,60,0.55)' : 'rgba(178,148,52,0.6)';
      var fw = (gm.E.x - gm.W.x);
      for (var fp2 = 0; fp2 < 2; fp2++) {
        var fox = fp2 === 0 ? -fw * 0.62 : fw * 0.34;
        var foy = fp2 === 0 ? 6 : 14;
        for (var row = 0; row < 4; row++) {
          polyFill(ctx, [
            { x: fox + row * 5, y: foy + row * 2.5 },
            { x: fox + row * 5 + 16, y: foy + row * 2.5 + 8 },
            { x: fox + row * 5 + 19, y: foy + row * 2.5 + 6.5 },
            { x: fox + row * 5 + 3, y: foy + row * 2.5 - 1.5 }
          ], row % 2 ? cropA : cropB);
        }
      }
      ctx.restore();
    }
  }

  var blend = getSeasonBlend();
  var wA = (blend.from === 3 ? 1 - blend.t : 0) + (blend.to === 3 ? blend.t : 0);
  blitSprite(getBuildingSprite(b.type, false), gm.c.x, gm.c.y);
  if (wA > 0.02) blitSprite(getBuildingSprite(b.type, true), gm.c.x, gm.c.y, wA);

  ctx.save();
  ctx.translate(cam.x, cam.y);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(gm.c.x, gm.c.y);
  drawBuildingLive(b, st, n, wh, rh, daylight);
  ctx.restore();

  drawBuildingOverlays(b, gm, wh + rh + (st.topM || 0));
}

// Animated bits drawn over the sprite each frame (local coords, origin = base center)
function drawBuildingLive(b, st, n, wh, rh, daylight) {
  var anch = _anchReg[b.type] || {};

  if (st.custom === 'well') {
    var bob = b.working ? Math.sin(tick * 0.05) * 2 : 0;
    ctx.strokeStyle = '#3c3327'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(0, -8 + bob); ctx.stroke();
    ctx.fillStyle = '#54402c';
    ctx.fillRect(-2, -8 + bob, 4, 3);
    return;
  }

  // night windows
  if (daylight < 0.5) {
    var glow = Math.min(1, (0.5 - daylight) / 0.35);
    var wins = _winReg[b.type] || [];
    ctx.fillStyle = 'rgba(255,206,92,' + (0.65 * glow).toFixed(2) + ')';
    for (var wi2 = 0; wi2 < wins.length; wi2++) {
      var wn = wins[wi2];
      ctx.beginPath();
      ctx.moveTo(wn.x - wn.dx, wn.y - wn.dy - wn.h);
      ctx.lineTo(wn.x + wn.dx, wn.y + wn.dy - wn.h);
      ctx.lineTo(wn.x + wn.dx, wn.y + wn.dy - wn.h - 3.8);
      ctx.lineTo(wn.x - wn.dx, wn.y - wn.dy - wn.h - 3.8);
      ctx.closePath();
      ctx.fill();
    }
    if (anch.door) {
      ctx.fillStyle = 'rgba(255,190,70,' + (0.10 * glow).toFixed(3) + ')';
      ctx.beginPath();
      ctx.ellipse(anch.door.x, anch.door.y + 3, 9, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // windmill sail wheel
  if (st.sails && anch.sails) {
    var ang = b.working ? tick * 0.025 : tick * 0.004;
    var hub = anch.sails;
    ctx.strokeStyle = '#4a3a28'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(hub.x - 3, hub.y + 4); ctx.lineTo(hub.x, hub.y); ctx.stroke();
    for (var sa = 0; sa < 4; sa++) {
      var a = ang + sa * Math.PI / 2;
      var tipX = hub.x + Math.cos(a) * 18, tipY = hub.y + Math.sin(a) * 15;
      ctx.strokeStyle = '#564430'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(hub.x, hub.y); ctx.lineTo(tipX, tipY); ctx.stroke();
      var perpX = -Math.sin(a) * 3.4, perpY = Math.cos(a) * 2.8;
      polyFill(ctx, [
        { x: hub.x + Math.cos(a) * 4.5, y: hub.y + Math.sin(a) * 3.8 },
        { x: tipX, y: tipY },
        { x: tipX + perpX, y: tipY + perpY },
        { x: hub.x + Math.cos(a) * 4.5 + perpX, y: hub.y + Math.sin(a) * 3.8 + perpY }
      ], 'rgba(238,228,202,0.95)');
      ctx.strokeStyle = 'rgba(90,70,45,0.6)'; ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(hub.x + Math.cos(a) * 4.5, hub.y + Math.sin(a) * 3.8);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
    }
    ctx.fillStyle = '#3a3026';
    ctx.beginPath(); ctx.arc(hub.x, hub.y, 1.9, 0, Math.PI * 2); ctx.fill();
  }

  // sawmill blade
  if (st.blade && anch.blade) {
    ctx.strokeStyle = '#9aa0a4'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(anch.blade.x, anch.blade.y, 3.6, 0, Math.PI * 2); ctx.stroke();
    var bang = b.working ? tick * 0.15 : 0;
    ctx.beginPath();
    ctx.moveTo(anch.blade.x + Math.cos(bang) * 3.6, anch.blade.y + Math.sin(bang) * 3.6);
    ctx.lineTo(anch.blade.x - Math.cos(bang) * 3.6, anch.blade.y - Math.sin(bang) * 3.6);
    ctx.stroke();
  }

  // furnace glow
  if (st.furnace && anch.furnace) {
    var fGlow = b.working ? 0.65 + Math.sin(tick * 0.08) * 0.25 : 0.12;
    ctx.fillStyle = 'rgba(255,120,30,' + fGlow.toFixed(2) + ')';
    ctx.beginPath(); ctx.arc(anch.furnace.x, anch.furnace.y, 2.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,80,' + (fGlow * 0.5).toFixed(2) + ')';
    ctx.beginPath(); ctx.arc(anch.furnace.x, anch.furnace.y, 1.4, 0, Math.PI * 2); ctx.fill();
  }

  // banner ripple
  if (st.banner) {
    var bp2 = anch.banner || { x: 0, y: -wh - rh };
    ctx.strokeStyle = '#5a4026'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(bp2.x, bp2.y); ctx.lineTo(bp2.x, bp2.y - 12); ctx.stroke();
    var wave2 = Math.sin(tick * 0.04 + b.tx) * 1.5;
    polyFill(ctx, [
      { x: bp2.x, y: bp2.y - 12 }, { x: bp2.x + 9, y: bp2.y - 10 + wave2 }, { x: bp2.x, y: bp2.y - 7 }
    ], b.type === 'hq' ? '#d84848' : '#4a80c8');
  }

  // tavern doorway glow when serving
  if (st.sign && b.working && anch.door) {
    ctx.fillStyle = 'rgba(255,200,90,0.18)';
    ctx.beginPath();
    ctx.arc(anch.door.x, anch.door.y - 2, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // villagers pottering outside housing
  if (st.folk && cam.zoom > 0.5) {
    var seed = b.tx * 7 + b.ty * 13;
    for (var vi = 0; vi < st.folk; vi++) {
      var vx = (seed + vi * 37) % 26 - 13;
      var vy = 4 + ((seed + vi * 19) % 6);
      var vph = Math.sin(tick * 0.02 + vi * 2 + seed) * 2;
      ctx.fillStyle = 'rgba(15,25,18,0.25)';
      ctx.beginPath(); ctx.ellipse(vx + vph, vy + 1.6, 1.5, 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = ['#6a8a50', '#5a7ac0', '#a06a50', '#8a6a90', '#c08060'][vi % 5];
      ctx.beginPath(); ctx.arc(vx + vph, vy, 1.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#d0b090';
      ctx.beginPath(); ctx.arc(vx + vph, vy - 1.9, 0.85, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// Scaffolding + rising ghost walls while under construction (world-space ctx)
function drawConstruction(b, gm, wh) {
  var N = gm.N, E = gm.E, S = gm.S, W = gm.W;
  // dirt foundation
  polyFill(ctx, [N, E, S, W], 'rgba(94,74,48,0.55)');
  ctx.strokeStyle = 'rgba(60,45,28,0.7)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(N.x, N.y); ctx.lineTo(E.x, E.y); ctx.lineTo(S.x, S.y); ctx.lineTo(W.x, W.y);
  ctx.closePath(); ctx.stroke();
  // total progress: materials 80%, build 20%
  var totalMats = 0, deliveredMats = 0;
  for (var mr in b.materialsTotal) {
    totalMats += b.materialsTotal[mr];
    deliveredMats += b.materialsTotal[mr] - (b.materialsNeeded[mr] || 0);
  }
  var matProgress = totalMats > 0 ? deliveredMats / totalMats : 1;
  var rise = Math.max(0.08, matProgress * 0.5 + b.progress * 0.5) * wh;
  // ghost walls rising
  ctx.globalAlpha = 0.55;
  polyFill(ctx, [W, S, { x: S.x, y: S.y - rise }, { x: W.x, y: W.y - rise }], '#a08a64');
  polyFill(ctx, [S, E, { x: E.x, y: E.y - rise }, { x: S.x, y: S.y - rise }], '#84704e');
  ctx.globalAlpha = 1;
  // scaffold poles + cross beams
  ctx.strokeStyle = '#8a7050'; ctx.lineWidth = 1.1;
  ctx.beginPath();
  var posts = [W, S, E];
  for (var p = 0; p < posts.length; p++) {
    ctx.moveTo(posts[p].x, posts[p].y + 2);
    ctx.lineTo(posts[p].x, posts[p].y - wh - 5);
  }
  ctx.moveTo(W.x, W.y - wh - 3); ctx.lineTo(S.x, S.y - wh - 3);
  ctx.moveTo(S.x, S.y - wh - 3); ctx.lineTo(E.x, E.y - wh - 3);
  ctx.stroke();
}

// Screen-space overlays: progress bar, needs text, warnings, label
function drawBuildingOverlays(b, gm, topH) {
  var def = BLDG[b.type];
  var z = cam.zoom;
  var sc = worldToScreen(gm.c.x, gm.c.y);
  var topY = worldToScreen(gm.c.x, gm.N.y - topH).y;

  if (!b.built) {
    var totalMats = 0, deliveredMats = 0;
    for (var mr in b.materialsTotal) {
      totalMats += b.materialsTotal[mr];
      deliveredMats += b.materialsTotal[mr] - (b.materialsNeeded[mr] || 0);
    }
    var matProgress = totalMats > 0 ? deliveredMats / totalMats : 1;
    var totalProgress = matProgress * 0.8 + b.progress * 0.2;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(sc.x - 12 * z, topY - 8 * z, 24 * z, 3 * z);
    ctx.fillStyle = matProgress < 1 ? '#c0a060' : '#4a90d0';
    ctx.fillRect(sc.x - 12 * z, topY - 8 * z, 24 * z * totalProgress, 3 * z);
    if (matProgress < 1 && z > 0.6) {
      var needStr = '';
      for (var mr2 in b.materialsNeeded) {
        if (b.materialsNeeded[mr2] > 0) needStr += (needStr ? ' ' : '') + b.materialsNeeded[mr2] + mr2.charAt(0).toUpperCase();
      }
      if (needStr) {
        ctx.fillStyle = '#c0a060';
        ctx.font = Math.max(7, 8 * z) + 'px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('Need: ' + needStr, sc.x, topY - 11 * z);
      }
    }
  }

  // Disconnected warning — no road to HQ
  if (b.type !== 'hq' && z > 0.5) {
    var bFlag = getFlagAt(b.tx, b.ty + (def.size || 1));
    var disconnected = true;
    if (bFlag) {
      for (var rci = 0; rci < roads.length; rci++) {
        if ((roads[rci].from.tx === bFlag.tx && roads[rci].from.ty === bFlag.ty) ||
            (roads[rci].to.tx === bFlag.tx && roads[rci].to.ty === bFlag.ty)) {
          disconnected = false; break;
        }
      }
    }
    if (disconnected) {
      var warnPulse = 0.5 + Math.sin(tick * 0.1) * 0.3;
      ctx.fillStyle = 'rgba(225,80,55,' + warnPulse.toFixed(2) + ')';
      ctx.font = 'bold ' + Math.max(10, 12 * z) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('No road!', sc.x, topY - (b.built ? 4 : 16) * z);
    }
  }

  // Label
  if (z > 0.6) {
    ctx.font = Math.max(8, 9 * z) + 'px system-ui';
    ctx.textAlign = 'center';
    var ly = worldToScreen(gm.c.x, gm.S.y).y + 9 * z;
    ctx.fillStyle = 'rgba(8,12,20,0.45)';
    ctx.fillText(def.name, sc.x + 1, ly + 1);
    ctx.fillStyle = '#e8f0f8';
    ctx.fillText(def.name, sc.x, ly);
  }
}

function drawFlag(f) {
  var iso = isoTop(f.tx, f.ty);
  var s = worldToScreen(iso.x, iso.y);
  var z = cam.zoom;
  if (s.x < -30 || s.x > canvas.width + 30 || s.y < -40 || s.y > canvas.height + 30) return;

  // trampled earth at flag base
  ctx.fillStyle = 'rgba(112,92,62,0.45)';
  ctx.beginPath();
  ctx.ellipse(s.x, s.y, 6.5 * z, 2.8 * z, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight flags in road mode — pulsing ring to help player find connection points
  if (mode === 'road') {
    var ringPulse = 0.3 + Math.sin(tick * 0.08 + f.tx * 2 + f.ty) * 0.15;
    ctx.strokeStyle = roadStart === f ? 'rgba(80,200,80,' + ringPulse + ')' : 'rgba(200,180,80,' + ringPulse + ')';
    ctx.lineWidth = 2 * z;
    ctx.beginPath();
    ctx.arc(s.x, s.y - 7 * z, 8 * z, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Pole with highlight
  ctx.strokeStyle = '#6e5638';
  ctx.lineWidth = 1.6 * z;
  ctx.beginPath();
  ctx.moveTo(s.x, s.y);
  ctx.lineTo(s.x, s.y - 14 * z);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(220,190,140,0.5)';
  ctx.lineWidth = 0.6 * z;
  ctx.beginPath();
  ctx.moveTo(s.x - 0.4 * z, s.y);
  ctx.lineTo(s.x - 0.4 * z, s.y - 14 * z);
  ctx.stroke();

  // Rippling pennant
  var rip = Math.sin(tick * 0.06 + f.tx * 1.7 + f.ty) * 1.2 * z;
  ctx.fillStyle = '#e8c844';
  ctx.beginPath();
  ctx.moveTo(s.x, s.y - 14 * z);
  ctx.quadraticCurveTo(s.x + 3 * z, s.y - 13.5 * z + rip * 0.5, s.x + 6 * z, s.y - 12 * z + rip);
  ctx.lineTo(s.x + 5.5 * z, s.y - 11 * z + rip);
  ctx.quadraticCurveTo(s.x + 3 * z, s.y - 10.5 * z + rip * 0.5, s.x, s.y - 10 * z);
  ctx.fill();

  // Item count badges — yellow normal, orange when getting full, red when full
  if (f.items.length > 0 && cam.zoom > 0.5) {
    var full = f.items.length >= 8;
    var warn = f.items.length >= 6;
    ctx.fillStyle = full ? 'rgba(140,30,30,0.8)' : warn ? 'rgba(140,90,20,0.7)' : 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.arc(s.x, s.y - 18 * z, 5 * z, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = full ? '#ff6060' : warn ? '#ffa040' : '#ff0';
    ctx.font = Math.max(6, 7 * z) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.items.length, s.x, s.y - 18 * z);
    ctx.textBaseline = 'alphabetic';
    // Pulsing glow when full
    if (full) {
      var pulse = 0.3 + Math.sin(tick * 0.1) * 0.15;
      ctx.strokeStyle = 'rgba(255,80,80,' + pulse + ')';
      ctx.lineWidth = 1.5 * z;
      ctx.beginPath();
      ctx.arc(s.x, s.y - 18 * z, 7 * z, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Show item dots around flag base when zoomed in
    if (cam.zoom > 0.7) {
      for (var fi2 = 0; fi2 < f.items.length; fi2++) {
        var angle = (fi2 / 8) * Math.PI * 2 - Math.PI / 2;
        var dotX = s.x + Math.cos(angle) * 5 * z;
        var dotY = s.y + 2 * z + Math.sin(angle) * 3 * z;
        ctx.fillStyle = ITEM_COLORS[f.items[fi2]] || '#888';
        ctx.beginPath();
        ctx.arc(dotX, dotY, 1.5 * z, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawRoad(r) {
  // Dirt path that follows the terrain: sample elevation along the way
  var steps = Math.max(4, Math.abs(r.from.tx - r.to.tx) + Math.abs(r.from.ty - r.to.ty));
  var pts = [];
  for (var i = 0; i <= steps; i++) {
    var t = i / steps;
    var fx = r.from.tx + (r.to.tx - r.from.tx) * t;
    var fy = r.from.ty + (r.to.ty - r.from.ty) * t;
    var w = isoAt(fx, fy);
    pts.push(worldToScreen(w.x, w.y));
  }
  var z = cam.zoom;
  if (pts[0].x < -200 && pts[steps].x < -200) return;
  if (pts[0].x > canvas.width + 200 && pts[steps].x > canvas.width + 200) return;

  // edge (darker) then bed (lighter)
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(74,58,38,0.85)';
  ctx.lineWidth = 4.6 * z;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (var j = 1; j <= steps; j++) ctx.lineTo(pts[j].x, pts[j].y);
  ctx.stroke();
  ctx.strokeStyle = '#a8906a';
  ctx.lineWidth = 3 * z;
  ctx.stroke();
  // wheel ruts + scattered stones
  if (z > 0.55) {
    ctx.strokeStyle = 'rgba(90,72,48,0.55)';
    ctx.lineWidth = 0.7 * z;
    ctx.stroke();
    ctx.fillStyle = 'rgba(120,104,80,0.8)';
    for (var k = 1; k < steps; k += 2) {
      var hsh = hash2(r.from.tx * 3 + k, r.to.ty * 5 + k);
      ctx.beginPath();
      ctx.arc(pts[k].x + (hsh - 0.5) * 4 * z, pts[k].y + (hsh - 0.5) * 2 * z, 0.8 * z, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
}

function drawCarrier(c) {
  var z = cam.zoom;
  // Interpolate in tile space so the carrier follows terrain elevation
  var t = c.moveProgress || 0;
  var fx = c.tx + (c.targetTx - c.tx) * t;
  var fy = c.ty + (c.targetTy - c.ty) * t;
  var w = isoAt(fx, fy);
  var s = worldToScreen(w.x, w.y);
  if (s.x < -30 || s.x > canvas.width + 30 || s.y < -40 || s.y > canvas.height + 30) return;

  // Walking bounce
  var bounce = c.state === 'walking' ? Math.abs(Math.sin(tick * 0.15)) * 2 * z : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(s.x, s.y + 1 * z, 3 * z, 1.5 * z, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (when walking)
  if (c.state === 'walking') {
    var legSwing = Math.sin(tick * 0.15) * 2 * z;
    ctx.strokeStyle = '#8a6a40';
    ctx.lineWidth = 1.2 * z;
    ctx.beginPath();
    ctx.moveTo(s.x - 1 * z, s.y - 2 * z - bounce);
    ctx.lineTo(s.x - 1 * z + legSwing, s.y);
    ctx.moveTo(s.x + 1 * z, s.y - 2 * z - bounce);
    ctx.lineTo(s.x + 1 * z - legSwing, s.y);
    ctx.stroke();
  }

  // Body (tunic)
  ctx.fillStyle = '#6a8a50';
  ctx.beginPath();
  ctx.moveTo(s.x - 3 * z, s.y - 2 * z - bounce);
  ctx.lineTo(s.x + 3 * z, s.y - 2 * z - bounce);
  ctx.lineTo(s.x + 2 * z, s.y - 7 * z - bounce);
  ctx.lineTo(s.x - 2 * z, s.y - 7 * z - bounce);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#e0c090';
  ctx.beginPath();
  ctx.arc(s.x, s.y - 9 * z - bounce, 2.5 * z, 0, Math.PI * 2);
  ctx.fill();

  // Hat
  ctx.fillStyle = '#704020';
  ctx.beginPath();
  ctx.arc(s.x, s.y - 10.5 * z - bounce, 2.8 * z, Math.PI, 0);
  ctx.fill();

  // Carrying — item on shoulder
  if (c.carrying) {
    var itemColor = ITEM_COLORS[c.carrying] || '#fff';
    ctx.fillStyle = itemColor;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.5 * z;
    ctx.beginPath();
    ctx.arc(s.x + 3 * z, s.y - 8 * z - bounce, 2.5 * z, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Item label at zoom
    if (cam.zoom > 0.7) {
      ctx.fillStyle = '#fff';
      ctx.font = Math.max(6, 7 * z) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(c.carrying.charAt(0).toUpperCase(), s.x + 3 * z, s.y - 7 * z - bounce);
    }
  }
}

var ITEM_COLORS = {
  wood: '#8a5a30', planks: '#c0a060', stone: '#808080',
  grain: '#d0b040', flour: '#e0d8c0', bread: '#b08040',
  fish: '#5090b0', water: '#4080c0', meat: '#a04040',
  ironore: '#8a4a30', coal: '#303030', goldore: '#d0b030',
  iron: '#909090', tools: '#707080', coins: '#e0c040'
};

function shadeColor(color, percent) {
  var num = parseInt(color.replace('#',''), 16);
  var r = Math.max(0, Math.min(255, (num >> 16) + percent));
  var g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + percent));
  var b = Math.max(0, Math.min(255, (num & 0xff) + percent));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// ===== HIGHLIGHT / PLACEMENT PREVIEW =====
var hoverTile = {tx: -1, ty: -1};
var roadStart = null; // flag we're drawing road from

function drawPlacementPreview() {
  if (hoverTile.tx < 0 || hoverTile.tx >= MAP_W || hoverTile.ty < 0 || hoverTile.ty >= MAP_H) return;

  var iso = isoTop(hoverTile.tx, hoverTile.ty);
  var s = worldToScreen(iso.x, iso.y);

  // Highlight the full footprint (size×size for buildings, 1 tile otherwise)
  var fpN = 1;
  if (mode === 'build' && selectedBuilding) fpN = BLDG[selectedBuilding].size || 1;
  var qN = cornerPos(hoverTile.tx, hoverTile.ty);
  var qE = cornerPos(Math.min(MAP_W, hoverTile.tx + fpN), hoverTile.ty);
  var qS = cornerPos(Math.min(MAP_W, hoverTile.tx + fpN), Math.min(MAP_H, hoverTile.ty + fpN));
  var qW = cornerPos(hoverTile.tx, Math.min(MAP_H, hoverTile.ty + fpN));
  var sN2 = worldToScreen(qN.x, qN.y), sE2 = worldToScreen(qE.x, qE.y), sS2 = worldToScreen(qS.x, qS.y), sW2 = worldToScreen(qW.x, qW.y);
  ctx.beginPath();
  ctx.moveTo(sN2.x, sN2.y);
  ctx.lineTo(sE2.x, sE2.y);
  ctx.lineTo(sS2.x, sS2.y);
  ctx.lineTo(sW2.x, sW2.y);
  ctx.closePath();

  var canPlace = false;
  if (mode === 'build' && selectedBuilding) {
    canPlace = canPlaceBuilding(selectedBuilding, hoverTile.tx, hoverTile.ty);
  } else if (mode === 'road') {
    canPlace = true; // simplified
  } else if (mode === 'demolish') {
    canPlace = getBuildingAt(hoverTile.tx, hoverTile.ty) || getFlagAt(hoverTile.tx, hoverTile.ty);
  }

  ctx.fillStyle = canPlace ? 'rgba(80,200,80,0.25)' : 'rgba(200,80,80,0.25)';
  ctx.fill();
  ctx.strokeStyle = canPlace ? 'rgba(80,200,80,0.6)' : 'rgba(200,80,80,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Show where the building's flag would go and suggest nearest connected flag
  if (mode === 'build' && selectedBuilding && canPlace) {
    var def = BLDG[selectedBuilding];
    var flagTy = hoverTile.ty + def.size;
    if (flagTy < MAP_H) {
      var fIso = isoTop(hoverTile.tx, flagTy);
      var fS = worldToScreen(fIso.x, fIso.y);
      // Draw flag marker
      ctx.fillStyle = 'rgba(200,180,80,0.5)';
      ctx.beginPath();
      ctx.arc(fS.x, fS.y, 4 * cam.zoom, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(200,180,80,0.4)';
      ctx.font = Math.max(8, 9 * cam.zoom) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('flag', fS.x, fS.y + 10 * cam.zoom);

      // Find nearest existing flag and draw suggested road
      var nearest = findNearestFlag(hoverTile.tx, flagTy);
      if (nearest && (nearest.tx !== hoverTile.tx || nearest.ty !== flagTy)) {
        var nIso = isoTop(nearest.tx, nearest.ty);
        var nS = worldToScreen(nIso.x, nIso.y);
        ctx.strokeStyle = 'rgba(200,180,80,0.3)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.moveTo(fS.x, fS.y);
        ctx.lineTo(nS.x, nS.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  // Road preview line
  if (mode === 'road' && roadStart) {
    var fromIso = isoTop(roadStart.tx, roadStart.ty);
    var sf = worldToScreen(fromIso.x, fromIso.y);
    ctx.strokeStyle = 'rgba(200,180,80,0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(sf.x, sf.y);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ===== SOUND =====
var audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, dur, type, vol) {
  try {
    initAudio();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxPlace() { playSound(440, 0.15, 'sine', 0.08); playSound(660, 0.1, 'sine', 0.06); }
function sfxBuilt() { playSound(523, 0.1, 'sine', 0.08); playSound(659, 0.1, 'sine', 0.06); playSound(784, 0.15, 'sine', 0.08); }
function sfxProduce() { playSound(880, 0.08, 'triangle', 0.04); }
function sfxRoad() { playSound(330, 0.1, 'square', 0.04); }
// Ambient production sounds — quiet, positional
function sfxChop() { playSound(120, 0.04, 'square', 0.02); setTimeout(function(){ playSound(95, 0.03, 'square', 0.02); }, 80); }
function sfxSaw() { playSound(200 + Math.random()*80, 0.06, 'sawtooth', 0.02); }
function sfxHammer() { playSound(300, 0.03, 'square', 0.015); playSound(350, 0.02, 'square', 0.01); }
function sfxSmelt() { playSound(150, 0.1, 'sawtooth', 0.03); playSound(80, 0.15, 'sine', 0.02); }

// ===== AMBIENT MUSIC =====
var musicEnabled = false;
var musicDrone = null;
var musicGain = null;
var musicTimer = null;
var musicMasterVol = 0.025; // very quiet background

// Medieval/pastoral scales (frequencies relative to root)
// Dorian mode for day, Aeolian (natural minor) for night
var SCALES = {
  day: [1, 9/8, 6/5, 4/3, 3/2, 5/3, 16/9], // Dorian
  night: [1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5]  // Aeolian
};
var ROOTS = {day: 220, night: 196}; // A3 day, G3 night

function toggleMusic() {
  musicEnabled = !musicEnabled;
  if (musicEnabled) {
    initAudio();
    startMusic();
  } else {
    stopMusic();
  }
}

function startMusic() {
  if (!audioCtx) return;
  // Drone pad — soft sustained note
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0;
  musicGain.connect(audioCtx.destination);

  musicDrone = audioCtx.createOscillator();
  musicDrone.type = 'sine';
  musicDrone.frequency.value = ROOTS.day;
  var droneGain = audioCtx.createGain();
  droneGain.gain.value = musicMasterVol * 0.6;
  musicDrone.connect(droneGain);
  droneGain.connect(audioCtx.destination);
  musicDrone.start();

  // Second drone — fifth above, very quiet
  var drone2 = audioCtx.createOscillator();
  drone2.type = 'sine';
  drone2.frequency.value = ROOTS.day * 3/2;
  var d2Gain = audioCtx.createGain();
  d2Gain.gain.value = musicMasterVol * 0.3;
  drone2.connect(d2Gain);
  d2Gain.connect(audioCtx.destination);
  drone2.start();

  // Store for cleanup
  musicDrone._parts = [
    {osc: musicDrone, gain: droneGain},
    {osc: drone2, gain: d2Gain}
  ];

  // Start melody loop
  scheduleMelodyNote();
}

function stopMusic() {
  if (musicDrone && musicDrone._parts) {
    musicDrone._parts.forEach(function(p) {
      try { p.osc.stop(); } catch(e) {}
    });
  }
  musicDrone = null;
  if (musicTimer) clearTimeout(musicTimer);
  musicTimer = null;
}

function scheduleMelodyNote() {
  if (!musicEnabled || !audioCtx) return;

  var daylight = getDaylight();
  var isDay = daylight > 0.5;
  var scale = isDay ? SCALES.day : SCALES.night;
  var root = isDay ? ROOTS.day : ROOTS.night;

  // Update drone frequency smoothly
  if (musicDrone && musicDrone._parts) {
    var t = audioCtx.currentTime;
    musicDrone._parts[0].osc.frequency.setTargetAtTime(root, t, 2);
    musicDrone._parts[1].osc.frequency.setTargetAtTime(root * 3/2, t, 2);
    // Fade drone volume with daylight
    var droneVol = musicMasterVol * (0.4 + daylight * 0.3);
    musicDrone._parts[0].gain.gain.setTargetAtTime(droneVol, t, 1);
    musicDrone._parts[1].gain.gain.setTargetAtTime(droneVol * 0.5, t, 1);
  }

  // Pick a random note from the scale
  var degree = Math.floor(Math.random() * scale.length);
  var octave = Math.random() < 0.3 ? 2 : 1; // occasionally go up an octave
  var freq = root * scale[degree] * octave;

  // Play the note — gentle sine with slow attack/release
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = Math.random() < 0.7 ? 'sine' : 'triangle';
    osc.frequency.value = freq;

    // Vary note length: longer at night, shorter during busy day
    var noteDur = isDay ? 0.8 + Math.random() * 1.2 : 1.5 + Math.random() * 2.0;
    var vol = musicMasterVol * (0.4 + Math.random() * 0.4);

    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime + noteDur * 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + noteDur);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + noteDur + 0.1);
  } catch(e) {}

  // Schedule next note — sparse, with pauses
  var pause = isDay
    ? 1500 + Math.random() * 3000   // day: 1.5-4.5s between notes
    : 2500 + Math.random() * 5000;  // night: 2.5-7.5s between notes

  // Occasional longer pauses (breathing room)
  if (Math.random() < 0.15) pause += 3000 + Math.random() * 4000;

  musicTimer = setTimeout(scheduleMelodyNote, pause);
}

// ===== TERRITORY =====
var territoryCache = new Uint8Array(MAP_W * MAP_H);
var territoryDirty = true;
function updateTerritory() {
  territoryCache.fill(0);
  for (var bi = 0; bi < buildings.length; bi++) {
    var b = buildings[bi];
    if (!b.built) continue;
    var def = BLDG[b.type];
    var radius = b.type === 'hq' ? 15 : (b.type === 'guard' ? 8 : 5);
    for (var dy = -radius; dy <= radius; dy++) {
      for (var dx = -radius; dx <= radius; dx++) {
        if (dx*dx + dy*dy > radius*radius) continue;
        var tx2 = b.tx + dx, ty2 = b.ty + dy;
        if (tx2 >= 0 && tx2 < MAP_W && ty2 >= 0 && ty2 < MAP_H) {
          territoryCache[ty2 * MAP_W + tx2] = 1;
        }
      }
    }
  }
  territoryDirty = false;
  territoryVersion++;
}

function isInTerritory(tx, ty) {
  if (territoryDirty) updateTerritory();
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  return territoryCache[ty * MAP_W + tx] === 1;
}

// ===== GAME LOGIC =====
function canPlaceBuilding(type, tx, ty) {
  var def = BLDG[type];
  if (!def) return false;

  var isMine = def.category === 'mine';
  var t = terrain[ty * MAP_W + tx];

  // Mines must be on mountain tiles; other buildings cannot be on water/mountain
  if (isMine) {
    if (t !== TERRAIN.MOUNTAIN) return false;
    // Check that the right mineral is nearby
    if (def.needsMineral) {
      var hasMineral = false;
      for (var mdy = -def.radius; mdy <= def.radius && !hasMineral; mdy++) {
        for (var mdx = -def.radius; mdx <= def.radius && !hasMineral; mdx++) {
          var mmx = tx + mdx, mmy = ty + mdy;
          if (mmx >= 0 && mmx < MAP_W && mmy >= 0 && mmy < MAP_H) {
            if (minerals[mmy * MAP_W + mmx] === def.needsMineral) hasMineral = true;
          }
        }
      }
      if (!hasMineral) return false;
    }
  } else {
    if (t === TERRAIN.WATER || t === TERRAIN.MOUNTAIN) return false;
  }

  // Check size footprint
  for (var dy = 0; dy < def.size; dy++) {
    for (var dx = 0; dx < def.size; dx++) {
      var cx = tx + dx, cy = ty + dy;
      if (cx >= MAP_W || cy >= MAP_H) return false;
      var ct = terrain[cy * MAP_W + cx];
      if (isMine) { if (ct !== TERRAIN.MOUNTAIN) return false; }
      else { if (ct === TERRAIN.WATER || ct === TERRAIN.MOUNTAIN) return false; }
      if (getBuildingAt(cx, cy)) return false;
    }
  }

  // Check resources
  for (var r in def.cost) {
    if ((resources[r] || 0) < def.cost[r]) return false;
  }

  // Must be within territory
  if (!isInTerritory(tx, ty)) return false;

  // Non-housing buildings need an available worker
  if (def.category !== 'housing' && type !== 'hq' && getAvailableWorkers() <= 0) return false;

  return true;
}

function getBuildingAt(tx, ty) {
  for (var i = 0; i < buildings.length; i++) {
    var b = buildings[i];
    var def = BLDG[b.type];
    if (tx >= b.tx && tx < b.tx + def.size && ty >= b.ty && ty < b.ty + def.size) return b;
  }
  return null;
}

function getFlagAt(tx, ty) {
  for (var i = 0; i < flags.length; i++) {
    if (flags[i].tx === tx && flags[i].ty === ty) return flags[i];
  }
  return null;
}

function getRoadBetween(f1, f2) {
  for (var i = 0; i < roads.length; i++) {
    var r = roads[i];
    if ((r.from.tx === f1.tx && r.from.ty === f1.ty && r.to.tx === f2.tx && r.to.ty === f2.ty) ||
        (r.from.tx === f2.tx && r.from.ty === f2.ty && r.to.tx === f1.tx && r.to.ty === f1.ty)) return r;
  }
  return null;
}

function findNearestFlag(tx, ty) {
  var best = null, bestDist = Infinity;
  for (var i = 0; i < flags.length; i++) {
    var d = Math.abs(flags[i].tx - tx) + Math.abs(flags[i].ty - ty);
    if (d < bestDist) { bestDist = d; best = flags[i]; }
  }
  return best;
}

function findConnectedFlag(fromFlag, excludeFlag) {
  // Find flags connected to fromFlag via roads
  var connected = [];
  for (var i = 0; i < roads.length; i++) {
    var r = roads[i];
    if (r.from.tx === fromFlag.tx && r.from.ty === fromFlag.ty) {
      var f = getFlagAt(r.to.tx, r.to.ty);
      if (f && f !== excludeFlag) connected.push(f);
    }
    if (r.to.tx === fromFlag.tx && r.to.ty === fromFlag.ty) {
      var f2 = getFlagAt(r.from.tx, r.from.ty);
      if (f2 && f2 !== excludeFlag) connected.push(f2);
    }
  }
  return connected;
}

// Find path from one flag to HQ (BFS through flag network)
function findPathToHQ(startFlag) {
  var hq = buildings.find(function(b) { return b.type === 'hq'; });
  if (!hq) return null;
  var hqFlag = findNearestFlag(hq.tx, hq.ty + 3);
  if (!hqFlag) return null;
  if (startFlag === hqFlag) return [hqFlag];

  var visited = new Set();
  var queue = [[startFlag]];
  visited.add(startFlag.tx + ',' + startFlag.ty);

  while (queue.length > 0) {
    var path = queue.shift();
    var current = path[path.length - 1];
    var neighbors = findConnectedFlag(current, null);
    for (var i = 0; i < neighbors.length; i++) {
      var key = neighbors[i].tx + ',' + neighbors[i].ty;
      if (visited.has(key)) continue;
      visited.add(key);
      var newPath = path.concat([neighbors[i]]);
      if (neighbors[i] === hqFlag) return newPath;
      queue.push(newPath);
    }
  }
  return null;
}

function placeBuilding(type, tx, ty) {
  if (!canPlaceBuilding(type, tx, ty)) return false;
  var def = BLDG[type];

  // Deduct resources
  for (var r in def.cost) {
    resources[r] -= def.cost[r];
  }

  var b = createBuilding(type, tx, ty);
  buildings.push(b);
  territoryDirty = true;
  mmDirty = true;
  sfxPlace();

  // Auto-place flag near building (directly below)
  var flagTx = tx, flagTy = ty + def.size;
  var newFlag = getFlagAt(flagTx, flagTy);
  if (!newFlag && flagTy < MAP_H) {
    var ft = terrain[flagTy * MAP_W + flagTx];
    if (ft !== TERRAIN.WATER) {
      newFlag = {tx: flagTx, ty: flagTy, items: []};
      flags.push(newFlag);
    }
  }

  // Auto-connect to nearest existing flag (if within road range)
  if (newFlag) {
    var bestFlag = null, bestDist = Infinity;
    for (var fi = 0; fi < flags.length; fi++) {
      var cf = flags[fi];
      if (cf === newFlag) continue;
      var fd = Math.abs(cf.tx - newFlag.tx) + Math.abs(cf.ty - newFlag.ty);
      if (fd <= 8 && fd < bestDist) {
        // Prefer flags that are already connected to the road network
        var isConnected = false;
        for (var ri = 0; ri < roads.length; ri++) {
          if ((roads[ri].from.tx === cf.tx && roads[ri].from.ty === cf.ty) ||
              (roads[ri].to.tx === cf.tx && roads[ri].to.ty === cf.ty)) {
            isConnected = true; break;
          }
        }
        // HQ flag is always "connected"
        var hq2 = buildings.find(function(b2) { return b2.type === 'hq'; });
        if (hq2 && cf.tx === hq2.tx && cf.ty === hq2.ty + 3) isConnected = true;
        if (isConnected && fd < bestDist) {
          bestDist = fd;
          bestFlag = cf;
        }
      }
    }
    if (bestFlag && !getRoadBetween(newFlag, bestFlag)) {
      placeRoad(newFlag, bestFlag);
    }
  }

  updateResourceDisplay();
  return true;
}

function placeFlag(tx, ty) {
  if (getFlagAt(tx, ty)) return false;
  var t = terrain[ty * MAP_W + tx];
  if (t === TERRAIN.WATER) return false;
  if (getBuildingAt(tx, ty)) return false;
  flags.push({tx: tx, ty: ty, items: []});
  return true;
}

function placeRoad(f1, f2) {
  if (getRoadBetween(f1, f2)) return false;
  // Check distance — roads between nearby flags
  var dist = Math.abs(f1.tx - f2.tx) + Math.abs(f1.ty - f2.ty);
  if (dist > 8) return false;
  roads.push({from: {tx: f1.tx, ty: f1.ty}, to: {tx: f2.tx, ty: f2.ty}});
  sfxRoad();
  // Spawn a carrier for this road
  carriers.push({
    tx: f1.tx, ty: f1.ty,
    targetTx: f1.tx, targetTy: f1.ty,
    carrying: null,
    roadFrom: f1, roadTo: f2,
    state: 'idle', // idle, walking, delivering
    moveProgress: 0,
    moveSpeed: 0.03,
    waitTimer: 0,
    goingTo: null // which flag we're heading to
  });
  return true;
}

// ===== SIMULATION =====
function simulate() {
  if (speed === 0) return;
  for (var sp = 0; sp < speed; sp++) {
    tick++;
    gameTime += 0.5;

    // === FIX: Buildings auto-pull from their own flag ===
    // Buildings grab construction materials and production inputs from their adjacent flag
    if (tick % 10 === 0) {
      for (var api = 0; api < buildings.length; api++) {
        var ab = buildings[api];
        if (ab.type === 'hq') continue;
        var aDef = BLDG[ab.type];
        var aFlagTy = ab.ty + (aDef.size || 1);
        var aFlag = getFlagAt(ab.tx, aFlagTy);
        if (!aFlag) continue;
        if (aFlag.items.length === 0 && ab.built) continue;

        if (!ab.built) {
          // Direct construction: claim materials from HQ if connected via road
          // (Materials already paid for at placement — this is just the delivery)
          if (findPathToHQ(aFlag)) {
            for (var cmk in ab.materialsNeeded) {
              if (ab.materialsNeeded[cmk] > 0) {
                ab.materialsNeeded[cmk]--;
                var abiso = isoTop(ab.tx, ab.ty);
                floatingTexts.push({x: abiso.x, y: abiso.y, text: '+' + cmk, color: '#c0a060', life: 45, maxLife: 45});
                break; // one material per cycle for visual pacing
              }
            }
          }
          // Also pull any items on our flag (legacy/carrier-delivered)
          for (var afi = aFlag.items.length - 1; afi >= 0; afi--) {
            var aItem = aFlag.items[afi];
            if (ab.materialsNeeded && (ab.materialsNeeded[aItem] || 0) > 0) {
              ab.materialsNeeded[aItem]--;
              aFlag.items.splice(afi, 1);
            }
          }
          // Clear non-construction items from this flag
          if (aFlag.items.length > 2) {
            for (var afi4 = aFlag.items.length - 1; afi4 >= 0; afi4--) {
              var clearItem = aFlag.items[afi4];
              var isConstMat = ab.materialsNeeded && (ab.materialsNeeded[clearItem] || 0) > 0;
              if (!isConstMat) {
                var pushed2 = false;
                var cFlags = findConnectedFlag(aFlag, null);
                for (var cfi2 = 0; cfi2 < cFlags.length; cfi2++) {
                  var cf3 = getFlagAt(cFlags[cfi2].tx, cFlags[cfi2].ty);
                  if (cf3 && cf3.items.length < 6) {
                    cf3.items.push(clearItem);
                    aFlag.items.splice(afi4, 1);
                    pushed2 = true;
                    break;
                  }
                }
                if (!pushed2) {
                  resources[clearItem] = (resources[clearItem] || 0) + 1;
                  aFlag.items.splice(afi4, 1);
                }
              }
            }
          }
        } else {
          // Pull production inputs from flag
          if (aDef.needs) {
            for (var afi2 = aFlag.items.length - 1; afi2 >= 0; afi2--) {
              if (aFlag.items[afi2] === aDef.needs && (ab.storage[aDef.needs] || 0) < 5) {
                ab.storage[aDef.needs] = (ab.storage[aDef.needs] || 0) + 1;
                aFlag.items.splice(afi2, 1);
                break;
              }
            }
          }
          if (aDef.needs2) {
            for (var afi3 = aFlag.items.length - 1; afi3 >= 0; afi3--) {
              if (aFlag.items[afi3] === aDef.needs2 && (ab.storage[aDef.needs2] || 0) < 5) {
                ab.storage[aDef.needs2] = (ab.storage[aDef.needs2] || 0) + 1;
                aFlag.items.splice(afi3, 1);
                break;
              }
            }
          }
        }
      }
    }

    // === FIX: HQ flag auto-stores items into resources (only when congested) ===
    if (tick % 15 === 0) {
      var hqAS = buildings.find(function(b) { return b.type === 'hq'; });
      if (hqAS) {
        var hqASFlag = getFlagAt(hqAS.tx, hqAS.ty + 3);
        if (hqASFlag && hqASFlag.items.length >= 5) {
          // Build set of items needed for construction (these were already paid for — don't re-add to resources)
          var constNeeds = {};
          for (var cni = 0; cni < buildings.length; cni++) {
            var cnb = buildings[cni];
            if (!cnb.built && cnb.materialsNeeded) {
              for (var cnr in cnb.materialsNeeded) {
                if (cnb.materialsNeeded[cnr] > 0) constNeeds[cnr] = (constNeeds[cnr] || 0) + cnb.materialsNeeded[cnr];
              }
            }
          }
          var stored = 0;
          for (var hfi = hqASFlag.items.length - 1; hfi >= 0 && stored < 2; hfi--) {
            var hItem = hqASFlag.items[hfi];
            // Skip items that are construction materials — returning them would duplicate resources
            if (constNeeds[hItem] && constNeeds[hItem] > 0) {
              constNeeds[hItem]--;
              continue;
            }
            resources[hItem] = (resources[hItem] || 0) + 1;
            hqASFlag.items.splice(hfi, 1);
            stored++;
          }
          if (stored > 0) updateResourceDisplay();
        }
      }
    }

    // === FIX: Clear congested flags — route excess items toward HQ ===
    if (tick % 25 === 0) {
      for (var cfi = 0; cfi < flags.length; cfi++) {
        var cf2 = flags[cfi];
        if (cf2.items.length < 5) continue;
        // Check which items are not needed by the adjacent building
        var cfBld = getBuildingForFlag(cf2.tx, cf2.ty);
        for (var cii = cf2.items.length - 1; cii >= 0; cii--) {
          var cItem = cf2.items[cii];
          var needed = false;
          if (cfBld) {
            if (!cfBld.built && cfBld.materialsNeeded && (cfBld.materialsNeeded[cItem] || 0) > 0) needed = true;
            if (cfBld.built) {
              var cDef = BLDG[cfBld.type];
              if (cDef.needs === cItem || cDef.needs2 === cItem) needed = true;
            }
          }
          if (!needed) {
            // Try to send to a connected flag with space
            var routed = false;
            var connFlags = findConnectedFlag(cf2, null);
            for (var cni = 0; cni < connFlags.length; cni++) {
              var cnf = getFlagAt(connFlags[cni].tx, connFlags[cni].ty);
              if (cnf && cnf.items.length < 4) {
                cnf.items.push(cItem);
                cf2.items.splice(cii, 1);
                routed = true;
                break;
              }
            }
            // Emergency overflow: if flag is completely full and can't route, teleport to HQ
            if (!routed && cf2.items.length >= 8) {
              resources[cItem] = (resources[cItem] || 0) + 1;
              cf2.items.splice(cii, 1);
              updateResourceDisplay();
            }
          }
        }
      }
    }

    // HQ outputs: push resources to HQ flag for buildings that need them
    if (tick % 20 === 0) {
      var hqB = buildings.find(function(b) { return b.type === 'hq'; });
      if (hqB) {
        var hqFlag = getFlagAt(hqB.tx, hqB.ty + 3);
        if (hqFlag && hqFlag.items.length < 4) { // reduced from 6 to prevent congestion
          // Find what any building needs — split into construction vs production
          var constructionNeeded = {};
          var productionNeeded = {};
          for (var ni = 0; ni < buildings.length; ni++) {
            var nb = buildings[ni];
            if (nb.type === 'hq') continue;
            var ndef = BLDG[nb.type];
            if (!nb.built) {
              // Construction materials — already paid for at placement
              // Only push if the building's flag is reachable via road network
              var nbFlag = getFlagAt(nb.tx, nb.ty + (ndef.size || 1));
              if (nbFlag && findPathToHQ(nbFlag)) {
                for (var cmr in nb.materialsNeeded) {
                  if (nb.materialsNeeded[cmr] > 0) constructionNeeded[cmr] = (constructionNeeded[cmr] || 0) + nb.materialsNeeded[cmr];
                }
              }
              continue;
            }
            if (ndef.needs && (nb.storage[ndef.needs] || 0) < 3) productionNeeded[ndef.needs] = true;
            if (ndef.needs2 && (nb.storage[ndef.needs2] || 0) < 3) productionNeeded[ndef.needs2] = true;
          }

          // Construction materials are now delivered directly (see auto-pull section)
          // Only push production inputs below
          var pushed = 0;
          // Then push production inputs (costs from stockpile)
          for (var pres in productionNeeded) {
            if (pushed >= 2 || hqFlag.items.length >= 6) break;
            if ((resources[pres] || 0) > 0) {
              var onFlag2 = hqFlag.items.filter(function(it) { return it === pres; }).length;
              if (onFlag2 < 2) {
                resources[pres]--;
                hqFlag.items.push(pres);
                pushed++;
              }
            }
          }
          if (pushed > 0) updateResourceDisplay();
        }
      }
    }

    // Food consumption — each worker eats food from HQ every 600 ticks
    if (tick % 600 === 0) {
      var foodTypes = ['bread', 'fish', 'meat'];
      var workerCount = population.employed;
      var foodNeeded = Math.ceil(workerCount / 3); // 1 food per 3 workers
      for (var fn = 0; fn < foodNeeded; fn++) {
        var ate = false;
        for (var ft2 = 0; ft2 < foodTypes.length && !ate; ft2++) {
          if ((resources[foodTypes[ft2]] || 0) > 0) {
            resources[foodTypes[ft2]]--;
            ate = true;
          }
        }
      }
      if (foodNeeded > 0) updateResourceDisplay();
    }

    // Update economy display every 120 ticks
    if (tick % 120 === 0) { updatePopulation(); updateEconomy(); }

    // Update buildings
    for (var i = 0; i < buildings.length; i++) {
      var b = buildings[i];
      var def = BLDG[b.type];

      // Construction — needs materials delivered, then builds
      if (!b.built) {
        // Check if all materials delivered
        var allDelivered = true;
        for (var mr in b.materialsNeeded) {
          if (b.materialsNeeded[mr] > 0) { allDelivered = false; break; }
        }
        // If no cost (HQ), instant build
        if (allDelivered || Object.keys(b.materialsTotal).length === 0) {
          b.progress += 0.005;
          if (b.progress >= 1) {
            b.built = true;
            b.progress = 1;
            territoryDirty = true;
            mmDirty = true;
            var biso = isoTop(b.tx, b.ty);
            floatingTexts.push({x: biso.x, y: biso.y, text: def.name + ' built!', color: '#8ac0ff', life: 90, maxLife: 90});
            sfxBuilt();
          }
        }
        continue;
      }

      // Production
      if (b.cooldown > 0) { b.cooldown--; continue; }

      // Housing buildings don't produce — skip
      if (b.type === 'cottage' || b.type === 'house') continue;

      // Throttle production if flag is congested — don't produce if flag nearly full
      var prodFlagTy2 = b.ty + (def.size || 1);
      var prodFlag2 = getFlagAt(b.tx, prodFlagTy2);
      if (prodFlag2 && prodFlag2.items.length >= 6 && def.produces) {
        b.cooldown = 30; // wait a bit and check again
        b.working = false;
        continue;
      }

      var hMult = getHappinessMultiplier();
      var seasonMod = getSeasonModifier(b.type);
      if (seasonMod === null) { b.working = false; b.cooldown = 60; continue; }

      // Tavern logic — consume bread, boost morale
      if (b.type === 'tavern') {
        if ((b.storage.bread || 0) > 0) {
          b.storage.bread--;
          b.working = true;
          var tiso = isoTop(b.tx, b.ty);
          floatingTexts.push({x: tiso.x, y: tiso.y, text: '🍺 Cheers!', color: '#c0a050', life: 60, maxLife: 60});
        } else {
          b.working = false;
        }
        b.cooldown = def.interval;
        continue;
      }
      if (b.type === 'forester') {
        // Plant trees nearby
        var planted = false;
        for (var attempt = 0; attempt < 5; attempt++) {
          var dx = Math.floor(Math.random() * (def.radius * 2 + 1)) - def.radius;
          var dy = Math.floor(Math.random() * (def.radius * 2 + 1)) - def.radius;
          var px = b.tx + dx, py = b.ty + dy;
          if (px >= 0 && px < MAP_W && py >= 0 && py < MAP_H) {
            var ti = py * MAP_W + px;
            if (terrain[ti] === TERRAIN.GRASS && !getBuildingAt(px, py)) {
              terrain[ti] = TERRAIN.FOREST;
              planted = true;
              markTileDirty(px, py);
              break;
            }
          }
        }
        b.working = planted;
        b.cooldown = Math.round(def.interval / (hMult * seasonMod));
      }
      else if (def.produces && !def.needs) {
        // Gatherer — produces from environment
        if (b.type === 'woodcutter') {
          // Find nearby forest tile
          var found = false;
          for (var dx2 = -def.radius; dx2 <= def.radius && !found; dx2++) {
            for (var dy2 = -def.radius; dy2 <= def.radius && !found; dy2++) {
              var fx = b.tx + dx2, fy = b.ty + dy2;
              if (fx >= 0 && fx < MAP_W && fy >= 0 && fy < MAP_H) {
                if (terrain[fy * MAP_W + fx] === TERRAIN.FOREST) {
                  terrain[fy * MAP_W + fx] = TERRAIN.GRASS;
                  markTileDirty(fx, fy);
                  depositItem(b, def.produces);
                  sfxChop();
                  found = true;
                }
              }
            }
          }
          b.working = found;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'quarry') {
          var foundS = false;
          for (var dx3 = -def.radius; dx3 <= def.radius && !foundS; dx3++) {
            for (var dy3 = -def.radius; dy3 <= def.radius && !foundS; dy3++) {
              var sx = b.tx + dx3, sy = b.ty + dy3;
              if (sx >= 0 && sx < MAP_W && sy >= 0 && sy < MAP_H) {
                if (terrain[sy * MAP_W + sx] === TERRAIN.STONE) {
                  // 30% chance to deplete the tile (stone lasts longer)
                  if (Math.random() < 0.3) {
                    terrain[sy * MAP_W + sx] = TERRAIN.HILL;
                    markTileDirty(sx, sy);
                  }
                  depositItem(b, def.produces);
                  sfxHammer();
                  foundS = true;
                }
              }
            }
          }
          b.working = foundS;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'fisher') {
          // Need water nearby
          var hasWater = false;
          for (var dx4 = -def.radius; dx4 <= def.radius && !hasWater; dx4++) {
            for (var dy4 = -def.radius; dy4 <= def.radius && !hasWater; dy4++) {
              var wx2 = b.tx + dx4, wy2 = b.ty + dy4;
              if (wx2 >= 0 && wx2 < MAP_W && wy2 >= 0 && wy2 < MAP_H) {
                if (terrain[wy2 * MAP_W + wx2] === TERRAIN.WATER) hasWater = true;
              }
            }
          }
          if (hasWater) {
            depositItem(b, 'fish');
            b.working = true;
          } else {
            b.working = false;
          }
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'well') {
          depositItem(b, 'water');
          b.working = true;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'hunter') {
          // Hunt nearby animals (prefer deer, fallback to rabbits)
          var hunted = false;
          for (var ha = 0; ha < animals.length && !hunted; ha++) {
            var prey = animals[ha];
            var hdx = prey.tx - b.tx, hdy = prey.ty - b.ty;
            if (Math.abs(hdx) <= def.radius && Math.abs(hdy) <= def.radius) {
              animals.splice(ha, 1);
              depositItem(b, 'meat');
              hunted = true;
            }
          }
          // Fallback: hunt if forest nearby (even without visible animals)
          if (!hunted) {
            var hasForest = false;
            for (var dx5 = -def.radius; dx5 <= def.radius && !hasForest; dx5++) {
              for (var dy5 = -def.radius; dy5 <= def.radius && !hasForest; dy5++) {
                var hx = b.tx + dx5, hy = b.ty + dy5;
                if (hx >= 0 && hx < MAP_W && hy >= 0 && hy < MAP_H) {
                  if (terrain[hy * MAP_W + hx] === TERRAIN.FOREST) hasForest = true;
                }
              }
            }
            if (hasForest) {
              depositItem(b, 'meat');
              hunted = true;
            }
          }
          b.working = hunted;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'farm') {
          depositItem(b, 'grain');
          b.working = true;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (def.category === 'mine') {
          // Mine — extract from nearby mineral deposits
          var mined = false;
          for (var mdx2 = -def.radius; mdx2 <= def.radius && !mined; mdx2++) {
            for (var mdy2 = -def.radius; mdy2 <= def.radius && !mined; mdy2++) {
              var mmx2 = b.tx + mdx2, mmy2 = b.ty + mdy2;
              if (mmx2 >= 0 && mmx2 < MAP_W && mmy2 >= 0 && mmy2 < MAP_H) {
                var mIdx = mmy2 * MAP_W + mmx2;
                if (minerals[mIdx] === def.needsMineral) {
                  // 15% chance to deplete mineral deposit each harvest
                  if (Math.random() < 0.15) {
                    minerals[mIdx] = MINERAL.NONE;
                    mmDirty = true;
                  }
                  depositItem(b, def.produces);
                  sfxHammer();
                  mined = true;
                }
              }
            }
          }
          b.working = mined;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
      }
      else if (def.produces && def.needs) {
        // Processor — needs input, produces output
        var hasInput = (b.storage[def.needs] || 0) > 0;
        var hasInput2 = !def.needs2 || (b.storage[def.needs2] || 0) > 0;
        if (hasInput && hasInput2) {
          b.storage[def.needs] = (b.storage[def.needs] || 0) - 1;
          if (def.needs2) b.storage[def.needs2] = (b.storage[def.needs2] || 0) - 1;
          depositItem(b, def.produces);
          if (b.type === 'sawmill') sfxSaw();
          else if (b.type === 'smelter') sfxSmelt();
          else if (b.type === 'toolmaker') sfxHammer();
          else sfxProduce();
          b.working = true;
        } else {
          b.working = false;
        }
        b.cooldown = Math.round(def.interval / (hMult * seasonMod));
      }
    }

    // Update carriers
    for (var ci = 0; ci < carriers.length; ci++) {
      updateCarrier(carriers[ci]);
    }

    // Update animals — wander slowly through forests
    if (tick % 8 === 0) {
      for (var ai2 = 0; ai2 < animals.length; ai2++) {
        var an = animals[ai2];
        an.timer--;
        if (an.timer <= 0) {
          an.timer = 60 + Math.floor(Math.random() * 120);
          an.dir = Math.floor(Math.random() * 4);
          var dx = [0, 1, 0, -1][an.dir], dy = [-1, 0, 1, 0][an.dir];
          var nx = an.tx + dx, ny = an.ty + dy;
          if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
            var nt = terrain[ny * MAP_W + nx];
            if (nt === TERRAIN.FOREST || nt === TERRAIN.GRASS) {
              an.tx = nx; an.ty = ny;
            }
          }
        }
        an.phase += 0.1;
      }
      // Occasionally spawn new animals in forests (population recovery)
      if (animals.length < 40 && Math.random() < 0.01) {
        var spx = Math.floor(Math.random() * MAP_W), spy = Math.floor(Math.random() * MAP_H);
        if (terrain[spy * MAP_W + spx] === TERRAIN.FOREST) {
          animals.push({tx: spx, ty: spy, type: Math.random() < 0.6 ? 'deer' : 'rabbit', dir: 0, timer: 100, phase: Math.random() * Math.PI * 2});
        }
      }
    }
  }
  updateSeasonParticles();
}

function depositItem(building, item) {
  var def = BLDG[building.type];
  var flagTy = building.ty + (def.size || 1);
  var flag = getFlagAt(building.tx, flagTy) || findNearestFlag(building.tx, building.ty);
  if (flag && flag.items.length < 8) {
    flag.items.push(item);
  } else {
    building.storage[item] = (building.storage[item] || 0) + 1;
  }
  // Floating notification
  var iso = isoTop(building.tx, building.ty);
  var s = worldToScreen(iso.x, iso.y);
  var col = ITEM_COLORS[item] || '#fff';
  floatingTexts.push({x: iso.x, y: iso.y, text: '+1 ' + item, color: col, life: 60, maxLife: 60});
}

function drawFloatingTexts() {
  for (var i = floatingTexts.length - 1; i >= 0; i--) {
    var ft = floatingTexts[i];
    ft.life--;
    if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
    var alpha = ft.life / ft.maxLife;
    var rise = (ft.maxLife - ft.life) * 0.5;
    var s = worldToScreen(ft.x, ft.y - rise);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = Math.max(9, 10 * cam.zoom) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, s.x, s.y - 20 * cam.zoom);
    ctx.globalAlpha = 1;
  }
}

// Get the building whose flag is at this position
function getBuildingForFlag(flagTx, flagTy) {
  for (var bi = 0; bi < buildings.length; bi++) {
    var b = buildings[bi];
    var def = BLDG[b.type];
    var bFlagTy = b.ty + (def.size || 1);
    if (b.tx === flagTx && bFlagTy === flagTy) return b;
  }
  return null;
}

function updateCarrier(c) {
  if (c.state === 'idle') {
    var f1 = c.roadFrom, f2 = c.roadTo;
    var flag1 = getFlagAt(f1.tx, f1.ty);
    var flag2 = getFlagAt(f2.tx, f2.ty);
    if (!flag1 || !flag2) return;

    var myFlag = (c.tx === f1.tx && c.ty === f1.ty) ? flag1 : flag2;
    var otherFlag = (myFlag === flag1) ? flag2 : flag1;

    // Smart pickup: prefer items the other building actually needs
    if (myFlag.items.length > 0) {
      var bestIdx = 0;
      var otherBld = getBuildingForFlag(otherFlag.tx, otherFlag.ty);
      if (otherBld) {
        var odef = BLDG[otherBld.type];
        for (var pi = 0; pi < myFlag.items.length; pi++) {
          var pitem = myFlag.items[pi];
          // Under construction — wants planks/stone
          if (!otherBld.built && otherBld.materialsNeeded && (otherBld.materialsNeeded[pitem] || 0) > 0) { bestIdx = pi; break; }
          // Built — wants production inputs
          if (otherBld.built && (odef.needs === pitem || odef.needs2 === pitem) && (otherBld.storage[pitem] || 0) < 5) { bestIdx = pi; break; }
        }
      }
      c.carrying = myFlag.items.splice(bestIdx, 1)[0];
      c.state = 'walking';
      c.targetTx = otherFlag.tx;
      c.targetTy = otherFlag.ty;
      c.moveProgress = 0;
    }
    // If other flag has items, walk there to get them
    else if (otherFlag.items.length > 0) {
      c.state = 'walking';
      c.targetTx = otherFlag.tx;
      c.targetTy = otherFlag.ty;
      c.moveProgress = 0;
    }
  }
  else if (c.state === 'walking') {
    c.moveProgress += c.moveSpeed;
    if (c.moveProgress >= 1) {
      c.tx = c.targetTx;
      c.ty = c.targetTy;
      c.moveProgress = 0;
      var returnTrip = false;

      if (c.carrying) {
        var delivered = false;

        // Check: is there a building at this flag that wants this item?
        var bldHere = getBuildingForFlag(c.tx, c.ty);
        if (bldHere) {
          // Under construction — deliver construction materials
          if (!bldHere.built && bldHere.materialsNeeded && (bldHere.materialsNeeded[c.carrying] || 0) > 0) {
            bldHere.materialsNeeded[c.carrying]--;
            var biso2 = isoTop(bldHere.tx, bldHere.ty);
            floatingTexts.push({x: biso2.x, y: biso2.y, text: '+' + c.carrying, color: '#c0a060', life: 45, maxLife: 45});
            c.carrying = null;
            delivered = true;
          }
          // Built building — deliver production inputs
          else if (bldHere.built) {
            var bdef = BLDG[bldHere.type];
            if (bdef.needs === c.carrying || bdef.needs2 === c.carrying) {
              if ((bldHere.storage[c.carrying] || 0) < 5) {
                bldHere.storage[c.carrying] = (bldHere.storage[c.carrying] || 0) + 1;
                c.carrying = null;
                delivered = true;
              }
            }
          }
        }

        // Check: is this the HQ flag? Store everything
        if (!delivered) {
          var hq = buildings.find(function(b2) { return b2.type === 'hq'; });
          if (hq) {
            var hqFlagTy = hq.ty + 3; // HQ size is 3, flag at ty+3
            if (c.tx === hq.tx && c.ty === hqFlagTy) {
              resources[c.carrying] = (resources[c.carrying] || 0) + 1;
              var hiso = isoTop(hq.tx, hq.ty);
              floatingTexts.push({x: hiso.x, y: hiso.y, text: '+1 ' + c.carrying, color: '#4a90d0', life: 45, maxLife: 45});
              c.carrying = null;
              delivered = true;
              updateResourceDisplay();
            }
          }
        }

        // Otherwise leave at this flag for the next carrier
        if (!delivered) {
          var destFlag = getFlagAt(c.tx, c.ty);
          if (destFlag && destFlag.items.length < 8) {
            destFlag.items.push(c.carrying);
            c.carrying = null;
          } else {
            // Flag is full — carry the item BACK instead of destroying it
            returnTrip = true;
            var returnTx = (c.tx === c.roadFrom.tx && c.ty === c.roadFrom.ty) ? c.roadTo.tx : c.roadFrom.tx;
            var returnTy = (c.tx === c.roadFrom.tx && c.ty === c.roadFrom.ty) ? c.roadTo.ty : c.roadFrom.ty;
            c.targetTx = returnTx;
            c.targetTy = returnTy;
            c.moveProgress = 0;
          }
        }
      }

      if (!returnTrip) c.state = 'idle';
    }
  }
}

// ===== UI =====
function updateSeasonBadge() {
  var s = getSeason();
  var icons  = ['🌿','☀️','🍂','❄️'];
  var names  = ['SPRING','SUMMER','AUTUMN','WINTER'];
  var colors = ['#6a9058','#a09050','#a07040','#7090b0'];
  document.getElementById('season-icon').textContent = icons[s];
  document.getElementById('season-name').textContent = names[s];
  document.getElementById('season-name').style.color  = colors[s];
  document.getElementById('season-day').textContent   = 'Day ' + getSeasonDay() + ' of ' + DAYS_PER_SEASON;
  document.getElementById('season-progress').style.width = (getSeasonProgress() * 100).toFixed(1) + '%';
  document.getElementById('season-progress').style.background = ['#4a7838','#909040','#a07030','#6080a0'][s];
}

function initSeasonParticles() {
  seasonParticles.length = 0;
  var s = getSeason();
  if (s === 3) { // Winter — snow
    for (var i = 0; i < 30; i++) {
      seasonParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: 0.4 + Math.random() * 0.4,
        r: 1 + Math.random(),
        opacity: 0.4 + Math.random() * 0.3,
        type: 'snow', angle: 0, spin: 0
      });
    }
  } else if (s === 2) { // Autumn — leaves
    for (var j = 0; j < 15; j++) {
      seasonParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.6,
        vy: 0.6 + Math.random() * 0.5,
        r: 2.5,
        opacity: 0.5 + Math.random() * 0.3,
        type: 'leaf',
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.05,
        color: ['#c08030','#a06020','#d09040','#8a5018'][Math.floor(Math.random() * 4)]
      });
    }
  }
}

function updateSeasonParticles() {
  if (speed === 0) return;
  var s = getSeason();
  // Re-init if season changed and particles are from wrong season
  var wrongType = (s === 3 && seasonParticles.length > 0 && seasonParticles[0].type !== 'snow') ||
                  (s === 2 && seasonParticles.length > 0 && seasonParticles[0].type !== 'leaf') ||
                  ((s === 0 || s === 1) && seasonParticles.length > 0);
  if (wrongType || (seasonParticles.length === 0 && (s === 2 || s === 3))) {
    initSeasonParticles();
    return;
  }
  for (var i = 0; i < seasonParticles.length; i++) {
    var p = seasonParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.angle += p.spin || 0;
    // Wrap around screen
    if (p.y > canvas.height + 10) p.y = -10;
    if (p.x < -10) p.x = canvas.width + 10;
    if (p.x > canvas.width + 10) p.x = -10;
  }
}

function drawSeasonParticles() {
  var s = getSeason();
  var sp = getSeasonProgress();
  var fadeIn = Math.min(1, sp / (2/DAYS_PER_SEASON));
  var fadeOut = Math.min(1, (1 - sp) / (2/DAYS_PER_SEASON));
  var alpha = (sp < (2/DAYS_PER_SEASON)) ? fadeIn : (sp > (1 - 2/DAYS_PER_SEASON) ? fadeOut : 1);

  for (var i = 0; i < seasonParticles.length; i++) {
    var p = seasonParticles[i];
    var a = p.opacity * alpha;
    if (a < 0.01) continue;
    ctx.save();
    if (p.type === 'snow') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(220,235,248,' + a.toFixed(2) + ')';
      ctx.fill();
    } else { // leaf
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      var hexA = Math.round(a * 255).toString(16).padStart(2,'0');
      ctx.fillStyle = (p.color || '#c08030') + hexA; // #rrggbbaa — valid in Chrome
      ctx.fillRect(-p.r, -p.r * 0.6, p.r * 2, p.r * 1.2);
    }
    ctx.restore();
  }
}

function updateResourceDisplay() {
  var el = document.getElementById('resources');
  var html = '';
  var show = ['wood','planks','stone','grain','flour','bread','fish','water','meat','ironore','coal','goldore','iron','tools','coins'];
  for (var i = 0; i < show.length; i++) {
    var r = show[i];
    var icons = {wood:'🪵',planks:'🪓',stone:'🪨',grain:'🌾',flour:'🫘',bread:'🍞',fish:'🐟',water:'💧',meat:'🥩',ironore:'⛏',coal:'◼',goldore:'✦',iron:'🔩',tools:'🔧',coins:'🪙'};
    // Only show mining resources once they've been discovered (or a mine exists)
    if (['ironore','coal','goldore','iron','tools','coins'].indexOf(r) !== -1 && (resources[r] || 0) === 0) {
      var hasMineBuilding = buildings.some(function(b) { return BLDG[b.type] && (BLDG[b.type].category === 'mine' || BLDG[b.type].produces === r || BLDG[b.type].needs === r || BLDG[b.type].needs2 === r); });
      if (!hasMineBuilding) continue;
    }
    var displayNames = {ironore:'iron ore', goldore:'gold ore'};
    html += '<div class="res"><span class="icon">' + (icons[r]||'📦') + '</span><span class="val">' + (resources[r]||0) + '</span> ' + (displayNames[r] || r) + '</div>';
  }
  // Population and happiness
  var avail = getAvailableWorkers();
  var hMood = population.happiness;
  var moodIcon = hMood >= 70 ? '😊' : (hMood >= 40 ? '😐' : '😟');
  var moodColor = hMood >= 70 ? '#6aaa50' : (hMood >= 40 ? '#c0a040' : '#c05050');
  var hMul = getHappinessMultiplier();
  var mulStr = hMul !== 1.0 ? ' <span style="color:' + (hMul > 1 ? '#6a9a50' : '#c05050') + '">(' + (hMul > 1 ? '+' : '') + Math.round((hMul - 1) * 100) + '% speed)</span>' : '';
  html += '<div class="res" style="grid-column:1/-1;border-top:1px solid #1a2a40;margin-top:4px;padding-top:4px">';
  html += '<span class="icon">👥</span><span class="val">' + population.employed + '/' + population.capacity + '</span> pop';
  html += ' <span style="color:#506878;margin-left:4px">' + avail + ' free</span></div>';
  html += '<div class="res" style="grid-column:1/-1">';
  html += '<span class="icon">' + moodIcon + '</span><span class="val" style="color:' + moodColor + '">' + hMood + '%</span> happiness' + mulStr + '</div>';
  var foodRate = Math.ceil(population.employed / 3);
  html += '<div class="res" style="grid-column:1/-1"><span class="icon">🍽</span><span style="color:#506878">eats ' + foodRate + ' food/cycle</span></div>';
  el.innerHTML = html;
}

function updateEconomy() {
  var el = document.getElementById('economy');
  if (!el) return;
  var counts = {};
  var working = {};
  var constructing = 0;
  for (var i = 0; i < buildings.length; i++) {
    var b = buildings[i];
    if (b.type === 'hq') continue;
    counts[b.type] = (counts[b.type] || 0) + 1;
    if (!b.built) constructing++;
    else if (b.working) working[b.type] = (working[b.type] || 0) + 1;
  }
  var lines = [];
  if (constructing > 0) lines.push('🏗 ' + constructing + ' building...');
  var typeNames = {woodcutter:'🪵', forester:'🌱', sawmill:'🪓', quarry:'⛏', farm:'🌾', mill:'⚙', bakery:'🍞', fisher:'🐟', well:'💧', hunter:'🏹', ironmine:'⛏', coalmine:'◼', goldmine:'✦', smelter:'🔥', toolmaker:'🔧', mint:'🪙', guard:'🛡', cottage:'🏠', house:'🏘', tavern:'🍺'};
  for (var t in counts) {
    var icon = typeNames[t] || '🏠';
    var w = working[t] || 0;
    var c = counts[t];
    var status = w === c ? '<span style="color:#6a9a50">✓</span>' : (w > 0 ? '<span style="color:#c0a040">' + w + '/' + c + '</span>' : '<span style="color:#8a4040">idle</span>');
    lines.push(icon + ' ' + BLDG[t].name + ' ×' + c + ' ' + status);
  }
  lines.push('🦌 ' + animals.length + ' wildlife · 🛤 ' + roads.length + ' roads');
  el.innerHTML = lines.join('<br>');
}

function buildBuildingPanel() {
  var el = document.getElementById('buildings');
  var html = '';
  var categories = {gather:'Resource', mine:'Mining', process:'Processing', military:'Military', housing:'Housing'};
  var lastCat = '';
  var types = Object.keys(BLDG);
  for (var i = 0; i < types.length; i++) {
    var type = types[i];
    if (type === 'hq') continue;
    var def = BLDG[type];
    if (def.category !== lastCat) {
      lastCat = def.category;
      html += '<div style="color:#4a6a80;font-size:9px;letter-spacing:1.5px;padding:6px 2px 3px;border-bottom:1px solid #1a2a40;margin-bottom:4px">' + (categories[def.category] || def.category).toUpperCase() + '</div>';
    }
    var costStr = Object.keys(def.cost).map(function(r) { return def.cost[r] + ' ' + r; }).join(', ') || 'Free';
    var canAfford = true;
    for (var r in def.cost) {
      if ((resources[r] || 0) < def.cost[r]) canAfford = false;
    }
    html += '<button class="bldg-btn' + (selectedBuilding === type ? ' selected' : '') + '" onclick="selectBuilding(\'' + type + '\')" ' + (canAfford ? '' : 'style="opacity:0.4"') + '>';
    html += '<div class="name">' + def.name + '</div>';
    html += '<div class="cost">' + costStr + '</div>';
    html += '<div class="desc">' + def.desc + '</div>';
    html += '</button>';
  }
  // Stats
  html += '<div style="color:#4a6a80;font-size:9px;letter-spacing:1.5px;padding:6px 2px 3px;border-top:1px solid #1a2a40;margin-top:8px">STATS</div>';
  html += '<div style="font-size:10px;color:#6a8aa0;padding:2px">' + buildings.length + ' buildings · ' + carriers.length + ' carriers · ' + flags.length + ' flags</div>';
  el.innerHTML = html;
}

function selectBuilding(type) {
  selectedBuilding = (selectedBuilding === type) ? null : type;
  mode = 'build';
  updateModeButtons();
  buildBuildingPanel();
}

function setMode(m) {
  mode = m;
  if (m !== 'build') selectedBuilding = null;
  roadStart = null;
  updateModeButtons();
  buildBuildingPanel();

  var infoText = {
    build: 'Click map to place buildings · Right-click to cancel',
    road: 'Click a flag to start · Click another flag to connect · Right-click to cancel',
    demolish: 'Click a building or flag to remove it'
  };
  document.getElementById('info').textContent = infoText[m] || '';
}

function updateModeButtons() {
  document.getElementById('btn-build').classList.toggle('active', mode === 'build');
  document.getElementById('btn-road').classList.toggle('active', mode === 'road');
  document.getElementById('btn-demolish').classList.toggle('active', mode === 'demolish');
}

function setSpeed(s) {
  speed = s;
  document.getElementById('sp0').classList.toggle('active', s === 0);
  document.getElementById('sp1').classList.toggle('active', s === 1);
  document.getElementById('sp2').classList.toggle('active', s === 2);
  document.getElementById('sp4').classList.toggle('active', s === 4);
}
