    // Update economy display every 120 ticks
    if (tick % 120 === 0) { updatePopulation(); updateEconomy(); }

    // Update buildings
    for (var i = 0; i < buildings.length; i++) {
      var b = buildings[i];
      var def = BLDG[b.type];

      // Construction — needs materials delivered, then builds
      if (!b.built) {
        // Check if all materials delivered
        var allDelivered = true;
        for (var mr in b.materialsNeeded) {
          if (b.materialsNeeded[mr] > 0) { allDelivered = false; break; }
        }
        // If no cost (HQ), instant build
        if (allDelivered || Object.keys(b.materialsTotal).length === 0) {
          b.progress += 0.005;
          if (b.progress >= 1) {
            b.built = true;
            b.progress = 1;
            territoryDirty = true;
            mmDirty = true;
            var biso = tileToIso(b.tx, b.ty);
            floatingTexts.push({x: biso.x, y: biso.y, text: def.name + ' built!', color: '#8ac0ff', life: 90, maxLife: 90});
            sfxBuilt();
          }
        }
        continue;
      }

      // Production
      if (b.cooldown > 0) { b.cooldown--; continue; }

      // Housing buildings don't produce — skip
      if (b.type === 'cottage' || b.type === 'house') continue;

      // Throttle production if flag is congested — don't produce if flag nearly full
      var prodFlagTy2 = b.ty + (def.size || 1);
      var prodFlag2 = getFlagAt(b.tx, prodFlagTy2);
      if (prodFlag2 && prodFlag2.items.length >= 6 && def.produces) {
        b.cooldown = 30; // wait a bit and check again
        b.working = false;
        continue;
      }

      var hMult = getHappinessMultiplier();
      var seasonMod = getSeasonModifier(b.type);
      if (seasonMod === null) { b.working = false; b.cooldown = 60; continue; }

      // Tavern logic — consume bread, boost morale
      if (b.type === 'tavern') {
        if ((b.storage.bread || 0) > 0) {
          b.storage.bread--;
          b.working = true;
          var tiso = tileToIso(b.tx, b.ty);
          floatingTexts.push({x: tiso.x, y: tiso.y, text: '🍺 Cheers!', color: '#c0a050', life: 60, maxLife: 60});
        } else {
          b.working = false;
        }
        b.cooldown = def.interval;
        continue;
      }
      if (b.type === 'forester') {
        // Plant trees nearby
        var planted = false;
        for (var attempt = 0; attempt < 5; attempt++) {
          var dx = Math.floor(Math.random() * (def.radius * 2 + 1)) - def.radius;
          var dy = Math.floor(Math.random() * (def.radius * 2 + 1)) - def.radius;
          var px = b.tx + dx, py = b.ty + dy;
          if (px >= 0 && px < MAP_W && py >= 0 && py < MAP_H) {
            var ti = py * MAP_W + px;
            if (terrain[ti] === TERRAIN.GRASS && !getBuildingAt(px, py)) {
              terrain[ti] = TERRAIN.FOREST;
              planted = true;
              mmDirty = true;
              break;
            }
          }
        }
        b.working = planted;
        b.cooldown = Math.round(def.interval / (hMult * seasonMod));
      }
      else if (def.produces && !def.needs) {
        // Gatherer — produces from environment
        if (b.type === 'woodcutter') {
          // Find nearby forest tile
          var found = false;
          for (var dx2 = -def.radius; dx2 <= def.radius && !found; dx2++) {
            for (var dy2 = -def.radius; dy2 <= def.radius && !found; dy2++) {
              var fx = b.tx + dx2, fy = b.ty + dy2;
              if (fx >= 0 && fx < MAP_W && fy >= 0 && fy < MAP_H) {
                if (terrain[fy * MAP_W + fx] === TERRAIN.FOREST) {
                  terrain[fy * MAP_W + fx] = TERRAIN.GRASS;
                  mmDirty = true;
                  depositItem(b, def.produces);
                  sfxChop();
                  found = true;
                }
              }
            }
          }
          b.working = found;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'quarry') {
          var foundS = false;
          for (var dx3 = -def.radius; dx3 <= def.radius && !foundS; dx3++) {
            for (var dy3 = -def.radius; dy3 <= def.radius && !foundS; dy3++) {
              var sx = b.tx + dx3, sy = b.ty + dy3;
              if (sx >= 0 && sx < MAP_W && sy >= 0 && sy < MAP_H) {
                if (terrain[sy * MAP_W + sx] === TERRAIN.STONE) {
                  // 30% chance to deplete the tile (stone lasts longer)
                  if (Math.random() < 0.3) {
                    terrain[sy * MAP_W + sx] = TERRAIN.HILL;
                    mmDirty = true;
                  }
                  depositItem(b, def.produces);
                  sfxHammer();
                  foundS = true;
                }
              }
            }
          }
          b.working = foundS;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'fisher') {
          // Need water nearby
          var hasWater = false;
          for (var dx4 = -def.radius; dx4 <= def.radius && !hasWater; dx4++) {
            for (var dy4 = -def.radius; dy4 <= def.radius && !hasWater; dy4++) {
              var wx2 = b.tx + dx4, wy2 = b.ty + dy4;
              if (wx2 >= 0 && wx2 < MAP_W && wy2 >= 0 && wy2 < MAP_H) {
                if (terrain[wy2 * MAP_W + wx2] === TERRAIN.WATER) hasWater = true;
              }
            }
          }
          if (hasWater) {
            depositItem(b, 'fish');
            b.working = true;
          } else {
            b.working = false;
          }
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'well') {
          depositItem(b, 'water');
          b.working = true;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'hunter') {
          // Hunt nearby animals (prefer deer, fallback to rabbits)
          var hunted = false;
          for (var ha = 0; ha < animals.length && !hunted; ha++) {
            var prey = animals[ha];
            var hdx = prey.tx - b.tx, hdy = prey.ty - b.ty;
            if (Math.abs(hdx) <= def.radius && Math.abs(hdy) <= def.radius) {
              animals.splice(ha, 1);
              depositItem(b, 'meat');
              hunted = true;
            }
          }
          // Fallback: hunt if forest nearby (even without visible animals)
          if (!hunted) {
            var hasForest = false;
            for (var dx5 = -def.radius; dx5 <= def.radius && !hasForest; dx5++) {
              for (var dy5 = -def.radius; dy5 <= def.radius && !hasForest; dy5++) {
                var hx = b.tx + dx5, hy = b.ty + dy5;
                if (hx >= 0 && hx < MAP_W && hy >= 0 && hy < MAP_H) {
                  if (terrain[hy * MAP_W + hx] === TERRAIN.FOREST) hasForest = true;
                }
              }
            }
            if (hasForest) {
              depositItem(b, 'meat');
              hunted = true;
            }
          }
          b.working = hunted;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (b.type === 'farm') {
          depositItem(b, 'grain');
          b.working = true;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
        else if (def.category === 'mine') {
          // Mine — extract from nearby mineral deposits
          var mined = false;
          for (var mdx2 = -def.radius; mdx2 <= def.radius && !mined; mdx2++) {
            for (var mdy2 = -def.radius; mdy2 <= def.radius && !mined; mdy2++) {
              var mmx2 = b.tx + mdx2, mmy2 = b.ty + mdy2;
              if (mmx2 >= 0 && mmx2 < MAP_W && mmy2 >= 0 && mmy2 < MAP_H) {
                var mIdx = mmy2 * MAP_W + mmx2;
                if (minerals[mIdx] === def.needsMineral) {
                  // 15% chance to deplete mineral deposit each harvest
                  if (Math.random() < 0.15) {
                    minerals[mIdx] = MINERAL.NONE;
                    mmDirty = true;
                  }
                  depositItem(b, def.produces);
                  sfxHammer();
                  mined = true;
                }
              }
            }
          }
          b.working = mined;
          b.cooldown = Math.round(def.interval / (hMult * seasonMod));
        }
      }
      else if (def.produces && def.needs) {
        // Processor — needs input, produces output
        var hasInput = (b.storage[def.needs] || 0) > 0;
        var hasInput2 = !def.needs2 || (b.storage[def.needs2] || 0) > 0;
        if (hasInput && hasInput2) {
          b.storage[def.needs] = (b.storage[def.needs] || 0) - 1;
          if (def.needs2) b.storage[def.needs2] = (b.storage[def.needs2] || 0) - 1;
          depositItem(b, def.produces);
          if (b.type === 'sawmill') sfxSaw();
          else if (b.type === 'smelter') sfxSmelt();
          else if (b.type === 'toolmaker') sfxHammer();
          else sfxProduce();
          b.working = true;
        } else {
          b.working = false;
        }
        b.cooldown = Math.round(def.interval / (hMult * seasonMod));
      }
    }

    // Update carriers
    for (var ci = 0; ci < carriers.length; ci++) {
      updateCarrier(carriers[ci]);
    }

    // Update animals — wander slowly through forests
    if (tick % 8 === 0) {
      for (var ai2 = 0; ai2 < animals.length; ai2++) {
        var an = animals[ai2];
        an.timer--;
        if (an.timer <= 0) {
          an.timer = 60 + Math.floor(Math.random() * 120);
          an.dir = Math.floor(Math.random() * 4);
          var dx = [0, 1, 0, -1][an.dir], dy = [-1, 0, 1, 0][an.dir];
          var nx = an.tx + dx, ny = an.ty + dy;
          if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
            var nt = terrain[ny * MAP_W + nx];
            if (nt === TERRAIN.FOREST || nt === TERRAIN.GRASS) {
              an.tx = nx; an.ty = ny;
            }
          }
        }
        an.phase += 0.1;
      }
      // Occasionally spawn new animals in forests (population recovery)
      if (animals.length < 40 && Math.random() < 0.01) {
        var spx = Math.floor(Math.random() * MAP_W), spy = Math.floor(Math.random() * MAP_H);
        if (terrain[spy * MAP_W + spx] === TERRAIN.FOREST) {
          animals.push({tx: spx, ty: spy, type: Math.random() < 0.6 ? 'deer' : 'rabbit', dir: 0, timer: 100, phase: Math.random() * Math.PI * 2});
        }
      }
    }
  }
  updateSeasonParticles();
}

function depositItem(building, item) {
  var def = BLDG[building.type];
  var flagTy = building.ty + (def.size || 1);
  var flag = getFlagAt(building.tx, flagTy) || findNearestFlag(building.tx, building.ty);
  if (flag && flag.items.length < 8) {
    flag.items.push(item);
  } else {
    building.storage[item] = (building.storage[item] || 0) + 1;
  }
  // Floating notification
  var iso = tileToIso(building.tx, building.ty);
  var s = worldToScreen(iso.x, iso.y);
  var col = ITEM_COLORS[item] || '#fff';
  floatingTexts.push({x: iso.x, y: iso.y, text: '+1 ' + item, color: col, life: 60, maxLife: 60});
}

function drawFloatingTexts() {
  for (var i = floatingTexts.length - 1; i >= 0; i--) {
    var ft = floatingTexts[i];
    ft.life--;
    if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
    var alpha = ft.life / ft.maxLife;
    var rise = (ft.maxLife - ft.life) * 0.5;
    var s = worldToScreen(ft.x, ft.y - rise);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = Math.max(9, 10 * cam.zoom) + 'px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, s.x, s.y - 20 * cam.zoom);
    ctx.globalAlpha = 1;
  }
}

// Get the building whose flag is at this position
function getBuildingForFlag(flagTx, flagTy) {
  for (var bi = 0; bi < buildings.length; bi++) {
    var b = buildings[bi];
    var def = BLDG[b.type];
    var bFlagTy = b.ty + (def.size || 1);
    if (b.tx === flagTx && bFlagTy === flagTy) return b;
  }
  return null;
}

function updateCarrier(c) {
  if (c.state === 'idle') {
    var f1 = c.roadFrom, f2 = c.roadTo;
    var flag1 = getFlagAt(f1.tx, f1.ty);
    var flag2 = getFlagAt(f2.tx, f2.ty);
    if (!flag1 || !flag2) return;

    var myFlag = (c.tx === f1.tx && c.ty === f1.ty) ? flag1 : flag2;
    var otherFlag = (myFlag === flag1) ? flag2 : flag1;

    // Smart pickup: prefer items the other building actually needs
    if (myFlag.items.length > 0) {
      var bestIdx = 0;
      var otherBld = getBuildingForFlag(otherFlag.tx, otherFlag.ty);
      if (otherBld) {
        var odef = BLDG[otherBld.type];
        for (var pi = 0; pi < myFlag.items.length; pi++) {
          var pitem = myFlag.items[pi];
          // Under construction — wants planks/stone
          if (!otherBld.built && otherBld.materialsNeeded && (otherBld.materialsNeeded[pitem] || 0) > 0) { bestIdx = pi; break; }
          // Built — wants production inputs
          if (otherBld.built && (odef.needs === pitem || odef.needs2 === pitem) && (otherBld.storage[pitem] || 0) < 5) { bestIdx = pi; break; }
        }
      }
      c.carrying = myFlag.items.splice(bestIdx, 1)[0];
      c.state = 'walking';
      c.targetTx = otherFlag.tx;
      c.targetTy = otherFlag.ty;
      c.moveProgress = 0;
    }
    // If other flag has items, walk there to get them
    else if (otherFlag.items.length > 0) {
      c.state = 'walking';
      c.targetTx = otherFlag.tx;
      c.targetTy = otherFlag.ty;
      c.moveProgress = 0;
    }
  }
  else if (c.state === 'walking') {
    c.moveProgress += c.moveSpeed;
    if (c.moveProgress >= 1) {
      c.tx = c.targetTx;
      c.ty = c.targetTy;
      c.moveProgress = 0;
      var returnTrip = false;

      if (c.carrying) {
        var delivered = false;

        // Check: is there a building at this flag that wants this item?
        var bldHere = getBuildingForFlag(c.tx, c.ty);
        if (bldHere) {
          // Under construction — deliver construction materials
          if (!bldHere.built && bldHere.materialsNeeded && (bldHere.materialsNeeded[c.carrying] || 0) > 0) {
            bldHere.materialsNeeded[c.carrying]--;
            var biso2 = tileToIso(bldHere.tx, bldHere.ty);
            floatingTexts.push({x: biso2.x, y: biso2.y, text: '+' + c.carrying, color: '#c0a060', life: 45, maxLife: 45});
            c.carrying = null;
            delivered = true;
          }
          // Built building — deliver production inputs
          else if (bldHere.built) {
            var bdef = BLDG[bldHere.type];
            if (bdef.needs === c.carrying || bdef.needs2 === c.carrying) {
              if ((bldHere.storage[c.carrying] || 0) < 5) {
                bldHere.storage[c.carrying] = (bldHere.storage[c.carrying] || 0) + 1;
                c.carrying = null;
                delivered = true;
              }
            }
          }
        }

        // Check: is this the HQ flag? Store everything
        if (!delivered) {
          var hq = buildings.find(function(b2) { return b2.type === 'hq'; });
          if (hq) {
            var hqFlagTy = hq.ty + 3; // HQ size is 3, flag at ty+3
            if (c.tx === hq.tx && c.ty === hqFlagTy) {
              resources[c.carrying] = (resources[c.carrying] || 0) + 1;
              var hiso = tileToIso(hq.tx, hq.ty);
              floatingTexts.push({x: hiso.x, y: hiso.y, text: '+1 ' + c.carrying, color: '#4a90d0', life: 45, maxLife: 45});
              c.carrying = null;
              delivered = true;
              updateResourceDisplay();
            }
          }
        }

        // Otherwise leave at this flag for the next carrier
        if (!delivered) {
          var destFlag = getFlagAt(c.tx, c.ty);
          if (destFlag && destFlag.items.length < 8) {
            destFlag.items.push(c.carrying);
            c.carrying = null;
          } else {
            // Flag is full — carry the item BACK instead of destroying it
            returnTrip = true;
            var returnTx = (c.tx === c.roadFrom.tx && c.ty === c.roadFrom.ty) ? c.roadTo.tx : c.roadFrom.tx;
            var returnTy = (c.tx === c.roadFrom.tx && c.ty === c.roadFrom.ty) ? c.roadTo.ty : c.roadFrom.ty;
            c.targetTx = returnTx;
            c.targetTy = returnTy;
            c.moveProgress = 0;
          }
        }
      }

      if (!returnTrip) c.state = 'idle';
    }
  }
}

// ===== UI =====
function updateSeasonBadge() {
  var s = getSeason();
  var icons  = ['🌿','☀️','🍂','❄️'];
  var names  = ['SPRING','SUMMER','AUTUMN','WINTER'];
  var colors = ['#6a9058','#a09050','#a07040','#7090b0'];
  document.getElementById('season-icon').textContent = icons[s];
  document.getElementById('season-name').textContent = names[s];
  document.getElementById('season-name').style.color  = colors[s];
  document.getElementById('season-day').textContent   = 'Day ' + getSeasonDay() + ' of ' + DAYS_PER_SEASON;
  document.getElementById('season-progress').style.width = (getSeasonProgress() * 100).toFixed(1) + '%';
  document.getElementById('season-progress').style.background = ['#4a7838','#909040','#a07030','#6080a0'][s];
}

function initSeasonParticles() {
  seasonParticles.length = 0;
  var s = getSeason();
  if (s === 3) { // Winter — snow
    for (var i = 0; i < 30; i++) {
      seasonParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: 0.4 + Math.random() * 0.4,
        r: 1 + Math.random(),
        opacity: 0.4 + Math.random() * 0.3,
        type: 'snow', angle: 0, spin: 0
      });
    }
  } else if (s === 2) { // Autumn — leaves
    for (var j = 0; j < 15; j++) {
      seasonParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.6,
        vy: 0.6 + Math.random() * 0.5,
        r: 2.5,
        opacity: 0.5 + Math.random() * 0.3,
        type: 'leaf',
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.05,
        color: ['#c08030','#a06020','#d09040','#8a5018'][Math.floor(Math.random() * 4)]
      });
    }
  }
}

function updateSeasonParticles() {
  if (speed === 0) return;
  var s = getSeason();
  // Re-init if season changed and particles are from wrong season
  var wrongType = (s === 3 && seasonParticles.length > 0 && seasonParticles[0].type !== 'snow') ||
                  (s === 2 && seasonParticles.length > 0 && seasonParticles[0].type !== 'leaf') ||
                  ((s === 0 || s === 1) && seasonParticles.length > 0);
  if (wrongType || (seasonParticles.length === 0 && (s === 2 || s === 3))) {
    initSeasonParticles();
    return;
  }
  for (var i = 0; i < seasonParticles.length; i++) {
    var p = seasonParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.angle += p.spin || 0;
    // Wrap around screen
    if (p.y > canvas.height + 10) p.y = -10;
    if (p.x < -10) p.x = canvas.width + 10;
    if (p.x > canvas.width + 10) p.x = -10;
  }
}

function drawSeasonParticles() {
  var s = getSeason();
  var sp = getSeasonProgress();
  var fadeIn = Math.min(1, sp / (2/DAYS_PER_SEASON));
  var fadeOut = Math.min(1, (1 - sp) / (2/DAYS_PER_SEASON));
  var alpha = (sp < (2/DAYS_PER_SEASON)) ? fadeIn : (sp > (1 - 2/DAYS_PER_SEASON) ? fadeOut : 1);

  for (var i = 0; i < seasonParticles.length; i++) {
    var p = seasonParticles[i];
    var a = p.opacity * alpha;
    if (a < 0.01) continue;
    ctx.save();
    if (p.type === 'snow') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(220,235,248,' + a.toFixed(2) + ')';
      ctx.fill();
    } else { // leaf
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      var hexA = Math.round(a * 255).toString(16).padStart(2,'0');
      ctx.fillStyle = (p.color || '#c08030') + hexA; // #rrggbbaa — valid in Chrome
      ctx.fillRect(-p.r, -p.r * 0.6, p.r * 2, p.r * 1.2);
    }
    ctx.restore();
  }
}

function updateResourceDisplay() {
  var el = document.getElementById('resources');
  var html = '';
  var show = ['wood','planks','stone','grain','flour','bread','fish','water','meat','ironore','coal','goldore','iron','tools','coins'];
  for (var i = 0; i < show.length; i++) {
    var r = show[i];
    var icons = {wood:'🪵',planks:'🪓',stone:'🪨',grain:'🌾',flour:'🫘',bread:'🍞',fish:'🐟',water:'💧',meat:'🥩',ironore:'⛏',coal:'◼',goldore:'✦',iron:'🔩',tools:'🔧',coins:'🪙'};
    // Only show mining resources once they've been discovered (or a mine exists)
    if (['ironore','coal','goldore','iron','tools','coins'].indexOf(r) !== -1 && (resources[r] || 0) === 0) {
      var hasMineBuilding = buildings.some(function(b) { return BLDG[b.type] && (BLDG[b.type].category === 'mine' || BLDG[b.type].produces === r || BLDG[b.type].needs === r || BLDG[b.type].needs2 === r); });
      if (!hasMineBuilding) continue;
    }
    var displayNames = {ironore:'iron ore', goldore:'gold ore'};
    html += '<div class="res"><span class="icon">' + (icons[r]||'📦') + '</span><span class="val">' + (resources[r]||0) + '</span> ' + (displayNames[r] || r) + '</div>';
  }
  // Population and happiness
  var avail = getAvailableWorkers();
  var hMood = population.happiness;
  var moodIcon = hMood >= 70 ? '😊' : (hMood >= 40 ? '😐' : '😟');
  var moodColor = hMood >= 70 ? '#6aaa50' : (hMood >= 40 ? '#c0a040' : '#c05050');
  var hMul = getHappinessMultiplier();
  var mulStr = hMul !== 1.0 ? ' <span style="color:' + (hMul > 1 ? '#6a9a50' : '#c05050') + '">(' + (hMul > 1 ? '+' : '') + Math.round((hMul - 1) * 100) + '% speed)</span>' : '';
  html += '<div class="res" style="grid-column:1/-1;border-top:1px solid #1a2a40;margin-top:4px;padding-top:4px">';
  html += '<span class="icon">👥</span><span class="val">' + population.employed + '/' + population.capacity + '</span> pop';
  html += ' <span style="color:#506878;margin-left:4px">' + avail + ' free</span></div>';
  html += '<div class="res" style="grid-column:1/-1">';
  html += '<span class="icon">' + moodIcon + '</span><span class="val" style="color:' + moodColor + '">' + hMood + '%</span> happiness' + mulStr + '</div>';
  var foodRate = Math.ceil(population.employed / 3);
  html += '<div class="res" style="grid-column:1/-1"><span class="icon">🍽</span><span style="color:#506878">eats ' + foodRate + ' food/cycle</span></div>';
  el.innerHTML = html;
}

function updateEconomy() {
  var el = document.getElementById('economy');
  if (!el) return;
  var counts = {};
  var working = {};
  var constructing = 0;
  for (var i = 0; i < buildings.length; i++) {
    var b = buildings[i];
    if (b.type === 'hq') continue;
    counts[b.type] = (counts[b.type] || 0) + 1;
    if (!b.built) constructing++;
    else if (b.working) working[b.type] = (working[b.type] || 0) + 1;
  }
  var lines = [];
  if (constructing > 0) lines.push('🏗 ' + constructing + ' building...');
  var typeNames = {woodcutter:'🪵', forester:'🌱', sawmill:'🪓', quarry:'⛏', farm:'🌾', mill:'⚙', bakery:'🍞', fisher:'🐟', well:'💧', hunter:'🏹', ironmine:'⛏', coalmine:'◼', goldmine:'✦', smelter:'🔥', toolmaker:'🔧', mint:'🪙', guard:'🛡', cottage:'🏠', house:'🏘', tavern:'🍺'};
  for (var t in counts) {
    var icon = typeNames[t] || '🏠';
    var w = working[t] || 0;
    var c = counts[t];
    var status = w === c ? '<span style="color:#6a9a50">✓</span>' : (w > 0 ? '<span style="color:#c0a040">' + w + '/' + c + '</span>' : '<span style="color:#8a4040">idle</span>');
    lines.push(icon + ' ' + BLDG[t].name + ' ×' + c + ' ' + status);
  }
  lines.push('🦌 ' + animals.length + ' wildlife · 🛤 ' + roads.length + ' roads');
  el.innerHTML = lines.join('<br>');
}

function buildBuildingPanel() {
  var el = document.getElementById('buildings');
  var html = '';
  var categories = {gather:'Resource', mine:'Mining', process:'Processing', military:'Military', housing:'Housing'};
  var lastCat = '';
  var types = Object.keys(BLDG);
  for (var i = 0; i < types.length; i++) {
    var type = types[i];
    if (type === 'hq') continue;
    var def = BLDG[type];
    if (def.category !== lastCat) {
      lastCat = def.category;
      html += '<div style="color:#4a6a80;font-size:9px;letter-spacing:1.5px;padding:6px 2px 3px;border-bottom:1px solid #1a2a40;margin-bottom:4px">' + (categories[def.category] || def.category).toUpperCase() + '</div>';
    }
    var costStr = Object.keys(def.cost).map(function(r) { return def.cost[r] + ' ' + r; }).join(', ') || 'Free';
    var canAfford = true;
    for (var r in def.cost) {
      if ((resources[r] || 0) < def.cost[r]) canAfford = false;
    }
    html += '<button class="bldg-btn' + (selectedBuilding === type ? ' selected' : '') + '" onclick="selectBuilding(\'' + type + '\')" ' + (canAfford ? '' : 'style="opacity:0.4"') + '>';
    html += '<div class="name">' + def.name + '</div>';
    html += '<div class="cost">' + costStr + '</div>';
    html += '<div class="desc">' + def.desc + '</div>';
    html += '</button>';
  }
  // Stats
  html += '<div style="color:#4a6a80;font-size:9px;letter-spacing:1.5px;padding:6px 2px 3px;border-top:1px solid #1a2a40;margin-top:8px">STATS</div>';
  html += '<div style="font-size:10px;color:#6a8aa0;padding:2px">' + buildings.length + ' buildings · ' + carriers.length + ' carriers · ' + flags.length + ' flags</div>';
  el.innerHTML = html;
}

function selectBuilding(type) {
  selectedBuilding = (selectedBuilding === type) ? null : type;
  mode = 'build';
  updateModeButtons();
  buildBuildingPanel();
}

function setMode(m) {
  mode = m;
  if (m !== 'build') selectedBuilding = null;
  roadStart = null;
  updateModeButtons();
  buildBuildingPanel();

  var infoText = {
    build: 'Click map to place buildings · Right-click to cancel',
    road: 'Click a flag to start · Click another flag to connect · Right-click to cancel',
    demolish: 'Click a building or flag to remove it'
  };
  document.getElementById('info').textContent = infoText[m] || '';
}

function updateModeButtons() {
  document.getElementById('btn-build').classList.toggle('active', mode === 'build');
  document.getElementById('btn-road').classList.toggle('active', mode === 'road');
  document.getElementById('btn-demolish').classList.toggle('active', mode === 'demolish');
}

function setSpeed(s) {
  speed = s;
  document.getElementById('sp0').classList.toggle('active', s === 0);
  document.getElementById('sp1').classList.toggle('active', s === 1);
  document.getElementById('sp2').classList.toggle('active', s === 2);
  document.getElementById('sp4').classList.toggle('active', s === 4);
}

function canvasX(e) { return e.clientX - 220; }
function canvasY(e) { return e.clientY; }

canvas.addEventListener('mousedown', function(e) {
  if (e.button === 2) {
    selectedBuilding = null;
    roadStart = null;
    buildBuildingPanel();
    return;
  }
  if (e.button === 0) {
    dragging = true;
    dragStart = {x: e.clientX, y: e.clientY};
    camStart = {x: cam.x, y: cam.y};
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (dragging) {
    var dx = e.clientX - dragStart.x;
    var dy = e.clientY - dragStart.y;
    cam.x = camStart.x + dx;
    cam.y = camStart.y + dy;
  }

  var tile = screenToTile(canvasX(e), canvasY(e));
  hoverTile = tile;

  // Tooltip for buildings
  var b = getBuildingAt(tile.tx, tile.ty);
  if (b) {
    var def = BLDG[b.type];
    var lines = [];
    if (!b.built) {
      var needsList = [];
      for (var mr3 in b.materialsNeeded) {
        if (b.materialsNeeded[mr3] > 0) needsList.push(b.materialsNeeded[mr3] + ' ' + mr3);
      }
      if (needsList.length > 0) {
        lines.push('Awaiting: ' + needsList.join(', '));
      } else {
        lines.push('Building... ' + Math.floor(b.progress * 100) + '%');
      }
    }
    else {
      if (def.housing) {
        lines.push('Houses ' + def.housing + ' villagers');
      } else if (b.type === 'tavern') {
        lines.push(b.working ? 'Serving drinks!' : 'Needs bread');
      } else {
        lines.push(b.working ? 'Working' : 'Idle');
      }
      if (def.produces) lines.push('Produces: ' + def.produces);
      if (def.needs) lines.push('Needs: ' + def.needs + (def.needs2 ? ' + ' + def.needs2 : ''));
      var stored = Object.keys(b.storage).filter(function(k) { return b.storage[k] > 0; });
      if (stored.length > 0) {
        lines.push('Storage: ' + stored.map(function(k) { return b.storage[k] + ' ' + k; }).join(', '));
      }
    }
    showTooltip(e.clientX, e.clientY, def.name, lines);
  } else {
    var f = getFlagAt(tile.tx, tile.ty);
    if (f) {
      var flagOwner = getBuildingForFlag(f.tx, f.ty);
      var flagTitle = flagOwner ? BLDG[flagOwner.type].name + ' Flag' : 'Flag';
      showTooltip(e.clientX, e.clientY, flagTitle, [f.items.length + '/8 items' + (f.items.length > 0 ? ': ' + f.items.join(', ') : '')]);
    } else {
      // Show mineral info for mountain tiles
      var ti2 = tile.ty * MAP_W + tile.tx;
      if (tile.tx >= 0 && tile.tx < MAP_W && tile.ty >= 0 && tile.ty < MAP_H && terrain[ti2] === TERRAIN.MOUNTAIN && minerals[ti2] !== MINERAL.NONE) {
        var mNames = {1:'Iron Deposit', 2:'Coal Deposit', 3:'Gold Deposit'};
        showTooltip(e.clientX, e.clientY, mNames[minerals[ti2]], ['Mountain tile with mineral vein']);
      } else {
        hideTooltip();
      }
    }
  }
});

canvas.addEventListener('mouseup', function(e) {
  if (e.button !== 0) return;
  var moved = Math.abs(e.clientX - dragStart.x) + Math.abs(e.clientY - dragStart.y);
  dragging = false;

  if (moved > 5) return; // was a pan, not a click

  var tile = screenToTile(canvasX(e), canvasY(e));

  if (mode === 'build' && selectedBuilding) {
    if (placeBuilding(selectedBuilding, tile.tx, tile.ty)) {
      buildBuildingPanel(); // refresh costs
    }
  } else if (mode === 'road') {
    var flag = getFlagAt(tile.tx, tile.ty);
    if (!flag) {
      // Place a new flag here
      if (placeFlag(tile.tx, tile.ty)) {
        flag = getFlagAt(tile.tx, tile.ty);
      }
    }
    if (flag) {
      if (!roadStart) {
        roadStart = flag;
        document.getElementById('info').textContent = 'Road from (' + flag.tx + ',' + flag.ty + ') · Click another flag to connect';
      } else {
        if (flag !== roadStart) {
          placeRoad(roadStart, flag);
        }
        roadStart = null;
        document.getElementById('info').textContent = 'Click a flag to start · Click another flag to connect';
      }
    }
  } else if (mode === 'demolish') {
    var bld = getBuildingAt(tile.tx, tile.ty);
    if (bld && bld.type !== 'hq') {
      buildings.splice(buildings.indexOf(bld), 1);
    } else {
      var fl = getFlagAt(tile.tx, tile.ty);
      if (fl) {
        // Remove connected roads and carriers
        roads = roads.filter(function(r) {
          return !(r.from.tx === fl.tx && r.from.ty === fl.ty) && !(r.to.tx === fl.tx && r.to.ty === fl.ty);
        });
        carriers = carriers.filter(function(cr) {
          return !(cr.roadFrom.tx === fl.tx && cr.roadFrom.ty === fl.ty) && !(cr.roadTo.tx === fl.tx && cr.roadTo.ty === fl.ty);
        });
        flags.splice(flags.indexOf(fl), 1);
      }
    }
  }
});

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var oldZoom = cam.zoom;
  cam.zoom *= e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.max(0.3, Math.min(3, cam.zoom));

  // Zoom toward mouse
  var mx = canvasX(e), my = canvasY(e);
  cam.x = mx - (mx - cam.x) * (cam.zoom / oldZoom);
  cam.y = my - (my - cam.y) * (cam.zoom / oldZoom);
});

// ===== MINIMAP =====
var minimapSize = 140;
var mmCanvas = null, mmCtx = null;
function initMinimap() {
  mmCanvas = document.createElement('canvas');
  mmCanvas.width = minimapSize;
  mmCanvas.height = minimapSize;
  mmCtx = mmCanvas.getContext('2d');
}
initMinimap();

var mmDirty = true;
var mmTimer = 0;
function drawMinimap() {
  var mx = canvas.width - minimapSize - 10;
  var my = canvas.height - minimapSize - 10;

  // Redraw minimap texture periodically
  mmTimer++;
  if (mmTimer % 60 === 0 || mmDirty) {
    mmDirty = false;
    mmCtx.fillStyle = '#1a1a2e';
    mmCtx.fillRect(0, 0, minimapSize, minimapSize);
    var scale = minimapSize / Math.max(MAP_W, MAP_H);
    for (var y = 0; y < MAP_H; y++) {
      for (var x = 0; x < MAP_W; x++) {
        var t = terrain[y * MAP_W + x];
        var colors = {0:'#2a4a6a', 1:'#3a6a35', 2:'#2a5a28', 3:'#6a6a68', 4:'#5a7a4a', 5:'#8a8560', 6:'#555a60'};
        mmCtx.fillStyle = (t === 0 && riverSet.has(y * MAP_W + x)) ? '#3a6a8a' : (colors[t] || '#333');
        mmCtx.fillRect(x * scale, y * scale, Math.ceil(scale), Math.ceil(scale));
        // Show mineral deposits on minimap
        var mm = minerals[y * MAP_W + x];
        if (mm !== 0) {
          mmCtx.fillStyle = mm === 1 ? '#a05030' : mm === 2 ? '#303030' : '#d0b030';
          mmCtx.fillRect(x * scale, y * scale, Math.ceil(scale), Math.ceil(scale));
        }
      }
    }
    // Draw buildings on minimap
    for (var bi = 0; bi < buildings.length; bi++) {
      var b = buildings[bi];
      mmCtx.fillStyle = b.type === 'hq' ? '#ff0' : '#f80';
      mmCtx.fillRect(b.tx * scale - 1, b.ty * scale - 1, 3, 3);
    }
  }

  // Draw minimap to main canvas
  ctx.drawImage(mmCanvas, mx, my);

  // Border
  ctx.strokeStyle = '#2a3a50';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, minimapSize, minimapSize);

  // Viewport rectangle
  var scale2 = minimapSize / Math.max(MAP_W, MAP_H);
  var vpLeft = screenToTile(0, canvas.height / 2);
  var vpRight = screenToTile(canvas.width, canvas.height / 2);
  var vpTop = screenToTile(canvas.width / 2, 0);
  var vpBot = screenToTile(canvas.width / 2, canvas.height);
  ctx.strokeStyle = 'rgba(200,200,255,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(
    mx + Math.max(0, vpTop.tx) * scale2,
    my + Math.max(0, vpLeft.ty) * scale2,
    Math.min(MAP_W, vpRight.tx - vpLeft.tx) * scale2,
    Math.min(MAP_H, vpBot.ty - vpTop.ty) * scale2
  );
}

// ===== RENDER LOOP =====
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw terrain
  // Determine visible tile range for culling
  var topLeft = screenToTile(0, 0);
  var botRight = screenToTile(canvas.width, canvas.height);
  var minTx = Math.max(0, topLeft.tx - 5);
  var minTy = Math.max(0, topLeft.ty - 5);
  var maxTx = Math.min(MAP_W - 1, botRight.tx + 5);
  var maxTy = Math.min(MAP_H - 1, botRight.ty + 5);

  // Draw in iso order (back to front)
  for (var y = 0; y < MAP_H; y++) {
    for (var x = 0; x < MAP_W; x++) {
      drawTile(x, y);
    }
  }

  // Draw trees and stones on terrain
  for (var y2 = 0; y2 < MAP_H; y2++) {
    for (var x2 = 0; x2 < MAP_W; x2++) {
      var ti = y2 * MAP_W + x2;
      if (terrain[ti] === TERRAIN.FOREST) drawTree(x2, y2);
      else if (terrain[ti] === TERRAIN.STONE) drawStone(x2, y2);
      if (terrain[ti] === TERRAIN.MOUNTAIN && minerals[ti] !== MINERAL.NONE) drawMineral(x2, y2);
    }
  }

  // Draw roads
  for (var ri = 0; ri < roads.length; ri++) {
    drawRoad(roads[ri]);
  }

  // Draw flags
  for (var fi = 0; fi < flags.length; fi++) {
    drawFlag(flags[fi]);
  }

  // Draw buildings (sorted by y for correct overlap)
  var sortedBuildings = buildings.slice().sort(function(a, b) { return (a.ty + a.tx) - (b.ty + b.tx); });
  for (var bi = 0; bi < sortedBuildings.length; bi++) {
    drawBuilding(sortedBuildings[bi]);
  }

  // Draw carriers
  for (var ci = 0; ci < carriers.length; ci++) {
    drawCarrier(carriers[ci]);
  }

  // Draw animals
  for (var ai3 = 0; ai3 < animals.length; ai3++) {
    var an = animals[ai3];
    var aIso = tileToIso(an.tx, an.ty);
    var aS = worldToScreen(aIso.x, aIso.y);
    if (aS.x < -30 || aS.x > canvas.width + 30 || aS.y < -30 || aS.y > canvas.height + 30) continue;
    var az = cam.zoom;
    if (az < 0.4) continue; // too far to see
    if (an.type === 'deer') {
      // Brown body
      var bounce = Math.sin(an.phase) * 0.5 * az;
      ctx.fillStyle = '#8a6a40';
      ctx.fillRect(aS.x - 3 * az, aS.y - 4 * az + bounce, 6 * az, 3 * az);
      // Head
      ctx.fillStyle = '#9a7a50';
      ctx.fillRect(aS.x + 2 * az, aS.y - 6 * az + bounce, 2.5 * az, 2.5 * az);
      // Antlers (small v shapes)
      ctx.strokeStyle = '#6a5030';
      ctx.lineWidth = 0.8 * az;
      ctx.beginPath();
      ctx.moveTo(aS.x + 3 * az, aS.y - 6.5 * az + bounce);
      ctx.lineTo(aS.x + 2 * az, aS.y - 9 * az + bounce);
      ctx.moveTo(aS.x + 3.5 * az, aS.y - 6.5 * az + bounce);
      ctx.lineTo(aS.x + 5 * az, aS.y - 9 * az + bounce);
      ctx.stroke();
      // Legs
      ctx.strokeStyle = '#7a5a30';
      ctx.lineWidth = 0.7 * az;
      var legSwing = Math.sin(an.phase * 2) * 1.5 * az;
      ctx.beginPath();
      ctx.moveTo(aS.x - 2 * az, aS.y - 1 * az); ctx.lineTo(aS.x - 2 * az + legSwing, aS.y + 2 * az);
      ctx.moveTo(aS.x + 2 * az, aS.y - 1 * az); ctx.lineTo(aS.x + 2 * az - legSwing, aS.y + 2 * az);
      ctx.stroke();
    } else {
      // Rabbit — small and bouncy
      var hop = Math.abs(Math.sin(an.phase * 1.5)) * 2 * az;
      ctx.fillStyle = '#b0a080';
      ctx.beginPath();
      ctx.arc(aS.x, aS.y - 2 * az - hop, 2 * az, 0, Math.PI * 2);
      ctx.fill();
      // Ears
      ctx.fillStyle = '#c0b090';
      ctx.fillRect(aS.x - 1.5 * az, aS.y - 5 * az - hop, 1 * az, 2.5 * az);
      ctx.fillRect(aS.x + 0.5 * az, aS.y - 5 * az - hop, 1 * az, 2.5 * az);
    }
  }

  // Ambient birds
  if (tick % 600 === 0 && Math.random() < 0.3) {
    // Spawn a bird flock
    var bx = Math.random() * canvas.width;
    if (!window._birds) window._birds = [];
    window._birds.push({x: -50, y: 30 + Math.random() * 80, vx: 0.5 + Math.random() * 0.5, count: 3 + Math.floor(Math.random() * 4), age: 0});
  }
  if (window._birds) {
    ctx.fillStyle = '#2a3a50';
    for (var bi2 = window._birds.length - 1; bi2 >= 0; bi2--) {
      var flock = window._birds[bi2];
      flock.x += flock.vx;
      flock.age++;
      if (flock.x > canvas.width + 100) { window._birds.splice(bi2, 1); continue; }
      for (var fb = 0; fb < flock.count; fb++) {
        var row = fb < Math.ceil(flock.count / 2) ? 0 : 1;
        var col = row === 0 ? fb : fb - Math.ceil(flock.count / 2);
        var bpx = flock.x + col * 12 - row * 6;
        var bpy = flock.y + (row === 0 ? -col * 5 : col * 5) + Math.sin(flock.age * 0.08 + fb) * 3;
        // Wing shape — small v
        ctx.beginPath();
        ctx.moveTo(bpx - 3, bpy - 1); ctx.lineTo(bpx, bpy + 1); ctx.lineTo(bpx + 3, bpy - 1);
        ctx.strokeStyle = '#3a4a60';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  // Floating notifications
  drawFloatingTexts();

  // Placement preview
  drawPlacementPreview();

  // ===== DAY/NIGHT OVERLAY =====
  var tod = getTimeOfDay();
  var daylight = getDaylight(tod);

  if (daylight < 0.95) {
    // Dawn/dusk warmth factor
    var warmth = 0;
    if (tod > 0.18 && tod < 0.32) warmth = 1 - Math.abs(tod - 0.25) / 0.07;
    if (tod > 0.68 && tod < 0.82) warmth = 1 - Math.abs(tod - 0.75) / 0.07;
    warmth = Math.max(0, Math.min(1, warmth));

    var nr = 10 + warmth * 170, ng = 15 + warmth * 60, nb = 45 - warmth * 25;
    var alpha = (1 - daylight) * 0.38;
    ctx.fillStyle = 'rgba(' + Math.floor(nr) + ',' + Math.floor(ng) + ',' + Math.floor(nb) + ',' + alpha.toFixed(3) + ')';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Stars at night
  if (daylight < 0.25) {
    var starAlpha = (0.25 - daylight) / 0.25;
    var stars = getStarPositions(50);
    for (var si2 = 0; si2 < stars.length; si2++) {
      var star = stars[si2];
      var stx = star.sx * canvas.width;
      var sty = star.sy * canvas.height;
      var twinkle = 0.4 + 0.6 * Math.sin(tick * star.twinkleSpeed + si2 * 2.3);
      ctx.globalAlpha = starAlpha * star.brightness * twinkle;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(stx, sty, star.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Fireflies at dusk/night near forests
  if (daylight < 0.4) {
    var ffIntensity = Math.min(1, (0.4 - daylight) / 0.3);
    if (!window._fireflies) window._fireflies = [];
    // Spawn new fireflies near forest tiles
    if (window._fireflies.length < 25 && tick % 30 === 0) {
      for (var ffi = 0; ffi < MAP_W * MAP_H; ffi++) {
        if (terrain[ffi] === TERRAIN.FOREST && Math.random() < 0.003) {
          var ffx = ffi % MAP_W, ffy = Math.floor(ffi / MAP_W);
          var ffIso = tileToIso(ffx, ffy);
          window._fireflies.push({
            x: ffIso.x + (Math.random() - 0.5) * 20,
            y: ffIso.y - 10 + (Math.random() - 0.5) * 10,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.2,
            phase: Math.random() * Math.PI * 2,
            life: 200 + Math.floor(Math.random() * 300)
          });
          break;
        }
      }
    }
    for (var ff2 = window._fireflies.length - 1; ff2 >= 0; ff2--) {
      var ff = window._fireflies[ff2];
      ff.x += ff.vx + Math.sin(tick * 0.02 + ff.phase) * 0.15;
      ff.y += ff.vy + Math.cos(tick * 0.015 + ff.phase * 1.3) * 0.1;
      ff.life--;
      if (ff.life <= 0) { window._fireflies.splice(ff2, 1); continue; }
      var ffS = worldToScreen(ff.x, ff.y);
      if (ffS.x < -10 || ffS.x > canvas.width + 10 || ffS.y < -10 || ffS.y > canvas.height + 10) continue;
      var glow = (0.3 + 0.7 * Math.sin(tick * 0.06 + ff.phase)) * ffIntensity;
      // Outer glow
      ctx.fillStyle = 'rgba(180,255,100,' + (glow * 0.1).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(ffS.x, ffS.y, 6 * cam.zoom, 0, Math.PI * 2);
      ctx.fill();
      // Core
      ctx.fillStyle = 'rgba(200,255,120,' + (glow * 0.8).toFixed(2) + ')';
      ctx.beginPath();
      ctx.arc(ffS.x, ffS.y, 1.5 * cam.zoom, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    window._fireflies = [];
  }

  // Chimney smoke from working buildings
  if (!window._smokeParticles) window._smokeParticles = [];
  var smokeTypes = ['bakery', 'smelter', 'sawmill', 'mill', 'toolmaker', 'mint'];
  // Spawn new smoke
  if (window._smokeParticles.length < 60 && tick % 8 === 0) {
    for (var si2 = 0; si2 < buildings.length; si2++) {
      var sb = buildings[si2];
      if (!sb.built || !sb.working) continue;
      if (smokeTypes.indexOf(sb.type) === -1) continue;
      if (Math.random() > 0.3) continue;
      var sIso = tileToIso(sb.tx, sb.ty);
      var sDef = BLDG[sb.type];
      var sBh = (10 + sDef.size * 5);
      window._smokeParticles.push({
        x: sIso.x + (Math.random() - 0.5) * 3,
        y: sIso.y - sBh - 8 + (Math.random() - 0.5) * 2,
        vx: (Math.random() - 0.5) * 0.15,
        vy: -0.2 - Math.random() * 0.15,
        size: 1.5 + Math.random() * 1.5,
        life: 80 + Math.floor(Math.random() * 60),
        maxLife: 80 + Math.floor(Math.random() * 60)
      });
      if (window._smokeParticles.length >= 60) break;
    }
  }
  // Update and draw smoke
  for (var sp2 = window._smokeParticles.length - 1; sp2 >= 0; sp2--) {
    var sp = window._smokeParticles[sp2];
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.vx += (Math.random() - 0.5) * 0.02; // drift
    sp.size += 0.03; // expand
    sp.life--;
    if (sp.life <= 0) { window._smokeParticles.splice(sp2, 1); continue; }
    var spS = worldToScreen(sp.x, sp.y);
    if (spS.x < -20 || spS.x > canvas.width + 20 || spS.y < -20 || spS.y > canvas.height + 20) continue;
    var fade = sp.life / sp.maxLife;
    var alpha = fade * 0.25;
    var grey = daylight > 0.5 ? 160 : 120;
    ctx.fillStyle = 'rgba(' + grey + ',' + grey + ',' + (grey + 10) + ',' + alpha.toFixed(3) + ')';
    ctx.beginPath();
    ctx.arc(spS.x, spS.y, sp.size * cam.zoom, 0, Math.PI * 2);
    ctx.fill();
  }

  // Window glow at night
  if (daylight < 0.55) {
    var glowIntensity = Math.min(1, (0.55 - daylight) / 0.4);
    for (var wi = 0; wi < buildings.length; wi++) {
      var wb = buildings[wi];
      if (!wb.built) continue;
      var wIso = tileToIso(wb.tx, wb.ty);
      var wS = worldToScreen(wIso.x, wIso.y);
      if (wS.x < -50 || wS.x > canvas.width + 50 || wS.y < -50 || wS.y > canvas.height + 50) continue;
      var wz = cam.zoom;
      if (wz < 0.3) continue;
      var wDef = BLDG[wb.type];
      var wBh = (10 + wDef.size * 5) * wz;

      // Warm window rectangles
      ctx.fillStyle = 'rgba(255,210,90,' + (glowIntensity * 0.75).toFixed(2) + ')';
      ctx.fillRect(wS.x - 4 * wz, wS.y - wBh * 0.65, 2.5 * wz, 2.5 * wz);
      if (wDef.size >= 2) {
        ctx.fillRect(wS.x + 2 * wz, wS.y - wBh * 0.65, 2.5 * wz, 2.5 * wz);
      }

      // Soft light pool on ground
      ctx.fillStyle = 'rgba(255,190,70,' + (glowIntensity * 0.06).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(wS.x, wS.y + 2 * wz, 8 * wz, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Minimap
  drawMinimap();
  drawSeasonParticles();

  // Game time display with day/night clock
  var dayNum = Math.floor(tick / DAY_LENGTH) + 1;
  var clockStr = getClockStr(tod);
  var timePeriod = getTimePeriod(tod, daylight);
  var periodColors = {Day:'#8aa060', Dawn:'#c0a050', Dusk:'#c08050', Twilight:'#7070a0', Night:'#5060a0'};
  ctx.fillStyle = 'rgba(15,20,35,0.8)';
  ctx.fillRect(canvas.width - 220, canvas.height - 32, 210, 24);
  ctx.font = '11px system-ui';
  ctx.textAlign = 'right';
  ctx.fillStyle = periodColors[timePeriod] || '#6a8aa0';
  ctx.fillText(clockStr + ' ' + timePeriod, canvas.width - 110, canvas.height - 15);
  ctx.fillStyle = '#4a6a80';
  ctx.fillText('Day ' + dayNum, canvas.width - 16, canvas.height - 15);
  // Music indicator
  if (musicEnabled) {
    ctx.fillStyle = '#6a9a6a';
    ctx.fillText('\u266B', canvas.width - 225, canvas.height - 15);
  }
  ctx.textAlign = 'left';

  // Dynamic background color
  var bgR = Math.floor(26 - (1 - daylight) * 12);
  var bgG = Math.floor(26 - (1 - daylight) * 10);
  var bgB = Math.floor(46 - (1 - daylight) * 10);
  document.body.style.background = 'rgb(' + bgR + ',' + bgG + ',' + bgB + ')';

  simulate();

  // Season change notification
  if (_lastNotifiedSeason !== -1 && getSeason() !== _lastNotifiedSeason) {
    _lastNotifiedSeason = getSeason();
    var msgs = ['🌿 Spring — the fields wake','☀️ Summer — peak growing season','🍂 Autumn — harvest time','❄️ Winter — farms lie dormant'];
    var notifyPos = tileToIso(Math.floor(MAP_W / 2), Math.floor(MAP_H / 2));
    floatingTexts.push({x: notifyPos.x, y: notifyPos.y, text: msgs[getSeason()], color: ['#6a9058','#a09040','#a07030','#7090b0'][getSeason()], life: 200, maxLife: 200});
    updateSeasonBadge();
  } // end season change notification

  // Refresh UI periodically
  if (tick % 60 === 0) {
    buildBuildingPanel();
    updateResourceDisplay();
    updateSeasonBadge();
    mmDirty = true;
  }

  requestAnimationFrame(render);
}

// Page Visibility API
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    speed = 0;
    if (musicEnabled) stopMusic();
  } else {
    setSpeed(1);
    if (musicEnabled) startMusic();
  }
});

function newGame() {
  terrain.fill(0);
  height.fill(0);
  buildings.length = 0;
  flags.length = 0;
  roads.length = 0;
  carriers.length = 0;
  floatingTexts.length = 0;
  territoryDirty = true;
  resources = {wood:10, planks:8, stone:8, bread:4, grain:0, flour:0, fish:2, water:0, meat:0, ironore:0, coal:0, goldore:0, iron:0, tools:0, coins:0};
  tick = Math.floor(DAY_LENGTH * 0.3); // Start at ~7am
  _lastNotifiedSeason = getSeason(); // Spring (0) — no toast on new game
  seasonParticles.length = 0;
  gameTime = 0;
  mmDirty = true;
  generateMap();
  buildBuildingPanel();
  updateResourceDisplay();
  updateEconomy();
  updateSeasonBadge();
}

// ===== NEW GAME CONFIRM =====
var newGamePending = false;
function newGameConfirm() {
  if (buildings.length <= 1) { newGame(); return; }
  // Double-click to confirm
  if (newGamePending) { newGame(); newGamePending = false; return; }
  newGamePending = true;
  var el = document.getElementById('save-status');
  el.textContent = 'Click again to confirm';
  el.style.color = '#c08050';
  setTimeout(function() { newGamePending = false; el.textContent = ''; }, 3000);
}

// ===== SAVE / LOAD =====
var SAVE_KEY = 'settlers_save_v3'; // v3: population & happiness (was v2: 80x80 map)
var autoSaveInterval = 60000; // 60 seconds

function saveGame() {
  try {
    var state = {
      version: 3,
      tick: tick,
      gameTime: gameTime,
      cam: {x: cam.x, y: cam.y, zoom: cam.zoom},
      resources: JSON.parse(JSON.stringify(resources)),
      terrain: Array.from(terrain),
      minerals: Array.from(minerals),
      height: Array.from(height),
      buildings: buildings.map(function(b) {
        return {
          type: b.type, tx: b.tx, ty: b.ty,
          built: b.built, progress: b.progress,
          materialsNeeded: JSON.parse(JSON.stringify(b.materialsNeeded || {})),
          materialsTotal: JSON.parse(JSON.stringify(b.materialsTotal || {})),
          working: b.working, cooldown: b.cooldown,
          storage: JSON.parse(JSON.stringify(b.storage || {})),
          workerOut: b.workerOut || false
        };
      }),
      flags: flags.map(function(f) {
        return {tx: f.tx, ty: f.ty, items: f.items.slice()};
      }),
      roads: roads.map(function(r) {
        return {from: {tx: r.from.tx, ty: r.from.ty}, to: {tx: r.to.tx, ty: r.to.ty}};
      }),
      carriers: carriers.map(function(c) {
        return {
          tx: c.tx, ty: c.ty,
          targetTx: c.targetTx, targetTy: c.targetTy,
          carrying: c.carrying, state: c.state,
          moveProgress: c.moveProgress, moveSpeed: c.moveSpeed,
          waitTimer: c.waitTimer,
          roadFrom: c.roadFrom ? {tx: c.roadFrom.tx, ty: c.roadFrom.ty} : null,
          roadTo: c.roadTo ? {tx: c.roadTo.tx, ty: c.roadTo.ty} : null
        };
      }),
      animals: animals.map(function(a) {
        return {tx: a.tx, ty: a.ty, type: a.type, dir: a.dir, timer: a.timer, phase: a.phase || 0};
      }),
      population: {capacity: population.capacity, employed: population.employed, happiness: population.happiness},
      savedAt: new Date().toISOString()
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    var el = document.getElementById('save-status');
    el.textContent = 'Saved!';
    el.style.color = '#6ab070';
    setTimeout(function() { el.textContent = ''; }, 2000);
    return true;
  } catch(e) {
    var el2 = document.getElementById('save-status');
    el2.textContent = 'Error!';
    el2.style.color = '#c05050';
    console.error('Save failed:', e);
    return false;
  }
}

function loadGame() {
  try {
    var raw = localStorage.getItem(SAVE_KEY) || localStorage.getItem('settlers_save_v2');
    if (!raw) {
      var el = document.getElementById('save-status');
      el.textContent = 'No save found';
      el.style.color = '#a08060';
      setTimeout(function() { el.textContent = ''; }, 2000);
      return false;
    }
    var state = JSON.parse(raw);
    if (state.version !== 2 && state.version !== 3) {
      alert('Incompatible save version');
      return false;
    }

    // Restore map data
    for (var i = 0; i < MAP_W * MAP_H; i++) {
      terrain[i] = state.terrain[i];
      minerals[i] = state.minerals[i];
      height[i] = state.height[i];
    }

    // Restore game state
    tick = state.tick;
    gameTime = state.gameTime;
    cam.x = state.cam.x;
    cam.y = state.cam.y;
    cam.zoom = state.cam.zoom;
    resources = state.resources;

    // Restore buildings
    buildings.length = 0;
    for (var bi = 0; bi < state.buildings.length; bi++) {
      var sb = state.buildings[bi];
      var b = {
        type: sb.type, tx: sb.tx, ty: sb.ty,
        built: sb.built, progress: sb.progress,
        materialsNeeded: sb.materialsNeeded || {},
        materialsTotal: sb.materialsTotal || {},
        working: sb.working, cooldown: sb.cooldown,
        storage: sb.storage || {},
        workerOut: sb.workerOut || false
      };
      buildings.push(b);
    }

    // Restore flags
    flags.length = 0;
    for (var fi = 0; fi < state.flags.length; fi++) {
      var sf = state.flags[fi];
      flags.push({tx: sf.tx, ty: sf.ty, items: sf.items.slice()});
    }

    // Restore roads
    roads.length = 0;
    for (var ri = 0; ri < state.roads.length; ri++) {
      var sr = state.roads[ri];
      roads.push({from: {tx: sr.from.tx, ty: sr.from.ty}, to: {tx: sr.to.tx, ty: sr.to.ty}});
    }

    // Restore carriers (re-link flag references)
    carriers.length = 0;
    for (var ci = 0; ci < state.carriers.length; ci++) {
      var sc = state.carriers[ci];
      var c = {
        tx: sc.tx, ty: sc.ty,
        targetTx: sc.targetTx, targetTy: sc.targetTy,
        carrying: sc.carrying, state: sc.state,
        moveProgress: sc.moveProgress || 0,
        moveSpeed: sc.moveSpeed || 0.03,
        waitTimer: sc.waitTimer || 0
      };
      // Re-link flag references to actual flag objects
      if (sc.roadFrom) c.roadFrom = getFlagAt(sc.roadFrom.tx, sc.roadFrom.ty);
      if (sc.roadTo) c.roadTo = getFlagAt(sc.roadTo.tx, sc.roadTo.ty);
      carriers.push(c);
    }

    // Restore animals
    animals.length = 0;
    for (var ai = 0; ai < state.animals.length; ai++) {
      var sa = state.animals[ai];
      animals.push({tx: sa.tx, ty: sa.ty, type: sa.type, dir: sa.dir, timer: sa.timer, phase: sa.phase || 0});
    }

    // Restore population (v3+) or recalculate
    if (state.population) {
      population.capacity = state.population.capacity;
      population.employed = state.population.employed;
      population.happiness = state.population.happiness;
    }
    updatePopulation(); // always recalculate to ensure consistency

    // Reconstruct riverSet from loaded terrain — inland water tiles are river
    riverSet.clear();
    for (var rsi = 0; rsi < MAP_W * MAP_H; rsi++) {
      if (terrain[rsi] === TERRAIN.WATER) {
        var rsx2 = rsi % MAP_W, rsy2 = Math.floor(rsi / MAP_W);
        // River = water tile with at least one non-water neighbor
        var hasLand = false;
        for (var nd = 0; nd < 4 && !hasLand; nd++) {
          var nnx = rsx2 + [1,-1,0,0][nd], nny = rsy2 + [0,0,1,-1][nd];
          if (nnx >= 0 && nnx < MAP_W && nny >= 0 && nny < MAP_H && terrain[nny * MAP_W + nnx] !== TERRAIN.WATER) hasLand = true;
        }
        if (hasLand) riverSet.add(rsi);
      }
    }

    // Clear transients
    floatingTexts.length = 0;
    territoryDirty = true;
    mmDirty = true;

    // Refresh UI
    buildBuildingPanel();
    updateResourceDisplay();
    updateEconomy();
    updateSeasonBadge();

    var el2 = document.getElementById('save-status');
    var savedDate = state.savedAt ? new Date(state.savedAt) : null;
    var timeStr = savedDate ? savedDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    el2.textContent = 'Loaded' + (timeStr ? ' (' + timeStr + ')' : '');
    el2.style.color = '#6a90c0';
    setTimeout(function() { el2.textContent = ''; }, 3000);
    return true;
  } catch(e) {
    console.error('Load failed:', e);
    alert('Failed to load save: ' + e.message);
    return false;
  }
}

function hasSavedGame() {
  return !!localStorage.getItem(SAVE_KEY) || !!localStorage.getItem('settlers_save_v2');
}

// Auto-save every 60 seconds (only when game is running)
setInterval(function() {
  if (speed > 0 && buildings.length > 1) {
    saveGame();
    var el = document.getElementById('save-status');
    el.textContent = 'Auto-saved';
    el.style.color = '#4a6a50';
    setTimeout(function() { el.textContent = ''; }, 1500);
  }
}, autoSaveInterval);

// ===== INIT =====
// Auto-load saved game if available, otherwise generate new map
if (hasSavedGame()) {
  loadGame();
} else {
  generateMap();
}
updatePopulation();
buildBuildingPanel();
updateResourceDisplay();
updateEconomy();
updateSeasonBadge();
_lastNotifiedSeason = getSeason(); // Suppress toast on first load
render();
</script>
</body>
