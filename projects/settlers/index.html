function polyFill(g, pts, color) {
  g.beginPath();
  g.moveTo(pts[0].x, pts[0].y);
  for (var i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
  g.closePath();
  g.fillStyle = color;
  g.fill();
}

function polyClip(g, pts) {
  g.beginPath();
  g.moveTo(pts[0].x, pts[0].y);
  for (var i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
  g.closePath();
  g.clip();
}

// ===== SPRITE ATLAS =====
// Assets render once at 3× supersample into offscreen canvases, then blit.
// Detail budget per asset is effectively unlimited since it's paid once.
var _sprites = {};
var SPRITE_SS = 3;

function getSprite(key, w, h, ax, ay, painter) {
  var s = _sprites[key];
  if (s) return s;
  var c = document.createElement('canvas');
  c.width = Math.ceil(w * SPRITE_SS);
  c.height = Math.ceil(h * SPRITE_SS);
  var g = c.getContext('2d');
  g.scale(SPRITE_SS, SPRITE_SS);
  g.translate(ax, ay); // local origin
  painter(g);
  s = { c: c, w: w, h: h, ax: ax, ay: ay };
  _sprites[key] = s;
  return s;
}

// Blit with anchor at world position (wx,wy). Optional alpha/scale/flip.
function blitSprite(s, wx, wy, alpha, scale, flip) {
  var p = worldToScreen(wx, wy);
  var z = cam.zoom * (scale || 1);
  if (p.x + s.w * z < -10 || p.x - s.w * z > canvas.width + 10) return;
  if (p.y + s.h * z < -10 || p.y - s.h * z > canvas.height + 10) return;
  var prevA = ctx.globalAlpha;
  if (alpha !== undefined) ctx.globalAlpha = prevA * alpha;
  if (flip) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(-1, 1);
    ctx.drawImage(s.c, -(s.w - s.ax) * z, -s.ay * z, s.w * z, s.h * z);
    ctx.restore();
  } else {
    ctx.drawImage(s.c, p.x - s.ax * z, p.y - s.ay * z, s.w * z, s.h * z);
  }
  ctx.globalAlpha = prevA;
}

// ===== MATERIAL PAINTERS (local sprite coords, light from upper-left) =====
function matRnd(seed, i) { return hash2(seed * 13.7 + i * 7.1, i * 3.3 + seed); }

// Wall face: parallelogram from base edge A→B rising hh. dk = face darkness.
function paintWallFace(g, A, B, hh, mat, base, dk, seed) {
  var pts = [A, B, { x: B.x, y: B.y - hh }, { x: A.x, y: A.y - hh }];
  var cBot = lerpHex(base, '#19130a', dk);
  var cTop = lerpHex(cBot, '#fff6e2', 0.14);
  var grad = g.createLinearGradient(0, Math.min(A.y, B.y) - hh, 0, Math.max(A.y, B.y));
  grad.addColorStop(0, cTop);
  grad.addColorStop(1, cBot);
  g.save();
  polyClip(g, pts);
  g.fillStyle = grad;
  g.fillRect(Math.min(A.x, B.x) - 2, Math.min(A.y, B.y) - hh - 2, Math.abs(B.x - A.x) + 4, hh + Math.abs(B.y - A.y) + 6);

  var ex = B.x - A.x, ey = B.y - A.y;
  if (mat === 'plank') {
    // horizontal lap boards
    for (var yy = 2.6; yy < hh; yy += 2.9) {
      g.strokeStyle = 'rgba(28,18,8,0.26)';
      g.lineWidth = 0.65;
      g.beginPath(); g.moveTo(A.x, A.y - yy); g.lineTo(B.x, B.y - yy); g.stroke();
      g.strokeStyle = 'rgba(255,238,205,0.08)';
      g.lineWidth = 0.65;
      g.beginPath(); g.moveTo(A.x, A.y - yy - 0.75); g.lineTo(B.x, B.y - yy - 0.75); g.stroke();
    }
    // corner posts
    g.strokeStyle = 'rgba(38,26,14,0.55)';
    g.lineWidth = 1.5;
    g.beginPath();
    g.moveTo(A.x + ex * 0.025, A.y + ey * 0.025); g.lineTo(A.x + ex * 0.025, A.y + ey * 0.025 - hh);
    g.moveTo(A.x + ex * 0.975, A.y + ey * 0.975); g.lineTo(A.x + ex * 0.975, A.y + ey * 0.975 - hh);
    g.stroke();
    // knots
    for (var kn = 0; kn < 5; kn++) {
      var ku = 0.1 + matRnd(seed, kn) * 0.8, kv = 3 + matRnd(seed, kn + 40) * (hh - 6);
      g.fillStyle = 'rgba(42,26,12,0.5)';
      g.beginPath(); g.arc(A.x + ex * ku, A.y + ey * ku - kv, 0.55, 0, Math.PI * 2); g.fill();
    }
  } else if (mat === 'log') {
    // stacked round logs with notched crossing ends
    for (var ly = 1.6; ly < hh; ly += 3.2) {
      g.strokeStyle = 'rgba(30,18,8,0.45)';
      g.lineWidth = 1.1;
      g.beginPath(); g.moveTo(A.x, A.y - ly + 1.4) ; g.lineTo(B.x, B.y - ly + 1.4); g.stroke();
      g.strokeStyle = 'rgba(255,230,190,0.13)';
      g.lineWidth = 1.4;
      g.beginPath(); g.moveTo(A.x, A.y - ly - 0.4); g.lineTo(B.x, B.y - ly - 0.4); g.stroke();
    }
    // protruding log ends at corners
    for (var le = 1.6; le < hh; le += 3.2) {
      g.fillStyle = '#caa97a';
      g.beginPath(); g.arc(A.x + ex * 0.015, A.y + ey * 0.015 - le, 1.15, 0, Math.PI * 2); g.fill();
      g.beginPath(); g.arc(A.x + ex * 0.985, A.y + ey * 0.985 - le, 1.15, 0, Math.PI * 2); g.fill();
      g.strokeStyle = 'rgba(110,80,45,0.7)';
      g.lineWidth = 0.4;
      g.beginPath(); g.arc(A.x + ex * 0.985, A.y + ey * 0.985 - le, 0.6, 0, Math.PI * 2); g.stroke();
    }
  } else if (mat === 'plaster') {
    for (var nd = 0; nd < 50; nd++) {
      g.fillStyle = matRnd(seed, nd + 200) > 0.5 ? 'rgba(80,60,40,0.06)' : 'rgba(255,255,250,0.07)';
      var nu = matRnd(seed, nd), nv = matRnd(seed, nd + 100) * hh;
      g.fillRect(A.x + ex * nu, A.y + ey * nu - nv, 1.1, 1.1);
    }
    // wood sill base
    g.fillStyle = 'rgba(58,40,22,0.35)';
    polyFill(g, [A, B, { x: B.x, y: B.y - 2.2 }, { x: A.x, y: A.y - 2.2 }], 'rgba(58,40,22,0.30)');
  } else if (mat === 'stone') {
    var rowH = 3.6;
    for (var ry = 0, row = 0; ry < hh + rowH; ry += rowH, row++) {
      var u = (row % 2) * 0.07;
      while (u < 1) {
        var bw = 0.10 + matRnd(seed, row * 31 + Math.floor(u * 100)) * 0.10;
        var u1 = Math.min(1, u + bw);
        var bx0 = A.x + ex * u, by0 = A.y + ey * u - ry;
        var bx1 = A.x + ex * u1, by1 = A.y + ey * u1 - ry;
        var tint = matRnd(seed, row * 57 + Math.floor(u * 91));
        g.fillStyle = lerpHex(base, tint > 0.5 ? '#ffffff' : '#0c0e12', 0.05 + tint * 0.09);
        g.beginPath();
        g.moveTo(bx0, by0); g.lineTo(bx1, by1);
        g.lineTo(bx1, by1 - rowH + 0.5); g.lineTo(bx0, by0 - rowH + 0.5);
        g.closePath();
        g.fill();
        g.strokeStyle = 'rgba(22,20,16,0.32)';
        g.lineWidth = 0.45;
        g.stroke();
        u = u1;
      }
    }
  }

  // ambient occlusion: contact dark at base, shadow under eaves
  var ao = g.createLinearGradient(0, Math.max(A.y, B.y) - 5, 0, Math.max(A.y, B.y));
  ao.addColorStop(0, 'rgba(10,8,5,0)');
  ao.addColorStop(1, 'rgba(10,8,5,0.32)');
  g.fillStyle = ao;
  g.fillRect(Math.min(A.x, B.x) - 2, Math.min(A.y, B.y) - 6, Math.abs(ex) + 4, hh + Math.abs(ey) + 8);
  g.fillStyle = 'rgba(10,8,5,0.26)';
  polyFill(g, [{ x: A.x, y: A.y - hh }, { x: B.x, y: B.y - hh }, { x: B.x, y: B.y - hh + 2.4 }, { x: A.x, y: A.y - hh + 2.4 }], 'rgba(10,8,5,0.26)');
  g.restore();
}

// Textured roof face: quad/tri between eave edge (ea→eb) and ridge (ra→rb).
function paintRoofFace(g, ea, eb, ra, rb, base, lightAmt, style, seed) {
  var pts = [ea, eb, rb, ra];
  g.save();
  polyClip(g, pts);
  var shaded = lerpHex(base, lightAmt >= 0 ? '#fff6dc' : '#0b0703', Math.abs(lightAmt));
  // slope gradient: ridge slightly lighter than eave
  var gr = g.createLinearGradient(ra.x, ra.y, ea.x, ea.y);
  gr.addColorStop(0, lerpHex(shaded, '#fff6dc', 0.10));
  gr.addColorStop(1, lerpHex(shaded, '#0b0703', 0.10));
  g.fillStyle = gr;
  g.beginPath();
  g.moveTo(ea.x, ea.y); g.lineTo(eb.x, eb.y); g.lineTo(rb.x, rb.y); g.lineTo(ra.x, ra.y);
  g.closePath();
  g.fill();

  if (style === 'thatch') {
    // streaks running down the slope
    for (var i = 0; i < 26; i++) {
      var u = (i + matRnd(seed, i) * 0.8) / 26;
      var t0 = { x: ra.x + (rb.x - ra.x) * u, y: ra.y + (rb.y - ra.y) * u };
      var t1 = { x: ea.x + (eb.x - ea.x) * u, y: ea.y + (eb.y - ea.y) * u };
      g.strokeStyle = matRnd(seed, i + 80) > 0.5 ? 'rgba(70,48,16,0.20)' : 'rgba(255,228,150,0.13)';
      g.lineWidth = 0.8 + matRnd(seed, i + 33) * 0.7;
      g.beginPath();
      g.moveTo(t0.x, t0.y);
      g.quadraticCurveTo((t0.x + t1.x) / 2 + (matRnd(seed, i + 60) - 0.5) * 2.4, (t0.y + t1.y) / 2, t1.x, t1.y);
      g.stroke();
    }
    // layered trim bands
    for (var bd = 1; bd <= 2; bd++) {
      var bu = bd / 3;
      g.strokeStyle = 'rgba(60,40,14,0.22)';
      g.lineWidth = 0.9;
      g.beginPath();
      g.moveTo(ra.x + (ea.x - ra.x) * bu, ra.y + (ea.y - ra.y) * bu);
      g.lineTo(rb.x + (eb.x - rb.x) * bu, rb.y + (eb.y - rb.y) * bu);
      g.stroke();
    }
  } else { // shingles
    var rows = 9;
    for (var rI = 1; rI <= rows; rI++) {
      var v = rI / rows;
      var s0 = { x: ra.x + (ea.x - ra.x) * v, y: ra.y + (ea.y - ra.y) * v };
      var s1 = { x: rb.x + (eb.x - rb.x) * v, y: rb.y + (eb.y - rb.y) * v };
      g.strokeStyle = 'rgba(20,10,5,0.28)';
      g.lineWidth = 0.55;
      g.beginPath(); g.moveTo(s0.x, s0.y); g.lineTo(s1.x, s1.y); g.stroke();
      g.strokeStyle = 'rgba(255,240,215,0.07)';
      g.beginPath(); g.moveTo(s0.x, s0.y - 0.7); g.lineTo(s1.x, s1.y - 0.7); g.stroke();
      // staggered shingle notches
      var segs = 8;
      g.strokeStyle = 'rgba(20,10,5,0.20)';
      g.lineWidth = 0.5;
      for (var sg = 0; sg < segs; sg++) {
        var su = (sg + (rI % 2 ? 0.25 : 0.75)) / segs;
        var nx0 = s0.x + (s1.x - s0.x) * su, ny0 = s0.y + (s1.y - s0.y) * su;
        var upx = (ra.x + (rb.x - ra.x) * su) - (ea.x + (eb.x - ea.x) * su);
        var upy = (ra.y + (rb.y - ra.y) * su) - (ea.y + (eb.y - ea.y) * su);
        var ul = Math.sqrt(upx * upx + upy * upy) || 1;
        g.beginPath();
        g.moveTo(nx0, ny0);
        g.lineTo(nx0 + upx / ul * 1.6, ny0 + upy / ul * 1.6);
        g.stroke();
      }
    }
    // weathering patches
    for (var wp = 0; wp < 7; wp++) {
      var wu = matRnd(seed, wp + 300), wv = matRnd(seed, wp + 400);
      var px = ra.x + (rb.x - ra.x) * wu + (ea.x - ra.x) * wv;
      var py = ra.y + (rb.y - ra.y) * wu + (ea.y - ra.y) * wv;
      g.fillStyle = matRnd(seed, wp + 500) > 0.5 ? 'rgba(255,235,200,0.06)' : 'rgba(15,8,4,0.08)';
      g.beginPath(); g.ellipse(px, py, 2.6, 1.6, 0, 0, Math.PI * 2); g.fill();
    }
  }
  g.restore();
}

// Footprint corners in world coords. The building sits on a rigid flat base
// lifted to the elevation at its center (small slope gaps hidden by a skirt).
function buildingGeom(b) {
  var def = BLDG[b.type], n = def.size;
  var lift = elevPxAt(b.tx + n / 2 - 0.5, b.ty + n / 2 - 0.5);
  function P(cx, cy) { return { x: (cx - cy) * (TW / 2), y: (cx + cy) * (TH / 2) - TH / 2 - lift }; }
  var N = P(b.tx, b.ty), E = P(b.tx + n, b.ty), S = P(b.tx + n, b.ty + n), W = P(b.tx, b.ty + n);
  return { N: N, E: E, S: S, W: W, c: { x: N.x, y: (N.y + S.y) / 2 }, n: n };
}

// Anchor for smoke spawning and overlays: world position of the roof top
function bldgTop(b) {
  var st = BLDG_STYLE[b.type] || {};
  var gm = buildingGeom(b);
  return { x: gm.c.x, y: gm.c.y - (st.wh || 12) - (st.rh || 9 + gm.n * 3) };
}

// Local-space footprint geometry (origin = base diamond center)
function localGeom(n) {
  return {
    N: { x: 0, y: -16 * n }, E: { x: 32 * n, y: 0 },
    S: { x: 0, y: 16 * n }, W: { x: -32 * n, y: 0 }
  };
}

// fractional tile coords (u,v in 0..n) -> local px
function fp(u, v, n) { return { x: (u - v) * 32, y: (u + v) * 16 - 16 * n }; }
function midP(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

// Night-glow window registry + live-overlay anchor registry, filled while
// painting each type's sprite (compositions differ per type now)
var _winReg = {}, _anchReg = {};
function regWin(type, A, B, u, h0) {
  var wq = { x: A.x + (B.x - A.x) * u, y: A.y + (B.y - A.y) * u,
             dx: (B.x - A.x) * 0.055, dy: (B.y - A.y) * 0.055, h: h0 };
  (_winReg[type] = _winReg[type] || []).push(wq);
  return wq;
}

function paintWindowQ(g, wq, tall) {
  var hh = tall ? 5.4 : 3.8;
  var q = [
    { x: wq.x - wq.dx, y: wq.y - wq.dy - wq.h }, { x: wq.x + wq.dx, y: wq.y + wq.dy - wq.h },
    { x: wq.x + wq.dx, y: wq.y + wq.dy - wq.h - hh }, { x: wq.x - wq.dx, y: wq.y - wq.dy - wq.h - hh }
  ];
  polyFill(g, [
    { x: q[0].x - 0.5, y: q[0].y + 0.5 }, { x: q[1].x + 0.5, y: q[1].y + 0.5 },
    { x: q[2].x + 0.5, y: q[2].y - 0.5 }, { x: q[3].x - 0.5, y: q[3].y - 0.5 }
  ], 'rgba(45,32,18,0.95)');
  var wg = g.createLinearGradient(0, q[2].y, 0, q[0].y);
  wg.addColorStop(0, '#b8ccdf'); wg.addColorStop(0.5, '#7d99b4'); wg.addColorStop(1, '#54718c');
  g.fillStyle = wg;
  g.beginPath();
  g.moveTo(q[0].x, q[0].y); g.lineTo(q[1].x, q[1].y); g.lineTo(q[2].x, q[2].y); g.lineTo(q[3].x, q[3].y);
  g.closePath(); g.fill();
  g.strokeStyle = 'rgba(40,30,18,0.7)';
  g.lineWidth = 0.45;
  g.beginPath();
  g.moveTo((q[0].x + q[1].x) / 2, (q[0].y + q[1].y) / 2);
  g.lineTo((q[3].x + q[2].x) / 2, (q[3].y + q[2].y) / 2);
  g.moveTo((q[0].x + q[3].x) / 2, (q[0].y + q[3].y) / 2);
  g.lineTo((q[1].x + q[2].x) / 2, (q[1].y + q[2].y) / 2);
  g.stroke();
  g.fillStyle = 'rgba(235,225,205,0.5)';
  g.fillRect(q[0].x - 0.6, q[0].y + 0.4, (q[1].x - q[0].x) + 1.2, 0.9);
}

function paintDoorOn(g, A, B, u, dH) {
  var dB = { x: A.x + (B.x - A.x) * u, y: A.y + (B.y - A.y) * u };
  var dV = { x: (B.x - A.x) * 0.10, y: (B.y - A.y) * 0.10 };
  g.save();
  g.beginPath();
  g.moveTo(dB.x - dV.x, dB.y - dV.y);
  g.lineTo(dB.x + dV.x, dB.y + dV.y);
  g.lineTo(dB.x + dV.x, dB.y + dV.y - dH + 2);
  g.quadraticCurveTo(dB.x, dB.y - dH - 2.2, dB.x - dV.x, dB.y - dV.y - dH + 2);
  g.closePath();
  g.fillStyle = '#332413';
  g.fill();
  g.clip();
  for (var dp = -2; dp <= 2; dp++) {
    g.strokeStyle = 'rgba(15,9,4,0.55)';
    g.lineWidth = 0.5;
    g.beginPath();
    g.moveTo(dB.x + dV.x * dp * 0.4, dB.y + dV.y * dp * 0.4);
    g.lineTo(dB.x + dV.x * dp * 0.4, dB.y + dV.y * dp * 0.4 - dH - 2);
    g.stroke();
  }
  g.restore();
  g.strokeStyle = 'rgba(80,58,32,0.9)';
  g.lineWidth = 0.8;
  g.beginPath();
  g.moveTo(dB.x - dV.x, dB.y - dV.y);
  g.lineTo(dB.x - dV.x, dB.y - dV.y - dH + 2);
  g.quadraticCurveTo(dB.x, dB.y - dH - 2.2, dB.x + dV.x, dB.y + dV.y - dH + 2);
  g.lineTo(dB.x + dV.x, dB.y + dV.y);
  g.stroke();
  g.fillStyle = '#8e8a80';
  g.beginPath(); g.ellipse(dB.x, dB.y + 1.4, 3.2, 1.2, 0, 0, Math.PI * 2); g.fill();
  return dB;
}

// Generic rectangular volume: two wall faces + hip/gable/shed/flat roof.
// opts: {wh, rh, mat, wall, roof, roofType, thatch, stone, timber, seed,
//        door:u|null, winsL:[{u,h}], winsR:[{u,h}], type (for window registry), wint, tallWin}
function paintVolume(g, n, u0, v0, u1, v1, o) {
  var N = fp(u0, v0, n), E = fp(u1, v0, n), S = fp(u1, v1, n), W = fp(u0, v1, n);
  var wh = o.wh, rh = o.rh || 8, seed = o.seed || 1;

  polyFill(g, [W, S, { x: S.x, y: S.y + 3.5 }, { x: W.x, y: W.y + 3.5 }], '#3c3327');
  polyFill(g, [S, E, { x: E.x, y: E.y + 3.5 }, { x: S.x, y: S.y + 3.5 }], '#2e2820');

  if (o.openL) {
    // open-sided: dark interior + posts instead of the front-left wall
    polyFill(g, [W, S, { x: S.x, y: S.y - wh }, { x: W.x, y: W.y - wh }], '#1c150c');
    g.strokeStyle = '#6b523a'; g.lineWidth = 1.8;
    for (var po = 0; po <= 3; po++) {
      var pu = po / 3;
      g.beginPath();
      g.moveTo(W.x + (S.x - W.x) * pu, W.y + (S.y - W.y) * pu + 1);
      g.lineTo(W.x + (S.x - W.x) * pu, W.y + (S.y - W.y) * pu - wh);
      g.stroke();
    }
    if (o.interior) o.interior(g, W, S, wh);
  } else {
    paintWallFace(g, W, S, wh, o.mat, o.wall, 0.10, seed);
  }
  paintWallFace(g, S, E, wh, o.mat, o.wall, 0.36, seed + 9);

  if (o.stone && o.mat !== 'stone') {
    if (!o.openL) paintWallFace(g, W, S, 4, 'stone', '#94948c', 0.10, seed + 20);
    paintWallFace(g, S, E, 4, 'stone', '#94948c', 0.36, seed + 25);
  }

  if (o.timber) {
    g.strokeStyle = 'rgba(56,40,24,0.9)';
    g.lineWidth = 1.4;
    g.beginPath();
    g.moveTo(W.x, W.y - wh); g.lineTo(S.x, S.y - wh); g.lineTo(E.x, E.y - wh);
    g.moveTo(W.x, W.y); g.lineTo(W.x, W.y - wh);
    g.moveTo(S.x, S.y); g.lineTo(S.x, S.y - wh);
    g.moveTo(E.x, E.y); g.lineTo(E.x, E.y - wh);
    var m1 = midP(W, S), m2 = midP(S, E);
    g.moveTo(m1.x, m1.y); g.lineTo(m1.x, m1.y - wh);
    g.moveTo(m2.x, m2.y); g.lineTo(m2.x, m2.y - wh);
    g.stroke();
    g.lineWidth = 1;
    g.beginPath();
    g.moveTo(W.x + (S.x - W.x) * 0.05, W.y + (S.y - W.y) * 0.05 - wh);
    g.lineTo(m1.x, m1.y - wh * 0.45);
    g.lineTo(W.x + (S.x - W.x) * 0.05, W.y + (S.y - W.y) * 0.05 - wh * 0.05);
    g.stroke();
    if (wh >= 17) {
      g.lineWidth = 1.3;
      g.beginPath();
      g.moveTo(W.x, W.y - wh * 0.55); g.lineTo(S.x, S.y - wh * 0.55); g.lineTo(E.x, E.y - wh * 0.55);
      g.stroke();
      // jettied upper floor hint
      g.strokeStyle = 'rgba(30,20,10,0.5)';
      g.beginPath();
      g.moveTo(W.x, W.y - wh * 0.55 + 1); g.lineTo(S.x, S.y - wh * 0.55 + 1); g.lineTo(E.x, E.y - wh * 0.55 + 1);
      g.stroke();
    }
  }

  // openings
  if (o.door !== undefined && o.door !== null) {
    var dB = paintDoorOn(g, W, S, o.door, Math.min(9, wh - 2));
    if (o.type) _anchReg[o.type] = _anchReg[o.type] || {}, _anchReg[o.type].door = dB;
  }
  var wl = o.winsL || [], wr = o.winsR || [];
  for (var a = 0; a < wl.length; a++) paintWindowQ(g, o.type ? regWin(o.type, W, S, wl[a].u, wl[a].h) :
    { x: W.x + (S.x - W.x) * wl[a].u, y: W.y + (S.y - W.y) * wl[a].u, dx: (S.x - W.x) * 0.055, dy: (S.y - W.y) * 0.055, h: wl[a].h }, o.tallWin);
  for (var c = 0; c < wr.length; c++) paintWindowQ(g, o.type ? regWin(o.type, S, E, wr[c].u, wr[c].h) :
    { x: S.x + (E.x - S.x) * wr[c].u, y: S.y + (E.y - S.y) * wr[c].u, dx: (E.x - S.x) * 0.055, dy: (E.y - S.y) * 0.055, h: wr[c].h }, o.tallWin);

  // ----- roof -----
  var Nt = { x: N.x, y: N.y - wh }, Et = { x: E.x, y: E.y - wh }, St = { x: S.x, y: S.y - wh }, Wt = { x: W.x, y: W.y - wh };
  var ct = midP(Nt, St);
  var ovr = o.ovr || 1.12;
  function ev(p) { return { x: ct.x + (p.x - ct.x) * ovr, y: ct.y + (p.y - ct.y) * ovr }; }
  var eN = ev(Nt), eE = ev(Et), eS = ev(St), eW = ev(Wt);
  var roofStyle = o.thatch ? 'thatch' : 'shingle';

  if (o.roofType === 'flat') {
    polyFill(g, [Nt, Et, St, Wt], lerpHex(o.roof, '#fff8e0', 0.12));
    g.strokeStyle = 'rgba(25,18,10,0.5)';
    g.lineWidth = 0.9;
    g.beginPath(); g.moveTo(Wt.x, Wt.y); g.lineTo(St.x, St.y); g.lineTo(Et.x, Et.y); g.stroke();
    return { ct: ct, top: { x: ct.x, y: ct.y } };
  }

  if (o.roofType === 'shed') {
    // single slope: high at the N-E edge, eave at the W-S edge
    var hN = { x: eN.x, y: eN.y - rh }, hE = { x: eE.x, y: eE.y - rh };
    paintRoofFace(g, eW, eS, hN, hE, o.roof, 0.08, roofStyle, seed + 2);
    // side triangle (SE end)
    polyFill(g, [eS, eE, hE], lerpHex(o.roof, '#0c0804', 0.30));
    g.strokeStyle = 'rgba(15,10,5,0.4)';
    g.lineWidth = 0.8;
    g.beginPath(); g.moveTo(eW.x, eW.y); g.lineTo(eS.x, eS.y); g.lineTo(eE.x, eE.y); g.stroke();
    if (o.wint) polyFill(g, [eW, eS, hE, hN], 'rgba(232,240,248,0.7)');
    return { ct: ct, top: midP(hN, hE) };
  }

  var alongU = (u1 - u0) >= (v1 - v0);
  var mA = alongU ? midP(eN, eW) : midP(eN, eE);
  var mB = alongU ? midP(eE, eS) : midP(eW, eS);
  var f = o.roofType === 'gable' ? 0.96 : (o.roofType === 'tower' ? 0 : 0.45);
  var rA = { x: ct.x + (mA.x - ct.x) * f, y: ct.y + (mA.y - ct.y) * f - rh };
  var rB = { x: ct.x + (mB.x - ct.x) * f, y: ct.y + (mB.y - ct.y) * f - rh };

  if (o.roofType === 'gable') {
    // gable end walls (triangles up to the ridge), in wall material color
    var gw = lerpHex(o.wall, '#19130a', 0.20);
    if (alongU) {
      polyFill(g, [Wt, Nt, { x: (Wt.x + Nt.x) / 2, y: (Wt.y + Nt.y) / 2 - rh }], lerpHex(o.wall, '#fff6e2', 0.06));
      polyFill(g, [St, Et, { x: (St.x + Et.x) / 2, y: (St.y + Et.y) / 2 - rh }], lerpHex(gw, '#19130a', 0.22));
      // timber chevron on the visible (SE) gable
      g.strokeStyle = 'rgba(56,40,24,0.85)';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(St.x, St.y); g.lineTo((St.x + Et.x) / 2, (St.y + Et.y) / 2 - rh); g.lineTo(Et.x, Et.y);
      g.stroke();
    } else {
      polyFill(g, [Nt, Et, { x: (Nt.x + Et.x) / 2, y: (Nt.y + Et.y) / 2 - rh }], lerpHex(o.wall, '#fff6e2', 0.06));
      polyFill(g, [Wt, St, { x: (Wt.x + St.x) / 2, y: (Wt.y + St.y) / 2 - rh }], gw);
      g.strokeStyle = 'rgba(56,40,24,0.85)';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(Wt.x, Wt.y); g.lineTo((Wt.x + St.x) / 2, (Wt.y + St.y) / 2 - rh); g.lineTo(St.x, St.y);
      g.stroke();
    }
  }

  if (alongU) {
    paintRoofFace(g, eN, eE, rA, rB, o.roof, 0.14, roofStyle, seed + 2);
    paintRoofFace(g, eW, eS, rA, rB, o.roof, -0.12, roofStyle, seed + 3);
    if (o.roofType !== 'gable') {
      paintRoofFace(g, eW, eN, rA, rA, o.roof, 0.30, roofStyle, seed + 4);
      paintRoofFace(g, eS, eE, rB, rB, o.roof, -0.32, roofStyle, seed + 5);
    }
  } else {
    paintRoofFace(g, eN, eW, rA, rB, o.roof, 0.22, roofStyle, seed + 2);
    paintRoofFace(g, eE, eS, rA, rB, o.roof, -0.18, roofStyle, seed + 3);
    if (o.roofType !== 'gable') {
      paintRoofFace(g, eN, eE, rA, rA, o.roof, 0.10, roofStyle, seed + 4);
      paintRoofFace(g, eW, eS, rB, rB, o.roof, -0.10, roofStyle, seed + 5);
    }
  }
  // ridge cap
  g.strokeStyle = lerpHex(o.roof, '#fff6dc', o.thatch ? 0.30 : 0.42);
  g.lineWidth = o.thatch ? 2.2 : 1.2;
  g.lineCap = 'round';
  g.beginPath(); g.moveTo(rA.x, rA.y); g.lineTo(rB.x, rB.y); g.stroke();
  g.lineCap = 'butt';
  g.strokeStyle = 'rgba(15,10,5,0.4)';
  g.lineWidth = 0.8;
  g.beginPath(); g.moveTo(eW.x, eW.y); g.lineTo(eS.x, eS.y); g.lineTo(eE.x, eE.y); g.stroke();

  if (o.wint) {
    if (alongU) {
      polyFill(g, [eN, eE, rB, rA], 'rgba(230,239,247,0.72)');
      if (o.roofType !== 'gable') polyFill(g, [eW, eN, rA, rA], 'rgba(240,246,251,0.78)');
    } else {
      polyFill(g, [eN, eW, rB, rA], 'rgba(235,242,249,0.75)');
    }
    g.strokeStyle = 'rgba(238,245,250,0.85)';
    g.lineWidth = 1.5;
    g.beginPath(); g.moveTo(eW.x, eW.y); g.lineTo(eN.x, eN.y); g.lineTo(eE.x, eE.y); g.stroke();
  }
  return { ct: ct, top: midP(rA, rB), rA: rA, rB: rB };
}

// Round stone tower (cylinder), optional cone roof or crenellated top
function paintTowerRound(g, cx, cy, rad, wh, o) {
  var ry = rad * 0.5;
  // body
  var grad = g.createLinearGradient(cx - rad, 0, cx + rad, 0);
  var wallC = o.wall || '#a8a298';
  grad.addColorStop(0, lerpHex(wallC, '#fff6e2', 0.18));
  grad.addColorStop(0.45, wallC);
  grad.addColorStop(1, lerpHex(wallC, '#19130a', 0.42));
  g.fillStyle = grad;
  g.beginPath();
  g.moveTo(cx - rad, cy - wh);
  g.lineTo(cx - rad, cy);
  g.ellipse(cx, cy, rad, ry, 0, Math.PI, 0, true);
  g.lineTo(cx + rad, cy - wh);
  g.ellipse(cx, cy - wh, rad, ry, 0, 0, Math.PI, false);
  g.closePath();
  g.fill();
  // stone courses (curved)
  g.strokeStyle = 'rgba(22,20,16,0.25)';
  g.lineWidth = 0.5;
  for (var row = 1; row < wh / 3.6; row++) {
    g.beginPath();
    g.ellipse(cx, cy - row * 3.6, rad, ry, 0, 0.06 * Math.PI, 0.94 * Math.PI);
    g.stroke();
  }
  for (var vb = 0; vb < 7; vb++) {
    g.beginPath();
    var bx = cx - rad + (2 * rad) * (vb + 0.5) / 7;
    g.moveTo(bx, cy - ((vb % 2) ? 1.8 : 0) - 2);
    g.lineTo(bx, cy - wh + ((vb % 2) ? 1.8 : 0));
    g.stroke();
  }
  // base AO
  var ao = g.createLinearGradient(0, cy - 4, 0, cy + ry);
  ao.addColorStop(0, 'rgba(10,8,5,0)');
  ao.addColorStop(1, 'rgba(10,8,5,0.35)');
  g.fillStyle = ao;
  g.beginPath();
  g.ellipse(cx, cy, rad, ry, 0, 0, Math.PI);
  g.rect(cx - rad, cy - 5, rad * 2, 5);
  g.fill();

  if (o.cone) {
    var rh = o.rh || 14;
    var orad = rad * 1.16;
    // cone: two shaded halves with curved base
    g.fillStyle = lerpHex(o.roof, '#fff6dc', 0.16);
    g.beginPath();
    g.moveTo(cx, cy - wh - rh);
    g.lineTo(cx - orad, cy - wh);
    g.ellipse(cx, cy - wh, orad, orad * 0.5, 0, Math.PI, Math.PI * 0.5, true);
    g.closePath();
    g.fill();
    g.fillStyle = lerpHex(o.roof, '#0b0703', 0.18);
    g.beginPath();
    g.moveTo(cx, cy - wh - rh);
    g.lineTo(cx + orad, cy - wh);
    g.ellipse(cx, cy - wh, orad, orad * 0.5, 0, 0, Math.PI * 0.5, false);
    g.closePath();
    g.fill();
    // shingle arcs on cone
    g.strokeStyle = 'rgba(20,10,5,0.25)';
    g.lineWidth = 0.55;
    for (var ar = 1; ar <= 4; ar++) {
      var t = ar / 5;
      g.beginPath();
      g.ellipse(cx, cy - wh - rh * (1 - t), orad * t, orad * t * 0.45, 0, 0, Math.PI);
      g.stroke();
    }
    g.fillStyle = '#3c2e1c';
    g.beginPath(); g.arc(cx, cy - wh - rh - 1, 1.3, 0, Math.PI * 2); g.fill();
    if (o.wint) {
      g.fillStyle = 'rgba(236,244,250,0.8)';
      g.beginPath();
      g.moveTo(cx, cy - wh - rh);
      g.lineTo(cx - orad * 0.6, cy - wh - rh * 0.28);
      g.ellipse(cx, cy - wh - rh * 0.28 + orad * 0.27 * 0, orad * 0.6, orad * 0.27, 0, Math.PI, 0, true);
      g.closePath();
      g.fill();
    }
  } else if (o.crenel) {
    g.fillStyle = lerpHex(wallC, '#fff6e2', 0.10);
    g.beginPath();
    g.ellipse(cx, cy - wh, rad, ry, 0, 0, Math.PI * 2);
    g.fill();
    g.fillStyle = lerpHex(wallC, '#19130a', 0.18);
    g.beginPath();
    g.ellipse(cx, cy - wh, rad * 0.72, ry * 0.72, 0, 0, Math.PI * 2);
    g.fill();
    // merlons along the front rim
    for (var mr = 0; mr <= 6; mr++) {
      var ma = Math.PI * (mr / 6);
      var mx = cx + Math.cos(ma) * rad * 0.94;
      var my = cy - wh + Math.sin(ma) * ry * 0.94;
      var mshade = Math.cos(ma); // -1 right ... 1 left
      g.fillStyle = lerpHex(wallC, mshade > 0 ? '#fff6e2' : '#19130a', 0.10 + Math.abs(mshade) * 0.12);
      g.fillRect(mx - 1.6, my - 3.6, 3.2, 3.8);
    }
    if (o.wint) {
      g.fillStyle = 'rgba(236,244,250,0.8)';
      g.beginPath();
      g.ellipse(cx, cy - wh, rad * 0.7, ry * 0.7, 0, 0, Math.PI * 2);
      g.fill();
    }
  }
  // arrow slits
  if (o.slits) {
    g.fillStyle = 'rgba(15,12,8,0.85)';
    g.fillRect(cx - rad * 0.45 - 0.8, cy - wh * 0.62, 1.6, 4.5);
    g.fillRect(cx + rad * 0.3 - 0.8, cy - wh * 0.45, 1.6, 4.5);
  }
}

// Rock mound for mines
function paintRockMound(g, n, seed, oreCol, wint) {
  var rocks = [
    { x: 6, y: -10, r: 13 }, { x: -10, y: -6, r: 11 }, { x: 12, y: -1, r: 9 },
    { x: -2, y: -14, r: 10 }, { x: -14, y: 1, r: 7 }, { x: 3, y: -3, r: 11 }
  ];
  for (var i = 0; i < rocks.length; i++) {
    var rk = rocks[i];
    var c0 = ['#787d80', '#6c7174', '#82878a'][i % 3];
    g.fillStyle = c0;
    g.beginPath();
    g.moveTo(rk.x - rk.r, rk.y + rk.r * 0.3);
    g.lineTo(rk.x - rk.r * 0.5, rk.y - rk.r * 0.55);
    g.lineTo(rk.x + rk.r * 0.25, rk.y - rk.r * 0.7);
    g.lineTo(rk.x + rk.r, rk.y - rk.r * 0.05);
    g.lineTo(rk.x + rk.r * 0.6, rk.y + rk.r * 0.45);
    g.lineTo(rk.x - rk.r * 0.4, rk.y + rk.r * 0.5);
    g.closePath();
    g.fill();
    g.fillStyle = wint ? 'rgba(238,244,250,0.65)' : 'rgba(235,240,244,0.30)';
    g.beginPath();
    g.moveTo(rk.x - rk.r * 0.5, rk.y - rk.r * 0.55);
    g.lineTo(rk.x + rk.r * 0.25, rk.y - rk.r * 0.7);
    g.lineTo(rk.x + rk.r * 0.35, rk.y - rk.r * 0.2);
    g.lineTo(rk.x - rk.r * 0.45, rk.y - rk.r * 0.1);
    g.closePath();
    g.fill();
    g.fillStyle = 'rgba(20,24,28,0.30)';
    g.beginPath();
    g.moveTo(rk.x + rk.r, rk.y - rk.r * 0.05);
    g.lineTo(rk.x + rk.r * 0.6, rk.y + rk.r * 0.45);
    g.lineTo(rk.x + rk.r * 0.2, rk.y + rk.r * 0.1);
    g.closePath();
    g.fill();
  }
  // ore seam glints
  for (var sp = 0; sp < 6; sp++) {
    g.fillStyle = oreCol;
    g.beginPath();
    g.arc(-8 + matRnd(seed, sp) * 20, -14 + matRnd(seed, sp + 30) * 12, 1.1, 0, Math.PI * 2);
    g.fill();
    g.fillStyle = 'rgba(255,255,255,0.45)';
    g.beginPath();
    g.arc(-8.4 + matRnd(seed, sp) * 20, -14.4 + matRnd(seed, sp + 30) * 12, 0.4, 0, Math.PI * 2);
    g.fill();
  }
}

function paintFencePosts(g, pts) {
  g.strokeStyle = '#6b523a';
  for (var i = 0; i < pts.length; i++) {
    g.lineWidth = 1.1;
    g.beginPath();
    g.moveTo(pts[i].x, pts[i].y);
    g.lineTo(pts[i].x, pts[i].y - 4.5);
    g.stroke();
    if (i > 0) {
      g.lineWidth = 0.7;
      g.beginPath();
      g.moveTo(pts[i - 1].x, pts[i - 1].y - 3.2);
      g.lineTo(pts[i].x, pts[i].y - 3.2);
      g.stroke();
    }
  }
}

// ===== PER-TYPE SPRITE PAINTERS =====
function paintBuildingSprite(g, type, wint) {
  var def = BLDG[type];
  var st = BLDG_STYLE[type] || { wall: def.color, roof: '#7a4020', wh: 12, mat: 'plank' };
  var n = def.size;
  var seed = type.length * 7 + n * 3;
  _winReg[type] = []; // repaint resets registry (winter repaint duplicates are harmless but avoid)
  _anchReg[type] = _anchReg[type] || {};

  // soft directional ground shadow toward SE
  g.fillStyle = 'rgba(12,22,16,0.26)';
  g.beginPath(); g.ellipse(5, 3, 32 * n * 0.82, 16 * n * 0.78, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = 'rgba(12,22,16,0.08)';
  g.beginPath(); g.ellipse(8, 4.5, 32 * n * 0.95, 16 * n * 0.9, 0, 0, Math.PI * 2); g.fill();

  var V = function (u0, v0, u1, v1, o) {
    o.seed = o.seed || seed; o.wint = wint; o.type = type;
    o.mat = o.mat || st.mat; o.wall = o.wall || st.wall; o.roof = o.roof || st.roof;
    return paintVolume(g, n, u0, v0, u1, v1, o);
  };

  switch (type) {
    case 'well': {
      g.fillStyle = '#8d8d86';
      g.beginPath(); g.ellipse(0, 0, 11, 5.5, 0, 0, Math.PI * 2); g.fill();
      for (var wb = 0; wb < 9; wb++) {
        var wa = (wb / 9) * Math.PI;
        g.strokeStyle = 'rgba(40,40,38,0.4)'; g.lineWidth = 0.6;
        g.beginPath();
        g.moveTo(Math.cos(wa) * 11, Math.sin(wa) * 5.5);
        g.lineTo(Math.cos(wa) * 11, Math.sin(wa) * 5.5 - 3);
        g.stroke();
      }
      g.fillStyle = '#67696f';
      g.beginPath(); g.ellipse(0, -3, 11, 5.5, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#1d2f44';
      g.beginPath(); g.ellipse(0, -3, 7, 3.4, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = 'rgba(120,170,200,0.25)';
      g.beginPath(); g.ellipse(-1.5, -3.8, 3, 1.2, 0, 0, Math.PI * 2); g.fill();
      g.strokeStyle = '#6b523a'; g.lineWidth = 1.8;
      g.beginPath();
      g.moveTo(-9, -4); g.lineTo(-9, -18);
      g.moveTo(9, -4); g.lineTo(9, -18);
      g.stroke();
      paintRoofFace(g, { x: -14, y: -16 }, { x: 1, y: -12 }, { x: 0, y: -25 }, { x: 0, y: -25 }, '#7a5a36', -0.1, 'shingle', seed);
      paintRoofFace(g, { x: 1, y: -12 }, { x: 14, y: -16 }, { x: 0, y: -25 }, { x: 0, y: -25 }, '#7a5a36', -0.3, 'shingle', seed + 1);
      if (wint) {
        g.fillStyle = 'rgba(232,240,248,0.8)';
        g.beginPath();
        g.moveTo(-14, -16); g.lineTo(0, -25); g.lineTo(14, -16); g.lineTo(11, -15); g.lineTo(0, -22.5); g.lineTo(-11, -15);
        g.closePath(); g.fill();
      }
      break;
    }

    case 'hq': {
      V(0, 0, 3, 3, { wh: 21, rh: 13, roofType: 'hip', timber: true, stone: true, door: 0.58,
        winsL: [{ u: 0.25, h: 8 }, { u: 0.82, h: 8 }, { u: 0.25, h: 16 }, { u: 0.58, h: 16 }],
        winsR: [{ u: 0.3, h: 8 }, { u: 0.62, h: 8 }, { u: 0.45, h: 16 }] });
      // corner watch tower
      var tc = fp(2.45, 2.45, n);
      paintTowerRound(g, tc.x, tc.y, 8.5, 34, { wall: '#b0a896', roof: st.roof, cone: true, rh: 12, slits: true, wint: wint });
      _anchReg.hq.banner = { x: tc.x, y: tc.y - 34 - 12 };
      break;
    }

    case 'woodcutter': {
      V(0, 0, 1, 1, { wh: 11, rh: 9, roofType: 'gable', mat: 'log', door: 0.55, winsR: [{ u: 0.5, h: 4.5 }] });
      // log pile
      for (var lg = 0; lg < 3; lg++) {
        var lx = -38 + (lg === 2 ? 4 : lg * 7), ly2 = 2 - (lg === 2 ? 4 : 0);
        g.fillStyle = '#6e5234';
        g.beginPath(); g.ellipse(lx, ly2, 6, 2.8, -0.42, 0, Math.PI * 2); g.fill();
        g.fillStyle = '#caa97a';
        g.beginPath(); g.ellipse(lx + 4, ly2 - 1.8, 1.8, 1.8, 0, 0, Math.PI * 2); g.fill();
        g.strokeStyle = 'rgba(110,80,45,0.8)'; g.lineWidth = 0.4;
        g.beginPath(); g.arc(lx + 4, ly2 - 1.8, 1.1, 0, Math.PI * 2); g.stroke();
      }
      // chopping stump with axe
      g.fillStyle = '#7a5c3a';
      g.beginPath(); g.ellipse(8, 12, 3.4, 1.8, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#caa97a';
      g.beginPath(); g.ellipse(8, 10.6, 3.4, 1.8, 0, 0, Math.PI * 2); g.fill();
      g.strokeStyle = '#54402c'; g.lineWidth = 1;
      g.beginPath(); g.moveTo(8, 10); g.lineTo(13, 5.4); g.stroke();
      g.fillStyle = '#9aa0a4';
      g.beginPath();
      g.moveTo(12.2, 4.6); g.lineTo(15, 6); g.lineTo(13.4, 7.6); g.closePath();
      g.fill();
      break;
    }

    case 'forester': {
      V(0, 0, 1, 0.66, { wh: 10, rh: 8, roofType: 'gable', door: 0.5, winsR: [{ u: 0.5, h: 4 }] });
      // sapling nursery rows
      paintFencePosts(g, [fp(0.05, 0.75, n), fp(0.5, 0.75, n), fp(1, 0.75, n), fp(1, 1, n)]);
      for (var sr = 0; sr < 3; sr++) {
        for (var sc = 0; sc < 4; sc++) {
          var sps = fp(0.18 + sc * 0.22, 0.82 + sr * 0.08, n);
          g.strokeStyle = '#5a4632'; g.lineWidth = 0.6;
          g.beginPath(); g.moveTo(sps.x, sps.y); g.lineTo(sps.x, sps.y - 2.2); g.stroke();
          g.fillStyle = ['#4d9440', '#5da64c', '#6db858'][sc % 3];
          if (wint) g.fillStyle = '#9fb0bd';
          g.beginPath(); g.arc(sps.x, sps.y - 3, 1.5, 0, Math.PI * 2); g.fill();
        }
      }
      break;
    }

    case 'sawmill': {
      V(0, 0, 2, 1.15, { wh: 12, rh: 10, roofType: 'gable', openL: true,
        interior: function (gg, Wq, Sq, whh) {
          // stacked planks inside
          gg.fillStyle = '#b89868';
          for (var pk = 0; pk < 4; pk++) {
            gg.fillRect(Wq.x + 6 + pk * 1.2, Wq.y - 3 - pk * 2.2, 18, 1.6);
          }
        },
        winsR: [{ u: 0.35, h: 5 }, { u: 0.7, h: 5 }] });
      _anchReg.sawmill.blade = { x: fp(1.6, 1.15, n).x, y: fp(1.6, 1.15, n).y - 6 };
      // log ramp + waiting logs
      var rmp = fp(1.3, 1.6, n);
      g.strokeStyle = '#6b523a'; g.lineWidth = 1.2;
      g.beginPath();
      g.moveTo(rmp.x - 6, rmp.y + 4); g.lineTo(rmp.x - 2, rmp.y - 6);
      g.moveTo(rmp.x + 2, rmp.y + 6); g.lineTo(rmp.x + 6, rmp.y - 4);
      g.stroke();
      g.fillStyle = '#7a5c3a';
      g.beginPath(); g.ellipse(rmp.x, rmp.y + 2, 7, 2.4, -0.5, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#caa97a';
      g.beginPath(); g.ellipse(rmp.x + 4.4, rmp.y - 1.2, 1.6, 1.6, 0, 0, Math.PI * 2); g.fill();
      break;
    }

    case 'quarry': {
      V(0.1, 0.1, 1, 1, { wh: 8, rh: 7, roofType: 'shed', door: 0.5 });
      // A-frame crane with hanging block
      var cb = fp(0.2, 0.85, n);
      g.strokeStyle = '#6b523a'; g.lineWidth = 1.6;
      g.beginPath();
      g.moveTo(cb.x - 6, cb.y); g.lineTo(cb.x, cb.y - 18);
      g.moveTo(cb.x + 6, cb.y + 3); g.lineTo(cb.x, cb.y - 18);
      g.moveTo(cb.x, cb.y - 18); g.lineTo(cb.x + 14, cb.y - 12);
      g.stroke();
      g.strokeStyle = 'rgba(40,32,20,0.9)'; g.lineWidth = 0.6;
      g.beginPath(); g.moveTo(cb.x + 14, cb.y - 12); g.lineTo(cb.x + 14, cb.y - 4); g.stroke();
      g.fillStyle = '#8b8e89';
      g.fillRect(cb.x + 11.5, cb.y - 4, 5, 4);
      // rubble
      for (var rb = 0; rb < 5; rb++) {
        g.fillStyle = ['#84878a', '#74777a', '#8e9194'][rb % 3];
        var rbp = fp(0.3 + matRnd(seed, rb) * 0.6, 0.15 + matRnd(seed, rb + 9) * 0.3, n);
        g.beginPath(); g.ellipse(rbp.x, rbp.y, 2.6 + matRnd(seed, rb + 20) * 2, 1.6, 0, 0, Math.PI * 2); g.fill();
      }
      break;
    }

    case 'farm': {
      V(0, 0, 2, 1.05, { wh: 12, rh: 11, roofType: 'gable', thatch: true, timber: true, door: 0.5,
        winsL: [{ u: 0.22, h: 5 }], winsR: [{ u: 0.3, h: 5 }, { u: 0.68, h: 5 }] });
      V(1.25, 1.3, 2, 2, { wh: 8, rh: 7, roofType: 'shed', mat: 'plank', wall: '#8f7350', roof: '#6e553a' });
      // hay bales
      for (var hb = 0; hb < 2; hb++) {
        var hbp = fp(0.35 + hb * 0.3, 1.55, n);
        g.fillStyle = '#d9b95c';
        g.beginPath(); g.ellipse(hbp.x, hbp.y - 3, 4.4, 4, 0, 0, Math.PI * 2); g.fill();
        g.strokeStyle = 'rgba(140,108,40,0.6)'; g.lineWidth = 0.5;
        g.beginPath(); g.ellipse(hbp.x, hbp.y - 3, 2.8, 2.5, 0, 0, Math.PI * 2); g.stroke();
        g.beginPath(); g.ellipse(hbp.x, hbp.y - 3, 1.4, 1.2, 0, 0, Math.PI * 2); g.stroke();
        if (wint) {
          g.fillStyle = 'rgba(236,244,250,0.8)';
          g.beginPath(); g.ellipse(hbp.x, hbp.y - 6.4, 4, 1.4, 0, 0, Math.PI * 2); g.fill();
        }
      }
      break;
    }

    case 'mill': {
      var tc2 = fp(1.05, 0.95, n);
      paintTowerRound(g, tc2.x, tc2.y + 4, 14, 36, { wall: st.wall, roof: st.roof, cone: true, rh: 14, wint: wint });
      // base annex in front of the tower
      V(0, 1.2, 0.8, 2, { wh: 8, rh: 7, roofType: 'shed', mat: 'plank', wall: '#a08a64', roof: '#74583a' });
      // door + window on tower
      paintDoorOn(g, { x: tc2.x - 14, y: tc2.y + 4 }, { x: tc2.x + 3, y: tc2.y + 10 }, 0.5, 8);
      _anchReg.mill.sails = { x: tc2.x + 4, y: tc2.y + 4 - 36 - 6 };
      _anchReg.mill.door = { x: tc2.x - 6, y: tc2.y + 7 };
      break;
    }

    case 'bakery': {
      V(0, 0, 2, 1.25, { wh: 13, rh: 10, roofType: 'hip', timber: true, door: 0.32,
        winsL: [{ u: 0.72, h: 5 }], winsR: [{ u: 0.4, h: 5 }, { u: 0.75, h: 5 }] });
      // clay oven dome with mouth + its own chimney
      var od = fp(1.55, 1.55, n);
      g.fillStyle = '#c4a07c';
      g.beginPath(); g.ellipse(od.x, od.y - 4, 9.5, 7, 0, Math.PI, 0, false); g.closePath(); g.fill();
      var odg = g.createLinearGradient(od.x - 9, 0, od.x + 9, 0);
      odg.addColorStop(0, 'rgba(255,240,220,0.35)');
      odg.addColorStop(0.6, 'rgba(0,0,0,0)');
      odg.addColorStop(1, 'rgba(40,24,12,0.4)');
      g.fillStyle = odg;
      g.beginPath(); g.ellipse(od.x, od.y - 4, 9.5, 7, 0, Math.PI, 0, false); g.closePath(); g.fill();
      g.fillStyle = '#1c1209';
      g.beginPath(); g.ellipse(od.x - 1, od.y - 2.5, 3.6, 2.8, 0, Math.PI, 0); g.closePath(); g.fill();
      g.fillStyle = 'rgba(255,140,40,0.5)';
      g.beginPath(); g.ellipse(od.x - 1, od.y - 2, 2.2, 1.5, 0, Math.PI, 0); g.closePath(); g.fill();
      g.fillStyle = '#5c5650';
      g.fillRect(od.x + 4, od.y - 16, 3.4, 9);
      g.fillStyle = '#3c3833';
      g.fillRect(od.x + 3.4, od.y - 17.4, 4.6, 1.8);
      if (wint) {
        g.fillStyle = 'rgba(236,244,250,0.75)';
        g.beginPath(); g.ellipse(od.x, od.y - 9.4, 8, 2.6, 0, 0, Math.PI * 2); g.fill();
      }
      _anchReg.bakery.smoke = { x: od.x + 5.7, y: od.y - 17 };
      break;
    }

    case 'fisher': {
      // stilted platform + jetty toward the water (S)
      var lift = 5;
      // stilts
      g.strokeStyle = '#54402c'; g.lineWidth = 1.4;
      var stl = [fp(0.1, 0.1, n), fp(0.95, 0.15, n), fp(0.92, 0.92, n), fp(0.12, 0.9, n), fp(0.5, 0.95, n)];
      for (var sx = 0; sx < stl.length; sx++) {
        g.beginPath();
        g.moveTo(stl[sx].x, stl[sx].y + 1);
        g.lineTo(stl[sx].x, stl[sx].y - lift);
        g.stroke();
      }
      // deck
      g.save();
      g.translate(0, -lift);
      polyFill(g, [fp(0, 0, n), fp(1, 0, n), fp(1, 1, n), fp(0, 1, n)], '#8a6f4c');
      g.strokeStyle = 'rgba(40,28,14,0.4)'; g.lineWidth = 0.5;
      for (var dk = 1; dk < 7; dk++) {
        var d0 = fp(dk / 7, 0, n), d1 = fp(dk / 7, 1, n);
        g.beginPath(); g.moveTo(d0.x, d0.y); g.lineTo(d1.x, d1.y); g.stroke();
      }
      V(0.08, 0.05, 0.95, 0.72, { wh: 9, rh: 8, roofType: 'gable', door: 0.5, winsR: [{ u: 0.45, h: 4 }] });
      g.restore();
      // raise registered openings to deck height for the night-glow pass
      (_winReg.fisher || []).forEach(function (wq) { wq.y -= lift; });
      if (_anchReg.fisher && _anchReg.fisher.door) _anchReg.fisher.door.y -= lift;
      // jetty extending S over the water
      var j0 = fp(0.35, 1, n), j1 = fp(0.65, 1, n);
      polyFill(g, [
        { x: j0.x, y: j0.y - lift }, { x: j1.x, y: j1.y - lift },
        { x: j1.x + 8, y: j1.y + 9 - lift * 0.2 }, { x: j0.x + 8, y: j0.y + 11 - lift * 0.2 }
      ], '#7d6443');
      g.strokeStyle = '#54402c'; g.lineWidth = 1.2;
      g.beginPath();
      g.moveTo(j0.x + 7, j0.y + 9 - lift * 0.2); g.lineTo(j0.x + 7, j0.y + 12);
      g.moveTo(j1.x + 7, j1.y + 7 - lift * 0.2); g.lineTo(j1.x + 7, j1.y + 11);
      g.stroke();
      // hanging net
      g.strokeStyle = 'rgba(40,52,60,0.7)'; g.lineWidth = 0.5;
      var np = fp(1, 0.4, n);
      for (var nn = 0; nn < 3; nn++) {
        g.beginPath();

    case 'hunter': {
      V(0, 0, 1, 0.9, { wh: 10, rh: 9, roofType: 'gable', mat: 'log', door: 0.5 });

      var ad = fp(0.27, 0.95, n);

      g.stroke();

      g.stroke();
      g.fillStyle = '#9a6f44';

      g.fillStyle = '#b58a5c';
      polyFill(g, [{ x: dr.x + 7, y: dr.y - 6.8 }, { x: dr.x + 10, y: dr.y - 5.4 }, { x: dr.x + 9.6, y: dr.y + 0.4 }, { x: dr.x + 7.4, y: dr.y - 0.8 }], '#b58a5c');
      break;
    }

    case 'ironmine': case 'coalmine': case 'goldmine': {
      var oreCol = type === 'ironmine' ? '#c47a4a' : type === 'coalmine' ? '#3a3a40' : '#ecd25a';
      paintRockMound(g, n, seed, oreCol, wint);
      // timber portal
      g.fillStyle = '#0c0b09';
      g.beginPath(); g.arc(-6, 7, 5, Math.PI, 0); g.fill();
      g.fillRect(-11, 7, 10, 2.4);
      g.strokeStyle = '#6b523a'; g.lineWidth = 1.6;
      g.beginPath();
      g.moveTo(-11.6, 9.6); g.lineTo(-11.6, 1);
      g.moveTo(-0.4, 9.6); g.lineTo(-0.4, 1);
      g.moveTo(-13, 1.4); g.lineTo(1, 1.4);
      g.stroke();
      g.strokeStyle = 'rgba(220,200,170,0.35)'; g.lineWidth = 0.5;
      g.beginPath(); g.moveTo(-12.2, 9.6); g.lineTo(-12.2, 1); g.stroke();
      // rails + cart
      g.strokeStyle = 'rgba(60,50,40,0.9)'; g.lineWidth = 0.8;
      g.beginPath();
      g.moveTo(-7.5, 9.5); g.lineTo(-1, 16);
      g.moveTo(-4.5, 8.5); g.lineTo(2, 15);
      g.stroke();
      g.strokeStyle = 'rgba(40,32,24,0.8)'; g.lineWidth = 0.6;
      for (var sl = 0; sl < 4; sl++) {
        g.beginPath();
        g.moveTo(-8 + sl * 1.8, 10.4 + sl * 1.6);
        g.lineTo(-4.6 + sl * 1.8, 9.4 + sl * 1.6);
        g.stroke();
      }
      g.fillStyle = '#4c4438';
      polyFill(g, [{ x: 0, y: 12.4 }, { x: 6.4, y: 14.6 }, { x: 6.4, y: 10.4 }, { x: 0, y: 8.6 }], '#4c4438');
      g.fillStyle = oreCol;
      g.beginPath(); g.ellipse(3.2, 9.8, 2.6, 1.2, 0.3, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#332d24';
      g.beginPath(); g.arc(1.4, 13.6, 1, 0, Math.PI * 2); g.fill();
      g.beginPath(); g.arc(4.8, 14.8, 1, 0, Math.PI * 2); g.fill();
      // lantern by the portal
      g.fillStyle = 'rgba(255,200,90,0.9)';
      g.beginPath(); g.arc(-13.4, 3.2, 1, 0, Math.PI * 2); g.fill();
      break;
    }

    case 'smelter': {
      // work shed
      V(0, 1.05, 1.25, 2, { wh: 9, rh: 8, roofType: 'shed', mat: 'plank', wall: '#8f7350', roof: '#5e4940',
        winsR: [{ u: 0.5, h: 4.5 }] });
      // furnace kiln: tapered stone stack
      var kb = fp(1.45, 0.55, n);
      var kw = 11, kh = 24;
      function kx(t) { return kw * (1 - t * 0.45); }
      // left face
      var kgrad = g.createLinearGradient(kb.x - kw, 0, kb.x + kw, 0);
      kgrad.addColorStop(0, lerpHex('#9a8e80', '#fff6e2', 0.15));
      kgrad.addColorStop(0.5, '#9a8e80');
      kgrad.addColorStop(1, lerpHex('#9a8e80', '#19130a', 0.4));
      g.fillStyle = kgrad;
      g.beginPath();
      g.moveTo(kb.x - kx(0), kb.y);
      g.lineTo(kb.x - kx(1), kb.y - kh);
      g.lineTo(kb.x + kx(1), kb.y - kh);
      g.lineTo(kb.x + kx(0), kb.y);
      g.ellipse(kb.x, kb.y, kx(0), kx(0) * 0.45, 0, 0, Math.PI);

      g.fill();
      // stone joints
      g.strokeStyle = 'rgba(30,26,20,0.3)'; g.lineWidth = 0.5;
      for (var kr = 1; kr < 6; kr++) {
        g.beginPath();
        g.ellipse(kb.x, kb.y - kr * 4, kx(kr * 4 / kh), kx(kr * 4 / kh) * 0.4, 0, 0.1 * Math.PI, 0.9 * Math.PI);
        g.stroke();
      }
      // top rim + inner glow
      g.fillStyle = '#6e645a';
      g.beginPath(); g.ellipse(kb.x, kb.y - kh, kx(1), kx(1) * 0.45, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#2c2018';
      g.beginPath(); g.ellipse(kb.x, kb.y - kh, kx(1) * 0.6, kx(1) * 0.28, 0, 0, Math.PI * 2); g.fill();
      // furnace mouth
      g.fillStyle = '#1c1209';
      g.beginPath(); g.ellipse(kb.x - 3, kb.y - 2, 3.6, 3, 0, Math.PI, 0); g.closePath(); g.fill();
      _anchReg.smelter.furnace = { x: kb.x - 3, y: kb.y - 2.6 };
      _anchReg.smelter.smoke = { x: kb.x, y: kb.y - kh - 2 };
      // slag heap
      g.fillStyle = '#36322c';
      g.beginPath(); g.ellipse(kb.x + 13, kb.y + 4, 6, 3, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = 'rgba(255,120,30,0.25)';
      g.beginPath(); g.arc(kb.x + 11, kb.y + 3.4, 1, 0, Math.PI * 2); g.fill();
      if (wint) {
        g.fillStyle = 'rgba(236,244,250,0.6)';
        g.beginPath(); g.ellipse(kb.x, kb.y - kh + 0.5, kx(1) * 1.05, kx(1) * 0.45, 0, Math.PI, 0); g.fill();
