<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settlers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#c8d8e8}
canvas{display:block;cursor:default;margin-left:220px}
#ui{position:fixed;top:0;left:0;bottom:0;width:220px;background:rgba(15,20,35,0.92);border-right:1px solid #2a3a50;display:flex;flex-direction:column;z-index:10;backdrop-filter:blur(8px)}
#ui h2{padding:12px 16px 8px;font-size:14px;letter-spacing:2px;color:#6a9ac0;font-weight:400;border-bottom:1px solid #1a2a40}
#resources{padding:8px 16px;display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:11px;border-bottom:1px solid #1a2a40}
#resources .res{display:flex;align-items:center;gap:4px;padding:2px 0}
#resources .res .icon{font-size:13px}
#resources .res .val{color:#a0c0e0;font-weight:600}
#buildings{flex:1;overflow-y:auto;padding:8px}
#buildings::-webkit-scrollbar{width:4px}
#buildings::-webkit-scrollbar-thumb{background:#2a3a50;border-radius:2px}
.bldg-btn{display:block;width:100%;background:rgba(25,35,55,0.8);border:1px solid #1a2a40;color:#8aa0c0;padding:6px 10px;margin-bottom:4px;text-align:left;cursor:pointer;font-size:11px;font-family:inherit;border-radius:3px;transition:all 0.15s}
.bldg-btn:hover{border-color:#3a5a80;background:rgba(35,50,75,0.9);color:#aac}
.bldg-btn.selected{border-color:#4a80c0;color:#8ac0ff;background:rgba(40,60,100,0.5)}
.bldg-btn .name{font-weight:600;font-size:12px}
.bldg-btn .cost{color:#607890;font-size:10px;margin-top:2px}
.bldg-btn .desc{color:#506878;font-size:9px;margin-top:1px}
#mode-bar{padding:8px;border-top:1px solid #1a2a40;display:flex;gap:4px}
#mode-bar button{flex:1;background:rgba(25,35,55,0.8);border:1px solid #1a2a40;color:#6a8a a0;padding:5px;cursor:pointer;font-size:10px;font-family:inherit;border-radius:3px}
#mode-bar button:hover{border-color:#3a5a80;color:#aac}
#mode-bar button.active{border-color:#4a80c0;color:#8ac0ff}
#info{position:fixed;bottom:12px;left:232px;background:rgba(15,20,35,0.85);border:1px solid #2a3a50;padding:8px 14px;border-radius:5px;font-size:11px;color:#8aa0c0;backdrop-filter:blur(8px);z-index:10;max-width:500px}
#speed-controls{position:fixed;top:12px;right:12px;display:flex;gap:4px;z-index:10}
#speed-controls button{background:rgba(15,20,35,0.85);border:1px solid #2a3a50;color:#6a8aa0;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit;border-radius:3px}
#speed-controls button:hover{border-color:#3a5a80;color:#aac}
#speed-controls button.active{border-color:#4a80c0;color:#8ac0ff}
#tooltip{position:fixed;background:rgba(10,15,25,0.95);border:1px solid #3a5a80;padding:8px 12px;border-radius:4px;font-size:11px;color:#a0c0e0;pointer-events:none;z-index:20;display:none;max-width:200px}
#tooltip .tt-title{font-weight:600;color:#8ac0ff;margin-bottom:3px}
#tooltip .tt-line{color:#6a8aa0;font-size:10px}
</style>
</head>
<body>
<div id="ui">
  <h2>SETTLERS <span style="font-size:9px;color:#4a6080;cursor:pointer;float:right;margin-top:3px" onclick="newGameConfirm()">New Game</span></h2>
  <div id="save-bar" style="padding:4px 12px;border-bottom:1px solid #1a2a40;display:flex;gap:4px">
    <button onclick="saveGame()" style="flex:1;background:rgba(25,55,35,0.8);border:1px solid #2a5030;color:#6ab070;padding:4px;cursor:pointer;font-size:10px;font-family:inherit;border-radius:3px" title="Save game to browser storage">💾 Save</button>
    <button onclick="loadGame()" style="flex:1;background:rgba(25,35,55,0.8);border:1px solid #2a3a60;color:#6a90c0;padding:4px;cursor:pointer;font-size:10px;font-family:inherit;border-radius:3px" title="Load saved game">📂 Load</button>
    <span id="save-status" style="font-size:9px;color:#4a6a50;align-self:center;white-space:nowrap"></span>
  </div>
  <div id="season-badge" style="padding:6px 12px 4px;border-bottom:1px solid #1a2a40">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      <span id="season-icon" style="font-size:14px">🌿</span>
      <span id="season-name" style="font-size:10px;font-weight:600;letter-spacing:1px;color:#6a9058">SPRING</span>
      <span id="season-day" style="font-size:9px;color:#3a5030;margin-left:auto">Day 1 of 14</span>
    </div>
    <div style="background:#1a2a18;border-radius:2px;height:3px;overflow:hidden">
      <div id="season-progress" style="background:#4a7838;height:100%;width:0%;transition:width 0.5s"></div>
    </div>
  </div>
  <div id="resources"></div>
  <div id="buildings"></div>
  <div id="mode-bar">
    <button id="btn-build" class="active" onclick="setMode('build')">Build (B)</button>
    <button id="btn-road" onclick="setMode('road')">Road (R)</button>
    <button id="btn-demolish" onclick="setMode('demolish')">Del (D)</button>
  </div>
  <div id="economy" style="padding:6px 12px;border-top:1px solid #1a2a40;font-size:9px;color:#4a6a80;line-height:1.6"></div>
</div>
<canvas id="c"></canvas>
<div id="info">Start by placing a Woodcutter near trees, then use Road mode to connect its flag to the HQ flag · Scroll to zoom · Drag to pan</div>
<div id="speed-controls">
  <button onclick="setSpeed(0)" id="sp0">⏸</button>
  <button onclick="setSpeed(1)" id="sp1" class="active">1×</button>
  <button onclick="setSpeed(2)" id="sp2">2×</button>
  <button onclick="setSpeed(4)" id="sp4">4×</button>
  <button onclick="toggleHelp()" style="margin-left:8px">? Help</button>
</div>
<div id="tooltip"></div>
<script>
// ===== CONSTANTS =====
var TW = 64, TH = 32; // tile size in iso
var MAP_W = 80, MAP_H = 80;
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

// Camera
var cam = {x: 0, y: 0, zoom: 1};
var dragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};

// Game state
var mode = 'build'; // build, road, demolish
var selectedBuilding = null;
var speed = 1;
var tick = 0;
var gameTime = 0; // in-game seconds

// ===== TERRAIN =====
var TERRAIN = {
  WATER: 0, GRASS: 1, FOREST: 2, STONE: 3, HILL: 4, SAND: 5, MOUNTAIN: 6
};
var TERRAIN_COLORS = {
  0: ['#1d4e6b','#1f5270','#1c4a66'], // water
  1: ['#4f8f3e','#549343','#488a3a','#529245','#4c8c40'], // grass
  2: ['#3a7030','#3d7434','#366b2c'], // forest floor
  3: ['#7c7f78','#868981','#71746d'], // stone
  4: ['#699648','#719c4e','#629044'], // hill
  5: ['#d9c98c','#dfd094','#d2c184'], // sand
  6: ['#74777d','#6b6e74','#7d8086'] // mountain
};

// Seasonal terrain palettes — indexed [season][terrainType]
// Only terrain types that shift visually are listed; others fall back to TERRAIN_COLORS.
// Season 1 (Summer) mirrors TERRAIN_COLORS exactly so game looks unchanged in summer.
var SEASON_PALETTES = [
  // 0 — Spring
  {
    1: ['#5a9c4a','#5fa050','#549646','#5c9e4e','#569849'], // grass: fresh green
    2: ['#458038','#48833c','#407a33'],                     // forest floor: bright
    4: ['#7aa658','#80ac5e','#73a052'],                     // hill: verdant
  },
  // 1 — Summer (baseline — matches TERRAIN_COLORS)
  {
    1: ['#4f8f3e','#549343','#488a3a','#529245','#4c8c40'],
    2: ['#3a7030','#3d7434','#366b2c'],
    4: ['#699648','#719c4e','#629044'],
  },
  // 2 — Autumn
  {
    1: ['#a98e4c','#ad9250','#a08646','#ab9050','#9c8242'], // grass: amber
    2: ['#8a6a30','#7d5e28','#84642c'],                     // forest floor: russet
    4: ['#b09a50','#a68c42','#ab9248'],                     // hill: golden
  },
  // 3 — Winter
  {
    1: ['#c2cdd4','#bac6ce','#cad4da','#bcc8d0','#c6d0d6'], // grass: snow
    2: ['#9fb0bd','#94a6b5','#9aacba'],                     // forest floor: muted grey
    4: ['#cdd8de','#c2cedb','#c8d3d9'],                     // hill: pale
  },
];

function lerpHex(a, b, t) {
  var ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab_ = parseInt(a.slice(5,7),16);
  var br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb_ = parseInt(b.slice(5,7),16);
  var r = Math.round(ar + (br-ar)*t), g = Math.round(ag + (bg-ag)*t), b2 = Math.round(ab_ + (bb_-ab_)*t);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b2.toString(16).padStart(2,'0');
}

function getSeasonBlend() {
  var progress = getSeasonProgress();
  var threshold = 1 - 2 / DAYS_PER_SEASON; // last 2 days of season
  if (progress > threshold) {
    var t = (progress - threshold) / (2 / DAYS_PER_SEASON);
    return { from: getSeason(), to: (getSeason() + 1) % 4, t: t };
  }
  return { from: getSeason(), to: getSeason(), t: 0 };
}

function getSeasonalColors(terrainType) {
  var blend = getSeasonBlend();
  var fromPalette = SEASON_PALETTES[blend.from];
  var toPalette   = SEASON_PALETTES[blend.to];
  var fromColors = (fromPalette && fromPalette[terrainType]) || TERRAIN_COLORS[terrainType];
  var toColors   = (toPalette   && toPalette[terrainType])   || TERRAIN_COLORS[terrainType];
  if (blend.t === 0) return fromColors;
  return fromColors.map(function(c, i) {
    return lerpHex(c, toColors[i] || toColors[0], blend.t);
  });
}

// Map data
var terrain = new Uint8Array(MAP_W * MAP_H);
var minerals = new Uint8Array(MAP_W * MAP_H); // 0=none, 1=iron, 2=coal, 3=gold (on mountain tiles)
var height = new Float32Array(MAP_W * MAP_H);
var riverSet = new Set(); // tracks which tiles are river (vs ocean) water
var buildings = []; // {type, tx, ty, built, progress, working, cooldown, storage:{}}
var flags = []; // {tx, ty, items:[]} — max 8 items
var roads = []; // {from:{tx,ty}, to:{tx,ty}}
var carriers = []; // {x, y, tx, ty, targetTx, targetTy, carrying, road, state, timer}
var resources = {wood:10, planks:8, stone:8, bread:4, grain:0, flour:0, fish:2, water:0, meat:0, ironore:0, coal:0, goldore:0, iron:0, tools:0, coins:0};
var floatingTexts = []; // {x, y, text, color, life, maxLife}
var animals = []; // {tx, ty, type, dir, timer} — wildlife wandering the map
var seasonParticles = []; // {x, y, vx, vy, r, opacity, type:'snow'|'leaf', angle, spin}
var _lastNotifiedSeason = -1; // session-only; -1 means "not yet initialised"
var MINERAL = {NONE:0, IRON:1, COAL:2, GOLD:3};
var MINERAL_COLORS = {1:'#8a4a30', 2:'#2a2a2a', 3:'#c0a020'};

// ===== POPULATION & HAPPINESS =====
var population = {capacity: 10, employed: 0, happiness: 50, fed: true, tavernBonus: 0};
// happiness factors: food (40%), housing (30%), amenities/tavern (15%), wealth/coins (15%)

// ===== DAY/NIGHT CYCLE =====
var DAY_LENGTH = 14400; // ticks per full day (~4 min at 1x speed)

function getTimeOfDay() {
  return (tick % DAY_LENGTH) / DAY_LENGTH; // 0=midnight, 0.25=6am, 0.5=noon, 0.75=6pm
}

// ===== SEASONS =====
var DAYS_PER_SEASON = 14;
var SEASON_LENGTH = DAYS_PER_SEASON * DAY_LENGTH; // 201,600 ticks
var YEAR_LENGTH = 4 * SEASON_LENGTH;              // 806,400 ticks

function getSeason() {
  return Math.floor((tick % YEAR_LENGTH) / SEASON_LENGTH); // 0=Spring 1=Summer 2=Autumn 3=Winter
}
function getSeasonDay() {
  return Math.floor(((tick % YEAR_LENGTH) % SEASON_LENGTH) / DAY_LENGTH) + 1; // 1–14
}
function getSeasonProgress() {
  return ((tick % YEAR_LENGTH) % SEASON_LENGTH) / SEASON_LENGTH; // 0.0–1.0
}
function getSeasonName() {
  return ['Spring','Summer','Autumn','Winter'][getSeason()];
}

function getDaylight(t) {
  if (t === undefined) t = getTimeOfDay();
  // Smooth daylight curve: 1=full day, 0=full night
  return Math.max(0, Math.min(1, 0.5 + 0.6 * Math.cos((t - 0.5) * Math.PI * 2)));
}

function getClockStr(t) {
  if (t === undefined) t = getTimeOfDay();
  var hours = Math.floor(t * 24);
  var mins = Math.floor((t * 24 - hours) * 60);
  return (hours < 10 ? '0' : '') + hours + ':' + (mins < 10 ? '0' : '') + mins;
}

function getTimePeriod(t, d) {
  if (d > 0.8) return 'Day';
  if (d > 0.4) return t < 0.5 ? 'Dawn' : 'Dusk';
  if (d > 0.1) return t < 0.5 ? 'Dawn' : 'Twilight';
  return 'Night';
}

// Seeded star positions (don't regenerate each frame)
var _starPositions = null;
function getStarPositions(count) {
  if (_starPositions && _starPositions.length === count) return _starPositions;
  _starPositions = [];
  for (var i = 0; i < count; i++) {
    // Use a hash-like spread
    var sx = ((i * 7919 + 1234) % 2000) / 2000;
    var sy = ((i * 4211 + 5678) % 1200) / 2000;
    var brightness = 0.3 + ((i * 3571 + 999) % 1000) / 1000 * 0.7;
    var size = 0.5 + ((i * 2749) % 3) * 0.4;
    var twinkleSpeed = 0.015 + ((i * 1301) % 100) / 100 * 0.025;
    _starPositions.push({sx: sx, sy: sy, brightness: brightness, size: size, twinkleSpeed: twinkleSpeed});
  }
  return _starPositions;
}

function updatePopulation() {
  // Housing capacity: HQ=10 base + cottages/houses
  var cap = 10;
  var tavernCount = 0;
  for (var i = 0; i < buildings.length; i++) {
    var b = buildings[i], def = BLDG[b.type];
    if (b.built && def.housing) cap += def.housing;
    if (b.built && b.type === 'tavern') tavernCount++;
  }
  population.capacity = cap;

  // Employed = number of non-HQ, non-housing working buildings
  var emp = 0;
  for (var j = 0; j < buildings.length; j++) {
    var b2 = buildings[j], def2 = BLDG[b2.type];
    if (b2.type === 'hq') continue;
    if (def2.category === 'housing') continue;
    if (b2.built) emp++;
  }
  population.employed = emp;

  // Happiness calculation
  var totalFood = (resources.bread || 0) + (resources.fish || 0) + (resources.meat || 0);
  var foodScore = Math.min(100, totalFood * 10); // 10 food = 100%
  var housingScore = emp === 0 ? 100 : Math.min(100, (cap / Math.max(1, emp)) * 50); // 2:1 ratio = 100%
  var tavernScore = Math.min(100, tavernCount * 50); // 2 taverns = max
  population.tavernBonus = tavernScore;
  var wealthScore = Math.min(100, (resources.coins || 0) * 20); // 5 coins = 100%

  population.happiness = Math.round(foodScore * 0.4 + housingScore * 0.3 + tavernScore * 0.15 + wealthScore * 0.15);
  population.happiness = Math.max(0, Math.min(100, population.happiness));

  // Seasonal happiness nudge
  var seasonHappy = [5, 8, 3, 0][getSeason()]; // spring, summer, autumn, winter base
  if (getSeason() === 3) {
    // Winter penalty only if food is low
    var totalFood2 = (resources.bread || 0) + (resources.fish || 0) + (resources.meat || 0);
    if (totalFood2 < 5) seasonHappy = -10;
  }
  population.happiness = Math.max(0, Math.min(100, population.happiness + seasonHappy));
}

function getHappinessMultiplier() {
  var h = population.happiness;
  if (h < 30) return 0.7;
  if (h > 70) return 1.0 + (h - 70) / 100; // up to 1.3
  return 1.0;
}

function getSeasonModifier(buildingType) {
  var s = getSeason(), day = getSeasonDay();
  if (s === 3 && buildingType === 'farm') return null; // dormant — sentinel, not a number
  if (s === 0 && buildingType === 'farm') return 0.8;
  if (s === 0 && buildingType === 'forester') return 1.2;
  if (s === 2 && buildingType === 'farm') return day >= 12 ? 1.5 : 1.0;
  if (s === 2 && buildingType === 'forester') return 0.8;
  if (s === 3) {
    if (buildingType === 'woodcutter' || buildingType === 'hunter' || buildingType === 'quarry') return 0.8;
    if (buildingType === 'forester') return 0.9;
  }
  return 1.0;
}

function getAvailableWorkers() {
  return Math.max(0, population.capacity - population.employed);
}

// ===== BUILDING DEFINITIONS =====
var BLDG = {
  hq: {name:'Headquarters', cost:{}, size:3, desc:'Starting building. Stores all goods.', color:'#c0a060', produces:null, needs:null, category:'special'},
  woodcutter: {name:'Woodcutter', cost:{planks:2}, size:1, desc:'Cuts trees → wood. Place near forest!', color:'#8a6a40', produces:'wood', needs:null, category:'gather', interval:200, radius:6},
  forester: {name:'Forester', cost:{planks:2}, size:1, desc:'Plants trees. Pair with woodcutter.', color:'#4a8a40', produces:null, needs:null, category:'gather', interval:150, radius:5},
  sawmill: {name:'Sawmill', cost:{planks:2,stone:2}, size:2, desc:'Wood → planks. Essential!', color:'#a08050', produces:'planks', needs:'wood', category:'process', interval:120},
  quarry: {name:'Quarry', cost:{planks:2}, size:1, desc:'Mines stone from rocky ground.', color:'#808080', produces:'stone', needs:null, category:'gather', interval:180, radius:5},
  farm: {name:'Farm', cost:{planks:3,stone:1}, size:2, desc:'Grows grain on surrounding land.', color:'#c0a040', produces:'grain', needs:null, category:'gather', interval:250, radius:4},
  mill: {name:'Mill', cost:{planks:2,stone:2}, size:2, desc:'Grain → flour. Has a windmill!', color:'#b0a070', produces:'flour', needs:'grain', category:'process', interval:100},
  bakery: {name:'Bakery', cost:{planks:2,stone:2}, size:2, desc:'Flour + water → bread.', color:'#c09050', produces:'bread', needs2:'water', needs:'flour', category:'process', interval:130},
  fisher: {name:'Fisher', cost:{planks:2}, size:1, desc:'Catches fish. Place near river or coast!', color:'#4a7a9a', produces:'fish', needs:null, category:'gather', interval:160, radius:6, needsTerrain:TERRAIN.WATER},
  well: {name:'Well', cost:{planks:1,stone:2}, size:1, desc:'Draws water from the ground.', color:'#5a8ab0', produces:'water', needs:null, category:'gather', interval:90},
  hunter: {name:'Hunter', cost:{planks:2}, size:1, desc:'Hunts in forests for meat.', color:'#7a5a3a', produces:'meat', needs:null, category:'gather', interval:220, radius:8},
  ironmine: {name:'Iron Mine', cost:{planks:3,stone:2}, size:1, desc:'Mines iron ore. Place on mountains!', color:'#8a5040', produces:'ironore', needs:null, category:'mine', interval:250, radius:4, needsMineral:MINERAL.IRON},
  coalmine: {name:'Coal Mine', cost:{planks:3,stone:2}, size:1, desc:'Mines coal. Place on mountains!', color:'#404850', produces:'coal', needs:null, category:'mine', interval:220, radius:4, needsMineral:MINERAL.COAL},
  goldmine: {name:'Gold Mine', cost:{planks:4,stone:3}, size:1, desc:'Mines gold. Place on mountains!', color:'#b09030', produces:'goldore', needs:null, category:'mine', interval:300, radius:4, needsMineral:MINERAL.GOLD},
  smelter: {name:'Smelter', cost:{planks:3,stone:3}, size:2, desc:'Iron ore + coal → iron bars.', color:'#8a4030', produces:'iron', needs:'ironore', needs2:'coal', category:'process', interval:150},
  toolmaker: {name:'Toolmaker', cost:{planks:2,stone:2}, size:2, desc:'Iron + planks → tools.', color:'#6a7a60', produces:'tools', needs:'iron', needs2:'planks', category:'process', interval:180},
  mint: {name:'Mint', cost:{planks:3,stone:3}, size:2, desc:'Gold + coal → coins.', color:'#b0a040', produces:'coins', needs:'goldore', needs2:'coal', category:'process', interval:200},
  guard: {name:'Guardhouse', cost:{planks:2,stone:3}, size:1, desc:'Expands your territory border.', color:'#8a4040', produces:null, needs:null, category:'military'},
  cottage: {name:'Cottage', cost:{planks:2}, size:1, desc:'Houses 4 villagers.', color:'#a07850', produces:null, needs:null, category:'housing', housing:4},
  house: {name:'House', cost:{planks:3,stone:2}, size:2, desc:'Houses 8 villagers. Sturdy!', color:'#b08860', produces:null, needs:null, category:'housing', housing:8},
  tavern: {name:'Tavern', cost:{planks:3,stone:1}, size:1, desc:'Serves bread → boosts morale.', color:'#9a6a50', produces:null, needs:'bread', category:'housing', interval:400},
};

// ===== MAP GENERATION =====
function generateMap() {
  // Simple noise-based terrain
  // Use value noise with octaves
  var seed = Math.random() * 10000;
  function noise2d(x, y) {
    var n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
    return n - Math.floor(n);
  }
  function smoothNoise(x, y, scale) {
    var sx = x / scale, sy = y / scale;
    var ix = Math.floor(sx), iy = Math.floor(sy);
    var fx = sx - ix, fy = sy - iy;
    fx = fx * fx * (3 - 2 * fx);
    fy = fy * fy * (3 - 2 * fy);
    var a = noise2d(ix, iy), b = noise2d(ix+1, iy);
    var c = noise2d(ix, iy+1), d = noise2d(ix+1, iy+1);
    return a*(1-fx)*(1-fy) + b*fx*(1-fy) + c*(1-fx)*fy + d*fx*fy;
  }
  function fbm(x, y) {
    return smoothNoise(x, y, 12) * 0.5 + smoothNoise(x, y, 6) * 0.3 + smoothNoise(x, y, 3) * 0.2;
  }

  for (var y = 0; y < MAP_H; y++) {
    for (var x = 0; x < MAP_W; x++) {
      var i = y * MAP_W + x;
      var h = fbm(x, y);
      height[i] = h;

      // Edge fade to water
      var dx = x / MAP_W - 0.5, dy = y / MAP_H - 0.5;
      var edgeDist = 1 - Math.max(Math.abs(dx), Math.abs(dy)) * 2.5;
      edgeDist = Math.max(0, Math.min(1, edgeDist));
      h *= edgeDist;
      height[i] = h;

      if (h < 0.18) terrain[i] = TERRAIN.WATER;
      else if (h < 0.22) terrain[i] = TERRAIN.SAND;
      else if (h < 0.55) {

        else terrain[i] = TERRAIN.GRASS;
      } else if (h < 0.7) {

        if (stoneNoise > 0.5) terrain[i] = TERRAIN.STONE;

      } else {

      }
    }
  }

  // === RIVER GENERATION ===
  // Carve a meandering river across the map from one side to the other

  var riverPath = [];
  riverSet.clear();
  (function generateRiver() {
    // Pick start and end on opposite sides — well inside the land area
    // Edge water extends ~12 tiles in, so start/end at 18-25% from edge
    var side = noise2d(seed + 99, seed + 77) > 0.5 ? 0 : 1; // 0=top-bottom, 1=left-right
    var startX, startY, endX, endY;

      startY = Math.floor(MAP_H * 0.18 + noise2d(seed + 201, 2) * MAP_H * 0.07);
      endX = Math.floor(MAP_W * 0.3 + noise2d(seed + 202, 3) * MAP_W * 0.4);
      endY = Math.floor(MAP_H * 0.75 + noise2d(seed + 203, 4) * MAP_H * 0.07);
    } else {
      // Left to right
      startX = Math.floor(MAP_W * 0.18 + noise2d(seed + 204, 1) * MAP_W * 0.07);
      startY = Math.floor(MAP_H * 0.3 + noise2d(seed + 205, 2) * MAP_H * 0.4);
      endX = Math.floor(MAP_W * 0.75 + noise2d(seed + 206, 3) * MAP_W * 0.07);
      endY = Math.floor(MAP_H * 0.3 + noise2d(seed + 207, 4) * MAP_H * 0.4);

        height[ty * MAP_W + tx] = 0.35;
      }
    }
  }

  // Guarantee stone deposits near HQ (2-3 clusters within building range)
  var stoneCount = 0;
  for (var dy2 = -10; dy2 <= 10; dy2++) {
    for (var dx2 = -10; dx2 <= 10; dx2++) {
      var sx = cx + dx2, sy = cy + dy2;

  }

      {dx: 6 + Math.floor(noise2d(seed, 1) * 3), dy: -4 - Math.floor(noise2d(seed, 2) * 3)},
      {dx: -5 - Math.floor(noise2d(seed, 3) * 3), dy: 5 + Math.floor(noise2d(seed, 4) * 3)},
      {dx: 7 + Math.floor(noise2d(seed, 5) * 2), dy: 6 + Math.floor(noise2d(seed, 6) * 2)},
      {dx: -8 - Math.floor(noise2d(seed, 7) * 2), dy: -2 + Math.floor(noise2d(seed, 8) * 4)},
      {dx: 3 + Math.floor(noise2d(seed, 9) * 3), dy: 8 + Math.floor(noise2d(seed, 10) * 2)}
    ];
    for (var si = 0; si < stoneSpots.length; si++) {
      var spot = stoneSpots[si];
      for (var sdy = -2; sdy <= 2; sdy++) {
        for (var sdx = -2; sdx <= 2; sdx++) {
          if (Math.abs(sdx) + Math.abs(sdy) > 3) continue; // diamond shape

          if (stx >= 0 && stx < MAP_W && sty >= 0 && sty < MAP_H) {

      {dx: -13 - Math.floor(noise2d(seed + 52, 3) * 4), dy: 13 + Math.floor(noise2d(seed + 53, 4) * 4)},
      {dx: 13 + Math.floor(noise2d(seed + 54, 5) * 4), dy: 13 + Math.floor(noise2d(seed + 55, 6) * 4)},
      {dx: -14 - Math.floor(noise2d(seed + 56, 7) * 4), dy: -9 - Math.floor(noise2d(seed + 57, 8) * 4)}

      // Clamp to map bounds

  if (forestCount < 12) {
    // Add forest patches

      var fty = cy + Math.floor(noise2d(seed + fi, 11) * 12) - 6;

    if (terrain[ai] === TERRAIN.FOREST && Math.random() < 0.008) {
      var ax = ai % MAP_W, ay = Math.floor(ai / MAP_W);

  hq.built = true;
  hq.progress = 1;
  buildings.push(hq);

  // Place initial flag at HQ (size 3, so flag at ty + 3)
  flags.push({tx: cx, ty: cy + 3, items: []});

  // Center camera on HQ

function createBuilding(type, tx, ty) {

    type: type,
    tx: tx, ty: ty,
    built: false,

    materialsTotal: JSON.parse(JSON.stringify(def.cost)), // original cost

// ===== COORDINATE TRANSFORMS =====
function tileToIso(tx, ty) {
  return {

}

}

function worldToScreen(wx, wy) {
  return {
    x: wx * cam.zoom + cam.x,
    y: wy * cam.zoom + cam.y

      g.moveTo(0, y0);
      for (var x2 = 0; x2 <= size; x2 += 8) g.lineTo(x2, y0 + Math.sin(x2 * 0.22 + r * 2.1) * 1.8);

      g.strokeStyle = 'rgba(15,18,24,0.20)';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(kx, ky);
      for (var sgm = 0; sgm < 4; sgm++) {
        kx += (rnd(k2 * 10 + sgm) - 0.35) * 12;
        ky += (rnd(k2 * 13 + sgm + 50) - 0.5) * 9;
        g.lineTo(kx, ky);
      }
      g.stroke();
    }
    for (var sp = 0; sp < 130; sp++) {
      g.fillStyle = rnd(sp + 300) > 0.5 ? 'rgba(235,240,245,0.14)' : 'rgba(10,12,16,0.16)';
      g.fillRect(rnd(sp + 88) * size, rnd(sp + 99) * size, 1.6, 1.6);

    for (var wv = 0; wv < 22; wv++) {

      g.lineWidth = 1.1;

      for (var wx3 = 0; wx3 <= size; wx3 += 10) g.lineTo(wx3, wy0 + Math.sin(wx3 * 0.13 + wv * 1.7) * 2.4);

}

function buildTerrainCache() {
  if (!terrainCanvas) {

    terrainCanvas.width = Math.ceil(((MAP_W + MAP_H + 4) * (TW / 2)) * TC_SCALE);
    terrainCanvas.height = Math.ceil(((MAP_W + MAP_H) * (TH / 2) + TC_OFFY + TH * 2) * TC_SCALE);

  var g = tctx;
  g.setTransform(TC_SCALE, 0, 0, TC_SCALE, TC_OFFX * TC_SCALE, TC_OFFY * TC_SCALE);
  g.clearRect(-TC_OFFX, -TC_OFFY, terrainCanvas.width / TC_SCALE, terrainCanvas.height / TC_SCALE);

  var snowLine = getSeason() === 3;
  for (var ty = 0; ty < MAP_H; ty++) {
    for (var tx = 0; tx < MAP_W; tx++) {
      paintCacheTile(g, tx, ty, snowLine, false);

  g.setTransform(1, 0, 0, 1, 0, 0);
  terrainCacheDirty = false;

// Partial cache update — repaint just the tiles whose terrain type changed

var dirtyTiles = new Set();
function markTileDirty(tx, ty) {

}

function flushDirtyTiles() {
  if (!terrainCanvas || dirtyTiles.size === 0) return;
  var g = tctx;
  g.setTransform(TC_SCALE, 0, 0, TC_SCALE, TC_OFFX * TC_SCALE, TC_OFFY * TC_SCALE);
  var snowLine = getSeason() === 3;
  dirtyTiles.forEach(function(i) {
    paintCacheTile(g, i % MAP_W, Math.floor(i / MAP_W), snowLine, true);
  });
  g.setTransform(1, 0, 0, 1, 0, 0);
  dirtyTiles.clear();

function paintCacheTile(g, tx, ty, snowLine, clearFirst) {
  var i = ty * MAP_W + tx;
  var t = terrain[i];
  var pN = cornerPos(tx, ty), pE = cornerPos(tx + 1, ty), pS = cornerPos(tx + 1, ty + 1), pW = cornerPos(tx, ty + 1);

  g.save();
  g.beginPath();
  g.moveTo(pN.x, pN.y); g.lineTo(pE.x, pE.y); g.lineTo(pS.x, pS.y); g.lineTo(pW.x, pW.y);
  g.closePath();
  g.clip();
  if (clearFirst) {
    var bbx = Math.min(pW.x, pN.x) - 1, bby = Math.min(pN.y, pE.y) - 1;
    g.clearRect(bbx, bby, pE.x - pW.x + 2, pS.y - pN.y + 2 + (Math.max(pE.y, pW.y) - Math.min(pE.y, pW.y)));
  }

  var fill;
  if (t === TERRAIN.WATER) {
    // shallow→deep gradient; rivers stay bright
    var isRiver = riverSet.has(i);
    if (isRiver) {
      fill = '#2f7390';
    } else {
      var dpt = (waterDepth[i] || 7) + (smoothHash(tx * 0.7, ty * 0.7) - 0.5) * 2.2;
      fill = lerpHex('#2a6080', '#0e3050', Math.max(0, Math.min(1, (dpt - 1) / 5.5)));
    }
  } else {
        fill = terrainBlendColor(t, tx, ty);
        // directional light (from screen top-left): shade by slope
        var eN = cornerE(tx, ty), eE = cornerE(tx + 1, ty), eS = cornerE(tx + 1, ty + 1), eW = cornerE(tx, ty + 1);
        var shade = (eN - eS) * 0.09 + (eW - eE) * 0.05;
        // altitude light: higher ground slightly brighter
        shade += (eN + eE + eS + eW) * 0.25 * 0.012;
        if (shade !== 0) fill = lerpHex(fill, shade > 0 ? '#ffffff' : '#0a1410', Math.min(0.5, Math.abs(shade)));
      }

      g.beginPath();
      g.moveTo(pN.x, pN.y); g.lineTo(pE.x, pE.y); g.lineTo(pS.x, pS.y); g.lineTo(pW.x, pW.y);
      g.closePath();
      g.fillStyle = fill;
      g.fill();
      // hairline same-color stroke kills antialiasing seams between tiles
      g.strokeStyle = fill; g.lineWidth = 1; g.stroke();

      var cxm = (pN.x + pS.x) / 2, cym = (pN.y + pS.y) / 2;
      var h1 = hash2(tx, ty), h2 = hash2(tx + 57, ty + 91), h3 = hash2(tx + 13, ty + 7);

      // baked texture pattern (continuous across tiles — pattern space is world space)
      var pat = getTerrainPattern(t, getSeason());
      if (pat) {
        g.globalCompositeOperation = 'overlay';
        g.globalAlpha = t === TERRAIN.WATER ? 0.45 : (t === TERRAIN.STONE || t === TERRAIN.MOUNTAIN ? 0.85 : 0.72);
        g.fillStyle = pat;
        g.beginPath();
        g.moveTo(pN.x, pN.y); g.lineTo(pE.x, pE.y); g.lineTo(pS.x, pS.y); g.lineTo(pW.x, pW.y);
        g.closePath();
        g.fill();
        g.globalAlpha = 1;
        g.globalCompositeOperation = 'source-over';
      }

      // feather neighbouring terrain colour across shared edges (kills hard tile borders)
      if (t !== TERRAIN.WATER) {
        var fedges = [
          { dx: 0, dy: -1, a: pN, b: pE }, { dx: 1, dy: 0, a: pE, b: pS },
          { dx: 0, dy: 1, a: pS, b: pW }, { dx: -1, dy: 0, a: pW, b: pN }
        ];
        for (var fe = 0; fe < 4; fe++) {
          var fnx = tx + fedges[fe].dx, fny = ty + fedges[fe].dy;
          if (fnx < 0 || fnx >= MAP_W || fny < 0 || fny >= MAP_H) continue;
          var nt = terrain[fny * MAP_W + fnx];
          if (nt === t || nt === TERRAIN.WATER) continue;
          var fa = fedges[fe].a, fb = fedges[fe].b;
          g.globalAlpha = 0.20;
          g.fillStyle = terrainBlendColor(nt, fnx, fny);
          g.beginPath();
          g.moveTo(fa.x, fa.y);
          g.lineTo(fb.x, fb.y);
          g.lineTo(fb.x + (cxm - fb.x) * 0.5, fb.y + (cym - fb.y) * 0.5);
          g.lineTo(fa.x + (cxm - fa.x) * 0.5, fa.y + (cym - fa.y) * 0.5);
          g.closePath();
          g.fill();
          g.globalAlpha = 1;
        }
      }

      // --- per-terrain accents (texture itself comes from the pattern overlay) ---
      if (t === TERRAIN.GRASS || t === TERRAIN.HILL || t === TERRAIN.FOREST) {
        if (!snowLine) {
          // occasional flowers on grass in spring/summer
          var ssn = getSeason();
          if (t === TERRAIN.GRASS && (ssn === 0 || ssn === 1) && h3 > 0.84) {
            for (var fl = 0; fl < 3; fl++) {
              var flx = cxm + (hash2(tx + fl * 11, ty + 4) - 0.5) * 34;
              var fly = cym + (hash2(tx + 2, ty + fl * 13) - 0.5) * 12;
              g.fillStyle = ['#eee49a','#e8a8bc','#f4f4f0','#d8b0e0'][Math.floor(hash2(tx + fl, ty) * 4)];
              g.beginPath(); g.arc(flx, fly, 1.2, 0, Math.PI * 2); g.fill();
              g.fillStyle = 'rgba(250,225,90,0.9)';
              g.fillRect(flx - 0.35, fly - 0.35, 0.7, 0.7);
            }

        }
      } else if (t === TERRAIN.MOUNTAIN || t === TERRAIN.STONE) {
        g.fillStyle = 'rgba(255,255,255,' + (0.05 + h1 * 0.05).toFixed(3) + ')';
        g.beginPath();
        g.moveTo(pN.x, pN.y); g.lineTo(pE.x, pE.y); g.lineTo(cxm, cym); g.closePath();
        g.fill();
        // snow caps on high peaks
        var peak = (cornerE(tx, ty) + cornerE(tx + 1, ty) + cornerE(tx + 1, ty + 1) + cornerE(tx, ty + 1)) / 4;
        if (t === TERRAIN.MOUNTAIN && peak > 5.2) {
          g.fillStyle = 'rgba(235,242,248,0.55)';
          g.beginPath();
          g.moveTo(pN.x, pN.y);
          g.lineTo((pN.x + pE.x) / 2, (pN.y + pE.y) / 2);
          g.lineTo(cxm, cym + 2);
          g.lineTo((pN.x + pW.x) / 2, (pN.y + pW.y) / 2);
          g.closePath();
          g.fill();
        }
      }

      // --- shoreline: sand rim on land edges touching water, foam line in water ---
      if (t !== TERRAIN.WATER) {
        var edges = [
          { dx: 0, dy: -1, a: pN, b: pE }, { dx: 1, dy: 0, a: pE, b: pS },
          { dx: 0, dy: 1, a: pS, b: pW }, { dx: -1, dy: 0, a: pW, b: pN }
        ];
        for (var ei = 0; ei < 4; ei++) {
          var nx2 = tx + edges[ei].dx, ny2 = ty + edges[ei].dy;
          if (nx2 < 0 || nx2 >= MAP_W || ny2 < 0 || ny2 >= MAP_H) continue;
          if (terrain[ny2 * MAP_W + nx2] === TERRAIN.WATER) {
            g.strokeStyle = 'rgba(222,206,150,0.8)';
            g.lineWidth = 2.5;
            g.beginPath(); g.moveTo(edges[ei].a.x, edges[ei].a.y); g.lineTo(edges[ei].b.x, edges[ei].b.y); g.stroke();
          }
        }
      } else {
        // shallow-water sand glow next to shore
        if (waterDepth[i] === 1 && !riverSet.has(i)) {
          g.fillStyle = 'rgba(180,200,170,0.10)';
          g.beginPath();
          g.moveTo(pN.x, pN.y); g.lineTo(pE.x, pE.y); g.lineTo(pS.x, pS.y); g.lineTo(pW.x, pW.y);
          g.closePath();
          g.fill();
        }
      }

  g.restore();
}

function resize() {

function getTerrainColor(t, tx, ty) {

// ===== ANIMATED WATER (drawn live over the terrain cache) =====
function drawWaterAnim(tx, ty) {
  var i = ty * MAP_W + tx;
  var isRiver = riverSet.has(i);
  var pN = cornerPos(tx, ty), pE = cornerPos(tx + 1, ty), pS = cornerPos(tx + 1, ty + 1), pW = cornerPos(tx, ty + 1);
  var sN = worldToScreen(pN.x, pN.y), sE = worldToScreen(pE.x, pE.y), sS = worldToScreen(pS.x, pS.y), sW = worldToScreen(pW.x, pW.y);
  var z = cam.zoom;
  var cx2 = (sN.x + sS.x) / 2, cy2 = (sN.y + sS.y) / 2;

  // breathing color wash
  var wave = Math.sin(tick * 0.025 + tx * 0.6 + ty * 0.8) * 0.5 + 0.5;
  ctx.beginPath();
  ctx.moveTo(sN.x, sN.y); ctx.lineTo(sE.x, sE.y); ctx.lineTo(sS.x, sS.y); ctx.lineTo(sW.x, sW.y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(' + (isRiver ? '110,190,220' : '90,160,200') + ',' + (0.04 + wave * 0.07).toFixed(3) + ')';
  ctx.fill();

  // moving specular glints
  if (z > 0.5) {
    var gPhase = tick * (isRiver ? 0.06 : 0.03) + hash2(tx, ty) * 6.28;
    var gx = cx2 + Math.sin(gPhase) * 12 * z;
    var gy = cy2 + Math.cos(gPhase * 0.7) * 4 * z;
    var ga = 0.10 + 0.10 * Math.sin(gPhase * 1.7);
    if (ga > 0.05) {
      ctx.strokeStyle = 'rgba(220,245,255,' + ga.toFixed(3) + ')';
      ctx.lineWidth = 1.2 * z;
      ctx.beginPath();
      ctx.moveTo(gx - 5 * z, gy);
      ctx.lineTo(gx + 5 * z, gy);
      ctx.stroke();
    }
  }

  // foam where water meets land — pulsing edge highlight
  var edges = [
    { dx: 0, dy: -1, a: sN, b: sE }, { dx: 1, dy: 0, a: sE, b: sS },
    { dx: 0, dy: 1, a: sS, b: sW }, { dx: -1, dy: 0, a: sW, b: sN }
  ];
  for (var ei = 0; ei < 4; ei++) {
    var nx2 = tx + edges[ei].dx, ny2 = ty + edges[ei].dy;
    if (nx2 < 0 || nx2 >= MAP_W || ny2 < 0 || ny2 >= MAP_H) continue;
    if (terrain[ny2 * MAP_W + nx2] !== TERRAIN.WATER) {
      var fa = 0.22 + 0.18 * Math.sin(tick * 0.04 + tx * 0.9 + ty * 1.3 + ei);
      ctx.strokeStyle = 'rgba(235,248,255,' + Math.max(0, fa).toFixed(3) + ')';
      ctx.lineWidth = 1.6 * z;
      ctx.beginPath();

      var ax = edges[ei].a.x + (cx2 - edges[ei].a.x) * 0.12, ay = edges[ei].a.y + (cy2 - edges[ei].a.y) * 0.12;
      var bx = edges[ei].b.x + (cx2 - edges[ei].b.x) * 0.12, by = edges[ei].b.y + (cy2 - edges[ei].b.y) * 0.12;
      ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      ctx.stroke();
    }
  }
}

// ===== TERRITORY OVERLAY (cached Path2D, rebuilt when territory changes) =====
var territoryVersion = 0;
var _tpVersion = -1;

function buildTerritoryPaths() {
  territoryFillPath = new Path2D();
  territoryBorderPath = new Path2D();
  for (var ty = 0; ty < MAP_H; ty++) {
    for (var tx = 0; tx < MAP_W; tx++) {
      if (!isInTerritory(tx, ty)) continue;
      if (terrain[ty * MAP_W + tx] === TERRAIN.WATER) continue;
      var pN = cornerPos(tx, ty), pE = cornerPos(tx + 1, ty), pS = cornerPos(tx + 1, ty + 1), pW = cornerPos(tx, ty + 1);
      territoryFillPath.moveTo(pN.x, pN.y);
      territoryFillPath.lineTo(pE.x, pE.y); territoryFillPath.lineTo(pS.x, pS.y); territoryFillPath.lineTo(pW.x, pW.y);
      territoryFillPath.closePath();
      var edges = [
        { dx: 0, dy: -1, a: pN, b: pE }, { dx: 1, dy: 0, a: pE, b: pS },
        { dx: 0, dy: 1, a: pS, b: pW }, { dx: -1, dy: 0, a: pW, b: pN }
      ];
      for (var ei = 0; ei < 4; ei++) {
        var nx2 = tx + edges[ei].dx, ny2 = ty + edges[ei].dy;
        var outside = nx2 < 0 || nx2 >= MAP_W || ny2 < 0 || ny2 >= MAP_H || !isInTerritory(nx2, ny2);
        if (outside) {

// ===== TREES (baked sprites: kind × variant × season) =====
var TREE_CANOPY = [
  ['#5fae4a', '#74c258', '#4f9e42'],          // spring
  ['#4d9440', '#5da64c', '#3f8636'],          // summer
  ['#cf8a3a', '#c26a30', '#d9a945', '#a85426'], // autumn
  null                                         // winter: deciduous are bare
];
var CONIFER_GREEN = ['#2f6b3a', '#3a7a44', '#28603c'];

function paintTrunk(g, h, lean, seed) {
  g.strokeStyle = '#4e3b28';
  g.lineWidth = 2.4;
  g.lineCap = 'round';
  g.beginPath();
  g.moveTo(0, 0);
  g.quadraticCurveTo(lean * 0.4, -h * 0.55, lean, -h);
  g.stroke();
  g.strokeStyle = '#6f5640';
  g.lineWidth = 1.0;
  g.beginPath();
  g.moveTo(-0.6, 0);
  g.quadraticCurveTo(lean * 0.4 - 0.6, -h * 0.55, lean - 0.5, -h);
  g.stroke();
  // bark nicks
  for (var i = 0; i < 4; i++) {
    var v = 0.15 + matRnd(seed, i) * 0.6;
    g.strokeStyle = 'rgba(30,20,10,0.5)';
    g.lineWidth = 0.5;
    g.beginPath();
    g.moveTo(lean * v * 0.6 - 1, -h * v);
    g.lineTo(lean * v * 0.6 + 0.4, -h * v - 1.4);
    g.stroke();
  }
  g.lineCap = 'butt';
}

function paintDeciduous(g, variant, si, seed) {
  var lean = (matRnd(seed, 1) - 0.5) * 5;
  // ground contact shadow
  g.fillStyle = 'rgba(10,25,15,0.28)';
  g.beginPath(); g.ellipse(3, 1, 8.5, 3, 0, 0, Math.PI * 2); g.fill();

  if (si === 3) {
    // bare winter tree: trunk + branch skeleton with snow lines
    paintTrunk(g, 14, lean, seed);
    g.strokeStyle = '#54412e';
    g.lineCap = 'round';
    for (var br = 0; br < 7; br++) {
      var bv = 0.45 + matRnd(seed, br + 10) * 0.5;
      var ba = -Math.PI / 2 + (matRnd(seed, br + 20) - 0.5) * 1.9;
      var bl = 4 + matRnd(seed, br + 30) * 6.5;
      var bx0 = lean * bv * 0.7, by0 = -14 * bv;
      var bx1 = bx0 + Math.cos(ba) * bl, by1 = by0 + Math.sin(ba) * bl;
      g.lineWidth = 1.1;
      g.beginPath();
      g.moveTo(bx0, by0);
      g.quadraticCurveTo((bx0 + bx1) / 2 + 1, (by0 + by1) / 2, bx1, by1);
      g.stroke();
      // twig
      g.lineWidth = 0.6;
      g.beginPath();
      g.moveTo((bx0 + bx1) / 2, (by0 + by1) / 2);
      g.lineTo((bx0 + bx1) / 2 + Math.cos(ba + 0.7) * 3, (by0 + by1) / 2 + Math.sin(ba + 0.7) * 3);
      g.stroke();
      // snow on upper side
      g.strokeStyle = 'rgba(238,245,251,0.9)';
      g.lineWidth = 0.8;
      g.beginPath();
      g.moveTo(bx0, by0 - 0.8);
      g.quadraticCurveTo((bx0 + bx1) / 2 + 1, (by0 + by1) / 2 - 0.8, bx1, by1 - 0.8);
      g.stroke();
      g.strokeStyle = '#54412e';
    }
    g.lineCap = 'butt';
    return;
  }

  paintTrunk(g, 13, lean, seed);
  var pal = TREE_CANOPY[si];
  var baseG = pal[(variant + seed) % pal.length];
  var dark = lerpHex(baseG, '#0a2408', 0.42);
  var lit = lerpHex(baseG, '#fbffd8', 0.34);
  // canopy: lobed mass of leaf clusters
  var lobes = [
    { x: lean - 4.5, y: -16, r: 5.5 }, { x: lean + 4, y: -15, r: 5 },
    { x: lean, y: -20.5, r: 6 }, { x: lean - 1, y: -13.5, r: 4.5 }
  ];
  // dark silhouette under-layer
  for (var lb = 0; lb < lobes.length; lb++) {
    g.fillStyle = dark;
    g.beginPath(); g.arc(lobes[lb].x + 1.2, lobes[lb].y + 1.2, lobes[lb].r, 0, Math.PI * 2); g.fill();
  }
  // mid clusters
  for (var cl = 0; cl < 26; cl++) {
    var lob = lobes[cl % lobes.length];
    var ca = matRnd(seed, cl + 50) * Math.PI * 2;
    var cr = matRnd(seed, cl + 90) * lob.r * 0.75;
    var cx2 = lob.x + Math.cos(ca) * cr, cy2 = lob.y + Math.sin(ca) * cr * 0.85;
    var tint = matRnd(seed, cl + 130);
    g.fillStyle = lerpHex(baseG, tint > 0.6 ? '#fbffd8' : '#0a2408', Math.abs(tint - 0.5) * 0.35);
    g.beginPath(); g.arc(cx2, cy2, 1.8 + matRnd(seed, cl + 170) * 1.6, 0, Math.PI * 2); g.fill();
  }
  // lit crown (NW)
  for (var hl = 0; hl < 9; hl++) {
    var lob2 = lobes[hl % lobes.length];
    g.fillStyle = lit;
    g.beginPath();
    g.arc(lob2.x - lob2.r * 0.35 + matRnd(seed, hl + 210) * 2, lob2.y - lob2.r * 0.4 - matRnd(seed, hl + 250) * 2, 1.1 + matRnd(seed, hl + 290), 0, Math.PI * 2);
    g.fill();
  }
}

function paintConifer(g, variant, si, seed) {
  var lean = (matRnd(seed, 2) - 0.5) * 3;
  g.fillStyle = 'rgba(10,25,15,0.28)';
  g.beginPath(); g.ellipse(2.5, 1, 7, 2.6, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#4e3b28';
  g.fillRect(-1.1, -8, 2.2, 8);
  var baseG = CONIFER_GREEN[(variant + seed) % CONIFER_GREEN.length];
  if (si === 2) baseG = lerpHex(baseG, '#4a5a20', 0.25); // dustier in autumn
  var dark = lerpHex(baseG, '#03180c', 0.40);
  var lit = lerpHex(baseG, '#d8f5b0', 0.30);
  var tipY = -34 - matRnd(seed, 3) * 5;
  var layers = 4;
  for (var L = layers - 1; L >= 0; L--) {
    var topY = tipY * (1 - L / layers) - 7;
    var botY = tipY * (1 - (L + 1) / layers) - 5;
    var hw = 3.5 + L * 2.8;
    // ragged skirt: several overlapping triangles
    for (var tfan = -2; tfan <= 2; tfan++) {
      var fx = lean * (1 - L / layers) + tfan * hw * 0.24;
      g.fillStyle = tfan < 0 ? lerpHex(baseG, lit, 0.55) : (tfan === 0 ? baseG : lerpHex(baseG, dark, 0.6));
      g.beginPath();
      g.moveTo(lean * (1 - (L + 1) / layers), botY - 3);
      g.lineTo(fx + hw * 0.42, topY);
      g.lineTo(fx - hw * 0.42, topY);
      g.closePath();
      g.fill();
    }
    // shadow under layer
    g.fillStyle = 'rgba(3,20,10,0.30)';
    g.beginPath();
    g.ellipse(lean * (1 - L / layers), topY + 0.5, hw * 0.8, 1.2, 0, 0, Math.PI);
    g.fill();
    if (si === 3) { // snow shelf per layer
      g.fillStyle = 'rgba(236,244,250,0.88)';
      g.beginPath();
      g.moveTo(lean * (1 - (L + 1) / layers) - hw * 0.5, topY - (botY - 3 - topY) * -0.0 - 0.5);
      g.quadraticCurveTo(lean * (1 - (L + 0.5) / layers), botY - 4.5, lean * (1 - (L + 1) / layers) + hw * 0.5, topY - 0.5);
      g.quadraticCurveTo(lean * (1 - (L + 0.5) / layers), topY + 1.4, lean * (1 - (L + 1) / layers) - hw * 0.5, topY - 0.5);
      g.closePath();
      g.fill();
    }
  }
  if (si === 3) {
    g.fillStyle = 'rgba(240,247,252,0.92)';
    g.beginPath(); g.arc(lean, tipY - 6.5, 1.5, 0, Math.PI * 2); g.fill();
  }
}

function getTreeSprite(kind, variant, si) {
  var key = 't:' + kind + variant + ':' + si;
  return getSprite(key, 48, 60, 24, 54, function (g) {
    var seed = variant * 17 + kind.charCodeAt(0);
    if (kind === 'c') paintConifer(g, variant, si, seed);
    else paintDeciduous(g, variant, si, seed);
  });
}

function drawTreeCluster(tx, ty) {
  var hash = ((tx * 31 + ty * 17) & 0x7fffffff);
  var base = isoTop(tx, ty);
  var sBase = worldToScreen(base.x, base.y);
  if (sBase.x < -80 || sBase.x > canvas.width + 80 || sBase.y < -100 || sBase.y > canvas.height + 60) return;

  var blend = getSeasonBlend();
  // conifers dominate the high ground
  var coniferBias = elevTile[ty * MAP_W + tx] >= 4 ? 0.72 : 0.28;
  var n = 1 + (hash % 3 === 0 ? 2 : 1);
  for (var k = 0; k < n; k++) {
    var hx = hash2(tx + k * 37, ty + k * 11), hy = hash2(tx + k * 5, ty + k * 53);
    var ox = (hx - 0.5) * 34, oy = (hy - 0.5) * 14;
    var scale = (k === 0 ? 0.92 + hx * 0.25 : 0.5 + hx * 0.3);
    var kind = hash2(tx + k * 71, ty + k * 13) < coniferBias ? 'c' : 'd';
    var variant = (hash + k * 7) % 3;
    var flip = hash2(tx + k * 3, ty + k * 19) > 0.5;
    var spr = getTreeSprite(kind, variant, blend.from);
    blitSprite(spr, base.x + ox, base.y + oy, 1, scale, flip);
    if (blend.t > 0.02 && blend.to !== blend.from) {
      blitSprite(getTreeSprite(kind, variant, blend.to), base.x + ox, base.y + oy, blend.t, scale, flip);
    }
  }
}

// ===== ROCKS (baked sprites) =====
function paintRockSprite(g, variant) {
  var seed = variant * 29 + 5;
  var nB = 2 + variant % 2;
  for (var r = 0; r < nB; r++) {
    var bx = (matRnd(seed, r) - 0.5) * 18;
    var by = (matRnd(seed, r + 9) - 0.5) * 7;
    var rw = 4.5 + matRnd(seed, r + 17) * 3.5;
    var rh = rw * 0.74;
    // contact shadow
    g.fillStyle = 'rgba(12,18,14,0.30)';
    g.beginPath(); g.ellipse(bx + 1.8, by + rh * 0.55, rw * 1.1, rh * 0.42, 0, 0, Math.PI * 2); g.fill();
    // body silhouette
    g.fillStyle = ['#74797f', '#7e8480', '#696e6a'][(variant + r) % 3];
    g.beginPath();
    g.moveTo(bx - rw, by);
    g.lineTo(bx - rw * 0.55, by - rh * 0.95);
    g.lineTo(bx + rw * 0.15, by - rh * 1.1);
    g.lineTo(bx + rw * 0.7, by - rh * 0.75);
    g.lineTo(bx + rw, by + rh * 0.1);
    g.lineTo(bx + rw * 0.35, by + rh * 0.58);
    g.lineTo(bx - rw * 0.55, by + rh * 0.5);
    g.closePath();
    g.fill();
    // top facet (lit)
    g.fillStyle = 'rgba(232,238,236,0.42)';
    g.beginPath();
    g.moveTo(bx - rw * 0.55, by - rh * 0.95);
    g.lineTo(bx + rw * 0.15, by - rh * 1.1);
    g.lineTo(bx + rw * 0.3, by - rh * 0.45);
    g.lineTo(bx - rw * 0.5, by - rh * 0.3);
    g.closePath();
    g.fill();
    // right facet (dark)
    g.fillStyle = 'rgba(20,24,28,0.35)';
    g.beginPath();
    g.moveTo(bx + rw * 0.7, by - rh * 0.75);
    g.lineTo(bx + rw, by + rh * 0.1);
    g.lineTo(bx + rw * 0.35, by + rh * 0.58);
    g.lineTo(bx + rw * 0.25, by - rh * 0.35);
    g.closePath();
    g.fill();
    // crack
    g.strokeStyle = 'rgba(18,20,24,0.5)';
    g.lineWidth = 0.5;
    g.beginPath();
    g.moveTo(bx - rw * 0.2, by - rh * 0.9);
    g.lineTo(bx + matRnd(seed, r + 33) * 3 - 1, by - rh * 0.3);
    g.lineTo(bx - 1 + matRnd(seed, r + 41) * 2, by + rh * 0.3);
    g.stroke();
    // moss at the base
    g.fillStyle = 'rgba(80,120,55,0.35)';
    g.beginPath();
    g.ellipse(bx - rw * 0.4, by + rh * 0.35, rw * 0.4, rh * 0.22, 0, 0, Math.PI * 2);
    g.fill();
  }
}

function getRockSprite(variant) {
  return getSprite('rock:' + variant, 44, 32, 22, 26, function (g) {
    paintRockSprite(g, variant);
  });
}

function drawStone(tx, ty) {
  var base = isoTop(tx, ty);
  var s = worldToScreen(base.x, base.y);
  if (s.x < -50 || s.x > canvas.width + 50 || s.y < -50 || s.y > canvas.height + 50) return;
  var hash = ((tx * 23 + ty * 41) & 0x7fffffff);
  blitSprite(getRockSprite(hash % 3), base.x, base.y, 1, 0.85 + (hash % 5) * 0.08, (hash & 8) > 0);
}

function drawMineral(tx, ty) {
  var mi = ty * MAP_W + tx;
  var m = minerals[mi];
  if (m === MINERAL.NONE) return;
  var base = isoTop(tx, ty);
  var s = worldToScreen(base.x, base.y);
  var z = cam.zoom;
  if (z < 0.4) return;
  if (s.x < -30 || s.x > canvas.width + 30 || s.y < -30 || s.y > canvas.height + 30) return;
  var hash = ((tx * 29 + ty * 43) & 0x7fffffff);
  var color = MINERAL_COLORS[m];
  var count = 3 + hash % 3;
  for (var si2 = 0; si2 < count; si2++) {
    var ox = ((hash * (si2 + 1) * 7) % 13 - 6) * z;
    var oy = ((hash * (si2 + 2) * 11) % 9 - 4) * z * 0.5;
    var r2 = (1.5 + (hash * si2) % 2) * z;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.arc(s.x + ox, s.y + oy, r2, 0, Math.PI * 2);
    ctx.fill();
    // glint
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(s.x + ox - r2 * 0.3, s.y + oy - r2 * 0.3, r2 * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
  if (m === MINERAL.GOLD && z > 0.6) {
    var glow = 0.12 + Math.sin(tick * 0.04 + hash) * 0.06;
    ctx.fillStyle = 'rgba(230,195,60,' + glow.toFixed(3) + ')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, 6 * z, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}
