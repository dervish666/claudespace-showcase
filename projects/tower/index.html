<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tower Sim</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    height: 100dvh; /* iOS Safari: accounts for bottom bar */
    display: flex;
    flex-direction: column;
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding-bottom: env(safe-area-inset-bottom);
}

#top-bar {
    height: 60px;
    min-height: 60px;
    background: #16213e;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    border-bottom: 1px solid #0f3460;
    z-index: 10;
}

#top-bar .stat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    white-space: nowrap;
}

#top-bar .stat .label {
    opacity: 0.6;
    font-size: 11px;
}

#top-bar .stat .value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}

#top-bar .spacer { flex: 1; }

.speed-controls {
    display: flex;
    gap: 4px;
}

.speed-controls button, #btn-overview, #btn-sound {
    background: #0f3460;
    border: 1px solid #1a4a7a;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    touch-action: manipulation;
}

.speed-controls button.active {
    background: #e94560;
    border-color: #e94560;
}

.speed-controls button:hover, #btn-overview:hover, #btn-sound:hover {
    background: #1a4a7a;
}

#tower-canvas {
    flex: 1;
    width: 100%;
    touch-action: none;
    cursor: crosshair;
}

#build-palette {
    height: 80px;
    min-height: 80px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 10;
}

#build-palette::-webkit-scrollbar {
    height: 4px;
}

#build-palette::-webkit-scrollbar-thumb {
    background: #0f3460;
    border-radius: 2px;
}

#panel-overlay {
    position: fixed;
    bottom: 80px;
    left: 0;
    right: 0;
    max-height: 50vh;
    background: #16213e;
    border-top: 2px solid #0f3460;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 20;
    overflow-y: auto;
    padding: 16px;
    display: none;
}

#panel-overlay.open {
    display: block;
    transform: translateY(0);
}

#money-display { color: #4ade80; }
#stars-display { color: #fbbf24; }
#pop-display { color: #60a5fa; }
#time-display { color: #c084fc; }
</style>
</head>
<body>

<div id="top-bar">
    <div class="stat">
        <span class="value" id="money-display">$50,000</span>
    </div>
    <div class="stat">
        <span class="value" id="pop-display">0</span>
        <span class="label">pop</span>
    </div>
    <div class="stat">
        <span class="value" id="stars-display">&#9733;</span>
    </div>
    <div class="spacer"></div>
    <div class="stat">
        <span class="value" id="time-display">6:00 AM</span>
    </div>
    <div class="speed-controls">
        <button id="btn-pause" title="Pause">&#10074;&#10074;</button>
        <button id="btn-1x" class="active" title="1x">1x</button>
        <button id="btn-2x" title="2x">2x</button>
        <button id="btn-4x" title="4x">4x</button>
    </div>
    <button id="btn-sound" title="Toggle Sound" style="font-size:16px">&#128264;</button>
    <button id="btn-overview" title="Overview">&#9776;</button>
</div>

<canvas id="tower-canvas"></canvas>

<div id="build-palette">
    <!-- Populated by ui.js -->
</div>

<div id="panel-overlay">
    <!-- Slide-up info panels -->
</div>

<script type="module" src="js/main.js?v=5"></script>
</body>
</html>
