<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
#ui {
  position: fixed; top: 12px; left: 12px; z-index: 10;
  font: 11px 'Courier New', monospace; color: rgba(200,200,200,0.5);
  display: flex; gap: 10px; align-items: center;
}
.btn {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(200,200,200,0.2);
  color: rgba(200,200,200,0.6); padding: 3px 10px; border-radius: 4px;
  cursor: pointer; font: inherit; transition: all 0.2s;
}
.btn:hover { border-color: rgba(200,200,200,0.5); color: rgba(200,200,200,0.8); }
#segments { width: 60px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <a href="/" class="btn">&larr; Fractals</a>
  <button class="btn" onclick="nextPalette()">Palette</button>
  <button class="btn" onclick="nextPattern()">Pattern</button>
  <label>Mirrors: <input type="range" id="segments" min="3" max="24" value="8"></label>
  <button class="btn" onclick="autoMode=!autoMode">Auto</button>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

let mouseX = 0.5, mouseY = 0.5;
let autoMode = true;
let paletteIdx = 0, patternIdx = 0;
const palettes = ['cosmic', 'fire', 'ocean', 'neon', 'pastel', 'mono'];
const patterns = ['flow', 'crystal', 'organic', 'electric', 'nebula'];

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 1.5);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

function nextPalette() { paletteIdx = (paletteIdx + 1) % palettes.length; }
function nextPattern() { patternIdx = (patternIdx + 1) % patterns.length; }

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX / window.innerWidth;
  mouseY = 1.0 - e.clientY / window.innerHeight;
  autoMode = false;
});
canvas.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX / window.innerWidth;
  mouseY = 1.0 - e.touches[0].clientY / window.innerHeight;
  autoMode = false;
  e.preventDefault();
}, { passive: false });

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0, 1); }`;

const FS = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;
uniform vec2 u_mouse;
uniform float u_segments;
uniform float u_palette;
uniform float u_pattern;

#define PI 3.14159265359
#define TAU 6.28318530718

// Noise
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8,0.6,-0.6,0.8);
  for (int i = 0; i < 5; i++) { v += a*noise(p); p = rot*p*2.0; a *= 0.5; }
  return v;
}

// Palette
vec3 palette(float t, float id) {
  vec3 a, b, c, d;
  if (id < 0.5) { // cosmic
    a = vec3(0.5,0.5,0.5); b = vec3(0.5,0.5,0.5); c = vec3(1.0,0.7,0.4); d = vec3(0.0,0.15,0.2);
  } else if (id < 1.5) { // fire
    a = vec3(0.5,0.5,0.5); b = vec3(0.5,0.5,0.5); c = vec3(1.0,0.3,0.0); d = vec3(0.0,0.05,0.2);
  } else if (id < 2.5) { // ocean
    a = vec3(0.5,0.5,0.5); b = vec3(0.5,0.5,0.5); c = vec3(0.1,0.5,0.8); d = vec3(0.1,0.2,0.5);
  } else if (id < 3.5) { // neon
    a = vec3(0.5,0.5,0.5); b = vec3(0.5,0.5,0.5); c = vec3(1.0,1.0,0.0); d = vec3(0.3,0.0,0.5);
  } else if (id < 4.5) { // pastel
    a = vec3(0.8,0.5,0.4); b = vec3(0.2,0.4,0.2); c = vec3(1.0,0.8,0.6); d = vec3(0.0,0.25,0.25);
  } else { // mono
    a = vec3(0.5,0.5,0.5); b = vec3(0.5,0.5,0.5); c = vec3(1.0,1.0,1.0); d = vec3(0.0,0.0,0.0);
  }
  return a + b * cos(TAU * (c * t + d));
}

// Pattern generators
float pattern_flow(vec2 p, float t) {
  float f = fbm(p * 2.0 + t * 0.3);
  f += sin(p.x * 3.0 + t) * 0.3;
  f += fbm(p * 4.0 - t * 0.2) * 0.5;
  return f;
}

float pattern_crystal(vec2 p, float t) {
  float d = length(p);
  float a = atan(p.y, p.x);
  float f = sin(d * 10.0 - t * 2.0) * 0.5;
  f += sin(a * 6.0 + d * 5.0 + t) * 0.3;
  f += noise(p * 8.0 + t * 0.5) * 0.4;
  return f;
}

float pattern_organic(vec2 p, float t) {
  vec2 q = vec2(fbm(p + t * 0.1), fbm(p + vec2(5.2, 1.3) + t * 0.15));
  vec2 r = vec2(fbm(p + 4.0*q + vec2(1.7,9.2) + t * 0.1), fbm(p + 4.0*q + vec2(8.3,2.8) + t * 0.12));
  return fbm(p + 4.0*r);
}

float pattern_electric(vec2 p, float t) {
  float d = length(p);
  float a = atan(p.y, p.x);
  float f = 0.0;
  for (int i = 0; i < 4; i++) {
    float fi = float(i);
    f += sin(d * (8.0 + fi * 3.0) - t * (1.5 + fi * 0.5) + a * (2.0 + fi)) / (2.0 + fi);
  }
  f += noise(p * 12.0 + t) * 0.2;
  return f;
}

float pattern_nebula(vec2 p, float t) {
  float f = fbm(p * 1.5 + t * 0.15);
  float g = fbm(p * 3.0 - t * 0.1 + f * 2.0);
  float h = fbm(p * 0.8 + g * 1.5 + t * 0.05);
  return f * 0.4 + g * 0.35 + h * 0.25 + sin(length(p) * 5.0 - t) * 0.15;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);

  // Kaleidoscope transform
  float angle = atan(uv.y, uv.x);
  float r = length(uv);
  float seg = TAU / u_segments;
  angle = mod(angle, seg);
  if (angle > seg * 0.5) angle = seg - angle; // mirror

  vec2 p = vec2(cos(angle), sin(angle)) * r;

  // Mouse influence
  p += (u_mouse - 0.5) * 0.5;

  float t = u_time;

  // Pattern
  float f;
  if (u_pattern < 0.5) f = pattern_flow(p, t);
  else if (u_pattern < 1.5) f = pattern_crystal(p, t);
  else if (u_pattern < 2.5) f = pattern_organic(p, t);
  else if (u_pattern < 3.5) f = pattern_electric(p, t);
  else f = pattern_nebula(p, t);

  // Color
  vec3 col = palette(f + t * 0.1 + r * 0.3, u_palette);

  // Brightness varies with pattern intensity
  col *= 0.6 + 0.4 * f;

  // Center glow
  col += palette(t * 0.05, u_palette) * exp(-r * 3.0) * 0.3;

  // Edge darkening
  float vignette = 1.0 - r * 0.5;
  col *= max(vignette, 0.0);

  // Subtle sparkle
  float sparkle = noise(gl_FragCoord.xy * 0.5 + t * 10.0);
  col += step(0.98, sparkle) * 0.3;

  // Tone map
  col = col / (col + 0.8);

  gl_FragColor = vec4(col, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = createShader(gl.VERTEX_SHADER, VS);
const fs = createShader(gl.FRAGMENT_SHADER, FS);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uSegments = gl.getUniformLocation(prog, 'u_segments');
const uPalette = gl.getUniformLocation(prog, 'u_palette');
const uPattern = gl.getUniformLocation(prog, 'u_pattern');

function frame(now) {
  if (document.hidden) { requestAnimationFrame(frame); return; }
  const t = now * 0.001;

  if (autoMode) {
    mouseX = 0.5 + Math.sin(t * 0.13) * 0.3 + Math.sin(t * 0.07) * 0.15;
    mouseY = 0.5 + Math.cos(t * 0.11) * 0.3 + Math.cos(t * 0.05) * 0.15;
  }

  const seg = parseFloat(document.getElementById('segments').value);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform2f(uMouse, mouseX, mouseY);
  gl.uniform1f(uSegments, seg);
  gl.uniform1f(uPalette, paletteIdx);
  gl.uniform1f(uPattern, patternIdx);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
