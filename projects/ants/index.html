function triggerQuake() {
  logEvent('combat', 'Earthquake! The ground shifts...');
  quakeTimer = 30; // frames of screen shake

  // Scatter some ants randomly
  for (const ant of ants) {
    if (Math.random() < 0.3) {
      ant.x += (Math.random() - 0.5) * 30;
      ant.y += (Math.random() - 0.5) * 30;
      ant.x = Math.max(5, Math.min(W - 5, ant.x));
      ant.y = Math.max(5, Math.min(H - 5, ant.y));
      ant.angle += (Math.random() - 0.5) * Math.PI;
    }
  }

  // Break some rocks
  for (let i = 0; i < walls.length; i++) {
    if (walls[i] && Math.random() < 0.15) {
      walls[i] = 0;
    }
  }

  // Shift some food
  const foodCells = [];
  for (let i = 0; i < food.length; i++) {
    if (food[i] > 0) foodCells.push(i);
  }
  for (const i of foodCells) {
    if (Math.random() < 0.2) {
      const y = Math.floor(i / GW);
      const x = i % GW;
      const nx = x + Math.floor((Math.random() - 0.5) * 6);
      const ny = y + Math.floor((Math.random() - 0.5) * 6);
      if (inBounds(nx, ny) && !walls[idx(nx, ny)]) {
        food[idx(nx, ny)] += food[i];
        food[i] = 0;
      }
    }
  }
}

// === POPULATION CHART ===
const POP_HISTORY_LEN = 120; // 2 minutes of data (sampled every second)
const popHistory = []; // array of { tick, counts: { nestId: count } }

function samplePopulation() {
  const counts = {};
  for (const a of ants) {
    counts[a.nestId] = (counts[a.nestId] || 0) + 1;
  }
  popHistory.push({ tick: simTick, counts });
  if (popHistory.length > POP_HISTORY_LEN) popHistory.shift();
}

function renderPopChart() {
  const chart = document.getElementById('popChart');
  if (!chart) return;
  const cctx = chart.getContext('2d');
  const cw = chart.width, ch = chart.height;
  cctx.fillStyle = '#0f0f14';
  cctx.fillRect(0, 0, cw, ch);

  if (popHistory.length < 2) return;

  // Find max population for scaling
  let maxPop = 10;
  for (const entry of popHistory) {
    for (const c of Object.values(entry.counts)) {
      if (c > maxPop) maxPop = c;
    }
  }

  // Draw line for each colony
  for (const nest of nests) {
    const c = nest.colour;
    cctx.strokeStyle = c.carry;
    cctx.lineWidth = 1.5;
    cctx.beginPath();
    for (let i = 0; i < popHistory.length; i++) {
      const x = (i / (POP_HISTORY_LEN - 1)) * cw;
      const count = popHistory[i].counts[nest.id] || 0;
      const y = ch - (count / maxPop) * (ch - 4) - 2;
      if (i === 0) cctx.moveTo(x, y);
      else cctx.lineTo(x, y);
    }
    cctx.stroke();
  }
}

// === AMBIENT SOUND ENGINE ===
let audioCtx = null;
let soundEnabled = false;
let masterGain = null;
let ambientOsc = null;
let combatSynth = null;
let lastCombatSound = 0;
let lastFoodSound = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.15;
  masterGain.connect(audioCtx.destination);

  // Ambient drone — low hum representing colony activity
  ambientOsc = audioCtx.createOscillator();
  ambientOsc.type = 'sine';
  ambientOsc.frequency.value = 55; // low A
  const ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0.08;

  // Filter for warmth
  const ambientFilter = audioCtx.createBiquadFilter();
  ambientFilter.type = 'lowpass';
  ambientFilter.frequency.value = 200;

  ambientOsc.connect(ambientFilter);
  ambientFilter.connect(ambientGain);
  ambientGain.connect(masterGain);
  ambientOsc.start();

  // Second harmonic
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 82.5; // fifth above
  const g2 = audioCtx.createGain();
  g2.gain.value = 0.04;
  osc2.connect(ambientFilter);
  g2.connect(masterGain);
  osc2.start();
}

function toggleSound() {
  if (!soundEnabled) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    soundEnabled = true;
    document.getElementById('soundToggle').textContent = 'Sound: On';
    document.getElementById('soundToggle').style.color = '#b0a080';
  } else {
    soundEnabled = false;
    if (audioCtx) audioCtx.suspend();
    document.getElementById('soundToggle').textContent = 'Sound: Off';
    document.getElementById('soundToggle').style.color = '#6a5a40';
  }
}

function playCombatSound() {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;
  if (now - lastCombatSound < 0.15) return;
  lastCombatSound = now;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200 + Math.random() * 300, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
  gain.gain.setValueAtTime(0.06, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.12);
}

function playFoodSound() {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;
  if (now - lastFoodSound < 0.08) return;
  lastFoodSound = now;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600 + Math.random() * 400, now);
  osc.frequency.exponentialRampToValueAtTime(1200, now + 0.06);
  gain.gain.setValueAtTime(0.03, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.08);
}

function playSpiderSound() {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(500, now);
  osc.frequency.exponentialRampToValueAtTime(60, now + 0.25);
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.3);
}

function playQueenDeathSound() {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;
  // Dramatic descending tone
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, now);
  osc.frequency.exponentialRampToValueAtTime(100, now + 0.8);
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 1.0);
  // Second harmonic for richness
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(1200, now);
  osc2.frequency.exponentialRampToValueAtTime(150, now + 0.6);
  gain2.gain.setValueAtTime(0.06, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
  osc2.connect(gain2);
  gain2.connect(masterGain);
  osc2.start(now);
  osc2.stop(now + 0.7);
}

// Update ambient drone pitch based on colony activity
function updateAmbientAudio() {
  if (!soundEnabled || !audioCtx || !ambientOsc) return;
  const totalAnts = ants.length;
  const dayPhase = getDayPhase();
  // Pitch rises slightly with more ants, drops at night
  const nightDrop = dayPhase.nightAmount * 15; // lower pitch at night
  const basePitch = 55 + Math.min(totalAnts * 0.05, 30) - nightDrop;
  ambientOsc.frequency.setTargetAtTime(Math.max(35, basePitch), audioCtx.currentTime, 0.5);
  // Volume slightly lower at night — quieter world
  if (masterGain) {
    const nightVol = 0.15 - dayPhase.nightAmount * 0.04;
    masterGain.gain.setTargetAtTime(nightVol, audioCtx.currentTime, 0.5);
  }
}

// === TIME UI ===
let lastPhase = '';
function updateTimeUI() {
  const day = getDayPhase();
  const icon = document.getElementById('timeIcon');
  const bar = document.getElementById('timeBar');
  const name = document.getElementById('timeName');

  if (day.phase === 'Night') {
    icon.textContent = '\u{1F319}'; // crescent moon
    bar.style.background = '#3040608a';
  } else if (day.phase === 'Dawn') {
    icon.textContent = '\u{1F305}'; // sunrise
    bar.style.background = 'linear-gradient(90deg, #304060, #d48040)';
  } else if (day.phase === 'Dusk') {
    icon.textContent = '\u{1F307}'; // sunset
    bar.style.background = 'linear-gradient(90deg, #d48040, #304060)';
  } else {
    icon.textContent = '\u2600'; // sun
    bar.style.background = '#d4a050';
  }
  bar.style.width = (dayTime * 100) + '%';
  name.textContent = day.phase;

  // Log phase transitions
  if (dayNightEnabled && day.phase !== lastPhase && lastPhase) {
    if (day.phase === 'Night') logEvent('weather', 'Night falls — ants slow, spiders stir');
    else if (day.phase === 'Dawn') logEvent('weather', 'Dawn breaks — the colony awakens');
    else if (day.phase === 'Day') logEvent('weather', 'Daylight — full foraging speed');
    else if (day.phase === 'Dusk') logEvent('weather', 'Dusk — darkness approaches');
  }
  lastPhase = day.phase;
}

// === MAIN LOOP ===
let lastTime = performance.now();
let frameCount = 0;
let fpsDisplay = 0;
let cachedDaySpeedMod = 1;
let cachedNightAmount = 0;

function loop() {
  if (document.hidden) { requestAnimationFrame(loop); return; }

  // Advance day/night cycle
  if (dayNightEnabled) {
    dayTime = (dayTime + DAY_CYCLE_RATE * daySpeed) % 1;
  }
  // Cache day/night values for this frame
  const _dp = getDayPhase();
  cachedNightAmount = _dp.nightAmount;
  cachedDaySpeedMod = cachedNightAmount > 0.5 ? (0.6 + 0.4 * (1 - cachedNightAmount)) : 1.0;

  for (let s = 0; s < simSpeed; s++) {
    simTick++;

    // Build spatial hash for combat
    if (nests.length > 1 || spiders.length > 0 || beetles.length > 0) buildSpatialHash();

    // Update ants (iterate backwards for safe removal)
    for (let i = ants.length - 1; i >= 0; i--) {
      if (i < ants.length) updateAnt(ants[i], i);
    }

    if ((simTick) % 2 === 0) updatePheromones();
    if (foodRegrowth) regrowFood();
    // Fruit decay — every 60 ticks, rot fruit slightly
    if (simTick % 60 === 0) {
      for (let fi = 0; fi < food.length; fi++) {
        if (food[fi] > 0 && foodType[fi] === 2) {
          food[fi] -= 0.3;
          if (food[fi] <= 0) { food[fi] = 0; totalFood--; }
        }
      }
    }

    // Puddle evaporation + pheromone erosion in puddles
    if (simTick % 4 === 0) {
      const evapFactor = isRaining ? 0.999 : 0.994;
      for (let pi = 0; pi < puddles.length; pi++) {
        if (puddles[pi] > 0.01) {
          puddles[pi] *= evapFactor;
          if (puddles[pi] < 0.01) { puddles[pi] = 0; continue; }
          // Puddles erode pheromone trails within them
          if (puddles[pi] > 0.2) {
            for (const nest of nests) {
              nest.homePh[pi] *= 0.95;
              nest.foodPh[pi] *= 0.95;
            }
          }
        }
      }
    }

    // Population dynamics
    updatePopulation();

    // Check for eliminated colonies (queenless + no ants left)
    if (simTick % 60 === 0) {
      for (let ni = nests.length - 1; ni >= 0; ni--) {
        const n = nests[ni];
        if (!n.queenless) continue;
        let count = 0;
        for (const a of ants) if (a.nestId === n.id) count++;
        if (count === 0) {
          logEvent('death', `${n.colour.name} colony has been eliminated!`);
          nestMap.delete(n.id);
          nests.splice(ni, 1);
          updateLegend();
        }
      }
    }

    // Spiders
    for (const spider of spiders) updateSpider(spider);

    // Beetles
    for (const beetle of beetles) updateBeetle(beetle);

    // Particles
    updateParticles();
  }

  render();

  frameCount++;
  const now = performance.now();
  if (now - lastTime > 1000) {
    fpsDisplay = Math.round(frameCount * 1000 / (now - lastTime));
    frameCount = 0;
    lastTime = now;

    // Update legend & charts
    updateLegend();
    renderEventLog();
    samplePopulation();
    renderPopChart();
    updateAmbientAudio();
    updateTimeUI();
  }

  document.getElementById('antCount').textContent = ants.length;
  document.getElementById('foodRemaining').textContent = totalFood;
  document.getElementById('fps').textContent = fpsDisplay;

  requestAnimationFrame(loop);
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { lastTime = performance.now(); frameCount = 0; }
});

initGrids();
setupDefault();
requestAnimationFrame(loop);
</script>
