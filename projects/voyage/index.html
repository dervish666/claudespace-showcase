<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voyage — Raymarched Ocean</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
#info {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(200, 210, 220, 0.5); font: 13px/1.4 'Courier New', monospace;
  text-align: center; pointer-events: none; transition: opacity 3s;
}
#fps {
  position: fixed; top: 10px; right: 10px;
  color: rgba(200, 210, 220, 0.3); font: 11px monospace;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">drag to look around · scroll to change time of day</div>
<div style="position:fixed;top:10px;left:10px;z-index:10;font:11px 'Courier New',monospace;display:flex;gap:8px">
<a href="/attractors.html" style="color:rgba(200,210,220,0.4);text-decoration:none">Attractors</a>
<a href="/planet.html" style="color:rgba(200,210,220,0.4);text-decoration:none">Planet</a>
<a href="/terrain.html" style="color:rgba(200,210,220,0.4);text-decoration:none">Terrain</a>
<a href="/landscape.html" style="color:rgba(200,210,220,0.4);text-decoration:none">Landscape</a>
<a href="/aurora.html" style="color:rgba(200,210,220,0.4);text-decoration:none">Aurora</a>
</div>
<div id="fps"></div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', {antialias: false}) || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:2em">WebGL required</p>'; throw 'no gl'; }

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform float u_daytime;
uniform vec2 u_mouse;

const float PI = 3.14159265;
const float TAU = 6.28318530;

float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
    float v = 0.0;
    float a = 0.5;
    mat2 r = mat2(0.8, 0.6, -0.6, 0.8);
    for (int i = 0; i < 4; i++) {
        v += a * noise(p);
        p = r * p * 2.0;
        a *= 0.5;
    }
    return v;
}

float oceanH(vec2 p, float t) {
    float h = 0.0;
    h += 0.6 * sin(dot(vec2(1.0, 0.3), p) * 0.15 + t * 0.8);
    h += 0.4 * sin(dot(vec2(0.7, 1.0), p) * 0.22 + t * 0.6);
    h += 0.25 * sin(dot(vec2(-0.3, 0.8), p) * 0.35 + t * 1.0);
    h += 0.15 * sin(dot(vec2(1.0, -0.5), p) * 0.5 + t * 1.2);
    h += 0.08 * sin(dot(vec2(0.5, 0.7), p) * 0.8 + t * 1.5);
    h += 0.04 * sin(dot(vec2(-0.7, 0.3), p) * 1.3 + t * 1.8);
    return h;
}

vec3 oceanN(vec2 p, float t) {
    float e = 0.03;
    float c = oceanH(p, t);
    float dx = oceanH(p + vec2(e, 0.0), t) - c;
    float dz = oceanH(p + vec2(0.0, e), t) - c;
    return normalize(vec3(-dx, e, -dz));
}

vec3 sunDir() {
    float a = u_daytime * TAU - PI * 0.5;
    return normalize(vec3(0.3, sin(a), cos(a)));
}

vec3 skyCol(vec3 rd, vec3 sun) {
    float sh = sun.y;
    vec3 top = vec3(0.15, 0.3, 0.6);
    vec3 bot = vec3(0.5, 0.6, 0.7);

    if (sh < 0.2) {
        float s = smoothstep(0.2, -0.1, sh);
        top = mix(top, vec3(0.08, 0.04, 0.15), s);
        bot = mix(bot, vec3(0.7, 0.25, 0.08), s);
    }
    if (sh < -0.05) {
        float n = smoothstep(-0.05, -0.3, sh);
        top = mix(top, vec3(0.01, 0.01, 0.04), n);
        bot = mix(bot, vec3(0.02, 0.02, 0.06), n);
    }

    float g = pow(max(rd.y, 0.0), 0.4);
    vec3 col = mix(bot, top, g);

    float sd = dot(rd, sun);
    col += vec3(1.0, 0.85, 0.5) * pow(max(sd, 0.0), 256.0) * 2.0;
    col += vec3(1.0, 0.5, 0.2) * pow(max(sd, 0.0), 8.0) * 0.4;
    col += vec3(0.8, 0.3, 0.1) * pow(max(sd, 0.0), 3.0) * max(0.0, 0.4 - rd.y);

    if (sh < 0.0) {
        float si = smoothstep(0.0, -0.2, sh);
        vec3 sp = floor(rd * 300.0);
        float shh = hash(sp.xz + sp.y * 137.0);
        if (shh > 0.997 && rd.y > 0.05) {
            float tw = 0.7 + 0.3 * sin(u_time * 2.0 + shh * 100.0);
            col += vec3(0.8, 0.85, 1.0) * tw * si;
        }
    }

    if (rd.y > 0.01) {
        vec2 cu = rd.xz * 500.0 / rd.y + vec2(u_time * 3.0, u_time);
        float cl = fbm(cu * 0.001);
        cl = smoothstep(0.45, 0.7, cl) * smoothstep(0.01, 0.15, rd.y);
        col = mix(col, mix(bot, vec3(0.9), 0.4), cl * 0.2);
    }

    return col;
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / u_res.y;

    float yaw = u_mouse.x * TAU;
    float pitch = (u_mouse.y - 0.35) * PI * 0.45;

    vec3 eye = vec3(u_time * 6.0, 2.0 + 0.3 * sin(u_time * 0.2), 0.0);

    vec3 fwd = vec3(sin(yaw) * cos(pitch), sin(pitch), cos(yaw) * cos(pitch));
    vec3 right = normalize(cross(fwd, vec3(0.0, 1.0, 0.0)));
    vec3 up = cross(right, fwd);
    vec3 rd = normalize(fwd + uv.x * right + uv.y * up);

    vec3 sun = sunDir();
    vec3 col = skyCol(rd, sun);

    // Ocean
    if (rd.y < 0.1) {
        float t = 0.5;
        bool hit = false;
        float prevT = 0.5;

        for (int i = 0; i < 48; i++) {
            vec3 p = eye + rd * t;
            float diff = p.y - oceanH(p.xz, u_time);
            if (diff < 0.01) {
                hit = true;
                float lo = prevT;
                float hi = t;
                for (int j = 0; j < 6; j++) {
                    float mid = 0.5 * (lo + hi);
                    vec3 pm = eye + rd * mid;
                    if (pm.y - oceanH(pm.xz, u_time) < 0.0) { hi = mid; } else { lo = mid; }
                }
                t = 0.5 * (lo + hi);
                break;
            }
            prevT = t;
            t += max(diff * 0.4, 0.3 + t * 0.01);
            if (t > 300.0) break;
        }

        if (hit) {
            vec3 p = eye + rd * t;
            vec3 n = oceanN(p.xz, u_time);
            float NdV = max(dot(n, -rd), 0.0);
            float fresnel = 0.04 + 0.96 * pow(1.0 - NdV, 5.0);

            vec3 refl = reflect(rd, n);
            vec3 reflCol = skyCol(refl, sun);

            float sunUp = max(sun.y, 0.0);
            vec3 waterCol = vec3(0.005, 0.05, 0.1) * (0.3 + 0.7 * sunUp);
            float sss = pow(max(dot(rd, sun), 0.0), 6.0) * sunUp;
            waterCol += vec3(0.0, 0.12, 0.08) * sss;

            col = mix(waterCol, reflCol, fresnel);
            float spec = pow(max(dot(refl, sun), 0.0), 200.0);
            col += vec3(1.0, 0.9, 0.7) * spec * sunUp * 2.0;
            col += vec3(1.0, 0.6, 0.3) * pow(max(dot(refl, sun), 0.0), 16.0) * fresnel * sunUp * 0.3;

            float fog = 1.0 - exp(-t * 0.005);
            vec3 fogCol = mix(vec3(0.3, 0.35, 0.4), vec3(0.6, 0.4, 0.25), pow(max(dot(rd, sun), 0.0), 4.0));
            if (sun.y < 0.0) { fogCol *= 0.2; }
            col = mix(col, fogCol, fog);
        }
    }

    col = col / (1.0 + col);
    col = pow(col, vec3(1.0 / 2.2));

    vec2 q = gl_FragCoord.xy / u_res;
    col *= 0.5 + 0.5 * pow(16.0 * q.x * q.y * (1.0 - q.x) * (1.0 - q.y), 0.15);

    gl_FragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        const err = gl.getShaderInfoLog(s);
        console.error('Shader error:', err);
        document.getElementById('info').textContent = 'Shader error: ' + err;
        document.getElementById('info').style.opacity = '1';
        return null;
    }
    return s;
}

const vs = compile(gl.VERTEX_SHADER, VS);
const fs = compile(gl.FRAGMENT_SHADER, FS);
if (!vs || !fs) throw 'shader fail';

const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw gl.getProgramInfoLog(prog);
gl.useProgram(prog);

const posLoc = gl.getAttribLocation(prog, 'a_pos');
const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uDaytime = gl.getUniformLocation(prog, 'u_daytime');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

let mx = 0.5, my = 0.3, tx = 0.5, ty = 0.3;
let drag = false, daytime = 0.78, t0 = performance.now(), fc = 0, ft = performance.now();

canvas.onmousedown = () => drag = true;
onmouseup = () => drag = false;
canvas.onmousemove = e => {
    if (!drag) return;
    tx += e.movementX * 0.003;
    ty = Math.max(-0.2, Math.min(0.7, ty - e.movementY * 0.003));
};

let lt = null;
canvas.ontouchstart = e => { e.preventDefault(); lt = {x: e.touches[0].clientX, y: e.touches[0].clientY}; };
canvas.ontouchmove = e => {
    e.preventDefault();
    if (!lt || e.touches.length !== 1) return;
    tx += (e.touches[0].clientX - lt.x) * 0.003;
    ty = Math.max(-0.2, Math.min(0.7, ty - (e.touches[0].clientY - lt.y) * 0.003));
    lt = {x: e.touches[0].clientX, y: e.touches[0].clientY};
};
canvas.ontouchend = () => lt = null;
canvas.onwheel = e => { e.preventDefault(); daytime = ((daytime + e.deltaY * 0.0003) % 1 + 1) % 1; };

function resize() {
    const d = Math.min(devicePixelRatio, 1.5);
    canvas.width = innerWidth * d;
    canvas.height = innerHeight * d;
    gl.viewport(0, 0, canvas.width, canvas.height);
}
onresize = resize;
resize();

setTimeout(() => document.getElementById('info').style.opacity = '0', 6000);

!function loop() {
    const t = (performance.now() - t0) * 0.001;
    mx += (tx - mx) * 0.06;
    my += (ty - my) * 0.06;
    daytime += 0.000015;
    if (daytime > 1) daytime -= 1;

    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform1f(uDaytime, daytime);
    gl.uniform2f(uMouse, mx, my);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    fc++;
    if (performance.now() - ft > 1000) {
        document.getElementById('fps').textContent = fc + ' fps';
        fc = 0; ft = performance.now();
    }
    if (!document.hidden) requestAnimationFrame(loop);
}();
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestAnimationFrame(loop); });
</script>
</body>
</html>
