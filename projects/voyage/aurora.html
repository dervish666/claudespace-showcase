<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Borealis — Voyage</title>
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#info{position:fixed;bottom:12px;left:12px;color:rgba(150,200,170,0.5);font:11px/1.5 'Courier New',monospace;pointer-events:none}
#back{position:fixed;top:12px;left:12px;color:rgba(150,200,170,0.4);font:12px 'Courier New',monospace;text-decoration:none}
#back:hover{color:rgba(150,200,170,0.8)}
#controls{position:fixed;top:12px;right:12px;color:rgba(150,200,170,0.5);font:11px 'Courier New',monospace}
#controls button{background:rgba(20,30,25,0.6);border:1px solid rgba(100,160,130,0.3);color:rgba(150,200,170,0.6);padding:4px 10px;margin:0 2px;cursor:pointer;font:inherit}
#controls button:hover{border-color:rgba(100,160,130,0.6);color:rgba(150,200,170,0.9)}
#controls button.active{border-color:rgba(100,200,140,0.6);color:rgba(150,220,180,0.9)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/">&larr; Voyage</a>
<div id="controls">
  <button onclick="setPreset(0)" class="active">Calm</button>
  <button onclick="setPreset(1)">Storm</button>
  <button onclick="setPreset(2)">Dawn</button>
  <button onclick="setPreset(3)">Deep</button>
</div>
<div id="info">Aurora Borealis &middot; WebGL shader<br>Click to change color &middot; Scroll to adjust intensity</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
if (!gl) document.body.innerHTML = '<p style="color:#fff;padding:2em">WebGL not supported</p>';

// Presets: {name, color1, color2, speed, intensity, curtains, landscape}
const presets = [
  { name: 'Calm',  c1: [0.1, 0.9, 0.4], c2: [0.1, 0.4, 0.9], speed: 0.3, intensity: 0.7, curtains: 4.0, stars: 1.0 },
  { name: 'Storm', c1: [0.2, 1.0, 0.3], c2: [0.8, 0.2, 0.8], speed: 0.8, intensity: 1.0, curtains: 6.0, stars: 0.6 },
  { name: 'Dawn',  c1: [0.9, 0.3, 0.4], c2: [0.3, 0.8, 0.5], speed: 0.2, intensity: 0.5, curtains: 3.0, stars: 1.2 },
  { name: 'Deep',  c1: [0.1, 0.3, 1.0], c2: [0.6, 0.1, 0.8], speed: 0.4, intensity: 0.85, curtains: 5.0, stars: 0.8 },
];
let currentPreset = 0;
let targetPreset = { ...presets[0] };
let activePreset = { ...presets[0] };
let intensityMul = 1.0;

function setPreset(i) {
  currentPreset = i;
  targetPreset = { ...presets[i] };
  document.querySelectorAll('#controls button').forEach((b, j) => b.classList.toggle('active', j === i));
}

// Lerp helper
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpArr(a, b, t) { return a.map((v, i) => lerp(v, b[i], t)); }

const vsrc = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0, 1); }
`;

const fsrc = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec3 u_color1;
uniform vec3 u_color2;
uniform float u_speed;
uniform float u_intensity;
uniform float u_curtains;
uniform float u_stars;

// Simplex-like noise
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

// FBM
float fbm(vec2 p, float t) {
  float f = 0.0;
  f += 0.5 * snoise(p * 1.0 + t * 0.1);
  f += 0.25 * snoise(p * 2.0 - t * 0.15);
  f += 0.125 * snoise(p * 4.0 + t * 0.2);
  f += 0.0625 * snoise(p * 8.0 - t * 0.25);
  return f;
}

// Hash for stars
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}

// Stars
float stars(vec2 uv, float density) {
  vec2 id = floor(uv * 200.0);
  vec2 f = fract(uv * 200.0);
  float h = hash(id);
  if (h > density) return 0.0;
  float d = length(f - 0.5);
  float brightness = hash(id + 42.0);
  // Twinkle
  float twinkle = 0.7 + 0.3 * sin(u_time * (1.0 + brightness * 3.0) + h * 100.0);
  return smoothstep(0.08 * (0.3 + brightness * 0.7), 0.0, d) * twinkle * brightness;
}

// Landscape silhouette
float landscape(float x) {
  float h = 0.0;
  h += 0.06 * sin(x * 2.0 + 1.0);
  h += 0.03 * sin(x * 5.0 + 3.0);
  h += 0.015 * sin(x * 12.0 + 7.0);
  h += 0.008 * sin(x * 25.0 + 2.0);
  // Mountains
  h += 0.04 * max(0.0, sin(x * 1.5 + 0.5));
  h += 0.03 * max(0.0, sin(x * 3.0 - 1.0));
  // Trees (pointy silhouettes)
  float tree = 0.0;
  for (float i = 0.0; i < 8.0; i++) {
    float tx = hash(vec2(i * 7.3, 0.0)) * 6.28;
    float tw = 0.02 + hash(vec2(i * 3.1, 1.0)) * 0.015;
    float th = 0.02 + hash(vec2(i * 5.7, 2.0)) * 0.03;
    float d = abs(x - tx);
    tree = max(tree, th * max(0.0, 1.0 - d / tw));
  }
  return h + tree + 0.12;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 p = vec2((uv.x - 0.5) * aspect, uv.y - 0.5);
  float t = u_time * u_speed;

  // Sky gradient
  vec3 sky = mix(vec3(0.01, 0.01, 0.03), vec3(0.02, 0.04, 0.08), uv.y);

  // Stars
  float starField = stars(uv, 0.08) * u_stars;
  // Dim stars where aurora is bright

  // Aurora layers
  float aurora = 0.0;
  vec3 auroraColor = vec3(0.0);

  // Multiple curtain layers
  for (float i = 0.0; i < 3.0; i++) {
    float layerOffset = i * 1.7;
    float yBase = 0.55 + i * 0.08;

    // Curtain shape: vertical rays modulated by noise
    float curtainX = p.x * u_curtains + t * (0.3 + i * 0.15) + layerOffset;
    float curtainNoise = fbm(vec2(curtainX * 0.5, t * 0.2 + i), t);

    // Vertical extent of curtain
    float curtainY = uv.y - yBase;
    float verticalFade = smoothstep(-0.05, 0.0, curtainY) * smoothstep(0.35, 0.05, curtainY);

    // Ray structure — thin vertical bands
    float rays = 0.0;
    float rayFreq = 3.0 + i * 2.0;
    rays += sin(curtainX * rayFreq + curtainNoise * 4.0) * 0.5 + 0.5;
    rays *= sin(curtainX * rayFreq * 0.7 + curtainNoise * 3.0 + 1.5) * 0.5 + 0.5;
    rays = pow(rays, 1.5);

    // Shimmer
    float shimmer = snoise(vec2(curtainX * 2.0, uv.y * 8.0 - t * 2.0 + i * 3.0));
    shimmer = shimmer * 0.5 + 0.5;

    // Bottom glow (brighter at base of curtain)
    float baseGlow = exp(-curtainY * 8.0) * 0.3;

    float layerAlpha = (rays * verticalFade * (0.6 + shimmer * 0.4) + baseGlow * verticalFade) * u_intensity;
    layerAlpha *= 0.4 + curtainNoise * 0.3;

    // Color interpolation between the two aurora colors, varying by layer and position
    float colorMix = sin(curtainX * 0.3 + i * 2.0 + t * 0.1) * 0.5 + 0.5;
    colorMix = mix(colorMix, uv.y * 2.0 - 0.8, 0.3); // height affects color
    vec3 layerColor = mix(u_color1, u_color2, clamp(colorMix, 0.0, 1.0));

    // Add slight white at peaks
    layerColor = mix(layerColor, vec3(0.9, 0.95, 1.0), smoothstep(0.2, 0.35, curtainY) * 0.2);

    aurora += layerAlpha;
    auroraColor += layerColor * layerAlpha;
  }

  // Normalize aurora color
  if (aurora > 0.001) {
    auroraColor /= aurora;
  }
  aurora = min(aurora, 1.5);

  // Dim stars behind aurora
  starField *= max(0.0, 1.0 - aurora * 2.0);

  // Compose
  vec3 col = sky;
  col += vec3(starField * 0.9, starField * 0.92, starField);
  col += auroraColor * aurora * 0.7;

  // Atmospheric glow on horizon
  float horizonGlow = exp(-(uv.y - 0.15) * 6.0) * 0.08;
  col += auroraColor * horizonGlow * u_intensity;

  // Landscape
  float landY = landscape(uv.x * 6.28);
  if (uv.y < landY) {
    // Dark landscape with slight ambient from aurora
    vec3 landColor = vec3(0.005, 0.008, 0.005);
    // Aurora illumination on snow/ground
    float auroraLight = aurora * 0.02;
    landColor += auroraColor * auroraLight;
    col = landColor;

    // Lake reflection
    float lakeCenter = 0.5;
    float lakeWidth = 0.15;
    float lakeMask = smoothstep(lakeWidth, 0.0, abs(uv.x - lakeCenter));
    float lakeY = 0.08;
    if (uv.y < lakeY && lakeMask > 0.0) {
      // Mirror the aurora downward with distortion
      vec2 reflUv = vec2(uv.x, lakeY + (lakeY - uv.y));
      float reflY = reflUv.y - 0.55;
      float reflAurora = aurora * 0.3;
      // Ripple distortion
      float ripple = snoise(vec2(uv.x * 30.0, u_time * 0.5)) * 0.003;
      vec3 reflColor = auroraColor * reflAurora * lakeMask;
      reflColor *= 0.5 + 0.5 * sin(uv.y * 100.0 + u_time); // horizontal lines
      col = mix(vec3(0.005, 0.01, 0.015), reflColor, 0.7);
    }
  }

  // Shooting star (occasional)
  float shootSeed = floor(u_time * 0.15);
  float shootT = fract(u_time * 0.15);
  if (shootT < 0.15) {
    vec2 shootStart = vec2(hash(vec2(shootSeed, 0.0)) * aspect - aspect * 0.5, 0.3 + hash(vec2(shootSeed, 1.0)) * 0.3);
    vec2 shootDir = normalize(vec2(0.5 + hash(vec2(shootSeed, 2.0)), -0.3 - hash(vec2(shootSeed, 3.0)) * 0.3));
    float shootLen = 0.08;
    float shootProgress = shootT / 0.15;
    vec2 shootPos = shootStart + shootDir * shootProgress * 0.4;

    // Line distance
    vec2 toP = p - shootPos;
    float along = dot(toP, shootDir);
    float perp = length(toP - shootDir * along);
    float trail = smoothstep(0.0, -shootLen, along) * smoothstep(-shootLen * 1.5, -shootLen * 0.5, along);
    float width = smoothstep(0.003, 0.0, perp);
    float shoot = trail * width * (1.0 - shootProgress);
    col += vec3(0.8, 0.85, 1.0) * shoot * 2.0;
  }

  // Vignette
  float vignette = 1.0 - 0.3 * length((uv - 0.5) * vec2(1.2, 1.0));
  col *= vignette;

  // Gamma
  col = pow(col, vec3(0.9));

  gl_FragColor = vec4(col, 1.0);
}
`;

// Compile shaders
function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compile(gl.VERTEX_SHADER, vsrc);
const fs = compile(gl.FRAGMENT_SHADER, fsrc);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uColor1 = gl.getUniformLocation(prog, 'u_color1');
const uColor2 = gl.getUniformLocation(prog, 'u_color2');
const uSpeed = gl.getUniformLocation(prog, 'u_speed');
const uIntensity = gl.getUniformLocation(prog, 'u_intensity');
const uCurtains = gl.getUniformLocation(prog, 'u_curtains');
const uStars = gl.getUniformLocation(prog, 'u_stars');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// Interactions
canvas.addEventListener('click', () => {
  // Cycle to next preset
  setPreset((currentPreset + 1) % presets.length);
});

canvas.addEventListener('wheel', (e) => {
  intensityMul = Math.max(0.2, Math.min(2.0, intensityMul - e.deltaY * 0.001));
  e.preventDefault();
}, { passive: false });

// Visibility API
let animId = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden && animId) {
    cancelAnimationFrame(animId);
    animId = null;
  } else if (!document.hidden && !animId) {
    animId = requestAnimationFrame(render);
  }
});

const startTime = performance.now();

function render() {
  const t = (performance.now() - startTime) * 0.001;

  // Smooth interpolation to target preset
  const lerpRate = 0.02;
  activePreset.c1 = lerpArr(activePreset.c1, targetPreset.c1, lerpRate);
  activePreset.c2 = lerpArr(activePreset.c2, targetPreset.c2, lerpRate);
  activePreset.speed = lerp(activePreset.speed, targetPreset.speed, lerpRate);
  activePreset.intensity = lerp(activePreset.intensity, targetPreset.intensity * intensityMul, lerpRate);
  activePreset.curtains = lerp(activePreset.curtains, targetPreset.curtains, lerpRate);
  activePreset.stars = lerp(activePreset.stars, targetPreset.stars, lerpRate);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform3fv(uColor1, activePreset.c1);
  gl.uniform3fv(uColor2, activePreset.c2);
  gl.uniform1f(uSpeed, activePreset.speed);
  gl.uniform1f(uIntensity, activePreset.intensity);
  gl.uniform1f(uCurtains, activePreset.curtains);
  gl.uniform1f(uStars, activePreset.stars);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  animId = requestAnimationFrame(render);
}

animId = requestAnimationFrame(render);
</script>
</body>
</html>
